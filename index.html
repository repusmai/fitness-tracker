// ── IndexedDB snapshot store ──────────────────────────────────────────────────
// Keeps last 5 full data snapshots. Auto-restores if localStorage is empty on load.
const IDB_NAME = 'fitnessTrackerBackups';
const IDB_STORE = 'snapshots';
const MAX_SNAPSHOTS = 5;

function openIDB(){
  return new Promise((res,rej)=>{
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if(!db.objectStoreNames.contains(IDB_STORE)){
        const store = db.createObjectStore(IDB_STORE, {keyPath:'id', autoIncrement:true});
        store.createIndex('ts','ts',{unique:false});
      }
    };
    req.onsuccess = e => res(e.target.result);
    req.onerror = () => rej(req.error);
  });
}

async function saveSnapshot(data){
  try {
    const db = await openIDB();
    const tx = db.transaction(IDB_STORE,'readwrite');
    const store = tx.objectStore(IDB_STORE);
    store.add({ts: Date.now(), data: JSON.stringify(data)});
    // Prune old snapshots
    const allReq = store.index('ts').openCursor(null,'prev');
    let count = 0;
    allReq.onsuccess = e => {
      const cursor = e.target.result;
      if(!cursor) return;
      count++;
      if(count > MAX_SNAPSHOTS) cursor.delete();
      cursor.continue();
    };
  } catch(err){ console.warn('IDB snapshot failed',err); }
}

async function loadLatestSnapshot(){
  try {
    const db = await openIDB();
    return new Promise((res)=>{
      const tx = db.transaction(IDB_STORE,'readonly');
      const store = tx.objectStore(IDB_STORE);
      const req = store.index('ts').openCursor(null,'prev');
      req.onsuccess = e => {
        const cursor = e.target.result;
        if(cursor && cursor.value.data){
          try { res(JSON.parse(cursor.value.data)); }
          catch { res(null); }
        } else { res(null); }
      };
      req.onerror = () => res(null);
    });
  } catch { return null; }
}

async function listSnapshots(){
  try {
    const db = await openIDB();
    return new Promise((res)=>{
      const tx = db.transaction(IDB_STORE,'readonly');
      const store = tx.objectStore(IDB_STORE);
      const req = store.index('ts').getAll();
      req.onsuccess = () => res((req.result||[]).reverse());
      req.onerror = () => res([]);
    });
  } catch { return []; }
}

// ── Unit helpers ──────────────────────────────────────────────────────────────
const LBS_TO_KG=0.453592;
const KG_TO_LBS=2.20462;
// Always store raw numbers as typed; use unit field to interpret them
function toKgVal(weight,unit){ const w=parseFloat(weight); if(!w) return 0; return unit==="lbs"?w*LBS_TO_KG:w; }
// Convert a kg value to display unit for charts
function fromKgDisplay(kgVal,displayUnit){ return displayUnit==="lbs"?Math.round(kgVal*KG_TO_LBS*10)/10:Math.round(kgVal*10)/10; }
// Epley always in kg — convert input first, return kg
function epleyKg(weight,reps,unit){
  const wKg=toKgVal(weight,unit||"kg");
  const r=parseInt(reps);
  if(!wKg||!r||r<=0) return 0;
  return r===1?wKg:Math.round(wKg*(1+r/30)*10)/10;
}
// legacy — kept for any callers not yet updated
function epley(weight,reps){ const w=parseFloat(weight),r=parseInt(reps); if(!w||!r||r<=0)return 0; return r===1?w:Math.round(w*(1+r/30)); }
// Resolve unit: set.unit overrides entry.unit overrides workout.unit, default kg
function resolveUnit(set,entry,workout){ return set?.unit||entry?.unit||workout?.unit||"kg"; }
// Small unit toggle pill component (shared by SetRow and WECard header)

function getBestPerExercise(workouts,exercises,muscleNames){
  const map={};
  for(const w of workouts){
    for(const entry of w.entries){
      const ex=exercises.find(e=>e.id===entry.exerciseId);
      if(!ex) continue;
      const primary=ex.primaryMuscles?.length?ex.primaryMuscles:[ex.muscles?.[0]].filter(Boolean);
      if(!primary.some(m=>muscleNames.includes(m))) continue;
      let best=map[ex.id]?.best1rm||0;
      for(const s of entry.sets){const v=epleyKg(s.weight,s.reps,resolveUnit(s,entry,w));if(v>best)best=v;}
      if(best>0) map[ex.id]={name:ex.name,best1rm:best};
    }
  }
  return Object.entries(map).map(([id,v])=>({id,name:v.name,best1rm:v.best1rm}));
}
function getBestByMuscles(workouts,exercises,muscleNames){
  let best=0;
  for(const w of workouts){
    for(const entry of w.entries){
      const ex=exercises.find(e=>e.id===entry.exerciseId);
      if(!ex) continue;
      const primary=ex.primaryMuscles?.length?ex.primaryMuscles:[ex.muscles?.[0]].filter(Boolean);
      if(!primary.some(m=>muscleNames.includes(m))) continue;
      for(const s of entry.sets){const v=epleyKg(s.weight,s.reps,resolveUnit(s,entry,w));if(v>best)best=v;}
    }
  }
  return best;
}
function getLastSets(workouts,exerciseId){
  const sorted=[...workouts].sort((a,b)=>b.date.localeCompare(a.date));
  for(const w of sorted){
    const entry=w.entries.find(e=>e.exerciseId===exerciseId);
    if(entry&&entry.sets.length) return entry.sets;
  }
  return null;
}
function getExerciseHistory(workouts,exerciseId){
  const points=[];
  for(const w of workouts){
    const entry=w.entries.find(e=>e.exerciseId===exerciseId);
    if(!entry) continue;
    let best=0;
    for(const s of entry.sets){const v=epleyKg(s.weight,s.reps,resolveUnit(s,entry,w));if(v>best)best=v;}
    if(best>0) points.push({date:w.date,value:best});
  }
  return points.sort((a,b)=>a.date.localeCompare(b.date));
}
function migrateExercise(e){
  if(!e.primaryMuscles){
    e.primaryMuscles=e.muscles?.length?[e.muscles[0]]:[];
    e.secondaryMuscles=e.muscles?.slice(1)||[];
  }
  return e;
}

const KEY="fitnessTracker_v2";
const DRAFT_KEY="fitnessTracker_draft";
const DRIVE_PREFS_KEY="fitnessTracker_drivePrefs";
function saveDraft(workout,step){ try{ localStorage.setItem(DRAFT_KEY,JSON.stringify({workout,step})); }catch{} }
function loadDraft(){ try{ const r=localStorage.getItem(DRAFT_KEY); return r?JSON.parse(r):null; }catch{ return null; } }
function clearDraft(){ try{ localStorage.removeItem(DRAFT_KEY); }catch{} }

function loadData(){
  try{
    const r=localStorage.getItem(KEY);
    if(r){
      const d=JSON.parse(r);
      if(d.exercises){ d.exercises=d.exercises.map(e=>{ if(!e.muscles){e.muscles=[e.group||"Full Body"];} return migrateExercise(e); }); }
      if(!d.templates) d.templates=[];
      if(!d.preferredUnit) d.preferredUnit="kg";
      // Migrate: backfill unit fields on existing workouts/entries/sets
      if(d.workouts){ d.workouts=d.workouts.map(w=>{
        const wu=w.unit||"kg";
        return {...w,unit:wu,entries:(w.entries||[]).map(e=>{
          const eu=e.unit||wu;
          return {...e,unit:eu,sets:(e.sets||[]).map(s=>({unit:eu,...s}))};
        })};
      });}
      return d;
    }
  }catch{}
  return {workouts:[],exercises:DEFAULT_EXERCISES,bodyweight:80,templates:[],preferredUnit:"kg"};
}

function saveData(d){
  try{ localStorage.setItem(KEY,JSON.stringify(d)); }catch{}
  saveSnapshot(d).catch(()=>{});
}

function workoutToTemplate(workout,templateName){

    id:"t"+Date.now(), name:templateName||workout.name,
    createdFrom:workout.id, createdAt:new Date().toISOString(),
    unit:workout.unit||"kg",
    entries:workout.entries.map(entry=>({
      exerciseId:entry.exerciseId, note:"", unit:entry.unit||workout.unit||"kg",
      sets:entry.sets.map(s=>({weight:s.weight,reps:"",rir:"",unit:s.unit||entry.unit||workout.unit||"kg"}))
    }))
  };
}
function templateToWorkout(template,preferredUnit){
  const wu=template.unit||preferredUnit||"kg";
  return {
    id:Date.now().toString(), date:today(), name:template.name, notes:"", unit:wu,
    entries:template.entries.map((entry,i)=>({
      _key:`${entry.exerciseId}_${i}_${Date.now()}`,
      exerciseId:entry.exerciseId, note:"", unit:entry.unit||wu,
      sets:entry.sets&&entry.sets.length>0
        ?entry.sets.map(s=>({weight:s.weight,reps:"",rir:"",unit:s.unit||entry.unit||wu}))
        :[{weight:"",reps:"",rir:"",unit:entry.unit||wu}]
    }))
  };
}
function today(){ return new Date().toISOString().slice(0,10); }
function fmtDate(iso){
  if(!iso) return "";
  const[y,m,d]=iso.split("-");
  return `${d}/${m}/${y}`;
}
function DateInput({value,onChange,style}){
  const toDisplay=iso=>{if(!iso)return "";const[y,m,d]=iso.split("-");return `${d}/${m}/${y}`;};
  const[raw,setRaw]=useState(toDisplay(value));
  useEffect(()=>setRaw(toDisplay(value)),[value]);
  function handleChange(e){
    let v=e.target.value.replace(/[^0-9/]/g,"");
    if(v.length===2&&raw.length===1) v=v+"/";
    if(v.length===5&&raw.length===4) v=v+"/";
    if(v.length>10) v=v.slice(0,10);
    setRaw(v);
    const parts=v.split("/");
    if(parts.length===3&&parts[0].length===2&&parts[1].length===2&&parts[2].length===4){
      const iso=`${parts[2]}-${parts[1]}-${parts[0]}`;
      if(!isNaN(new Date(iso))) onChange(iso);
    }
  }
  return <input value={raw} onChange={handleChange} placeholder="dd/mm/yyyy" maxLength={10} inputMode="numeric" style={style}/>;
}

const UNILATERAL_KEYWORDS=/\b(single|unilateral|one[\s-]arm|one[\s-]leg|pistol|split)\b/i;
function isUnilateralSet(set,exercise){
  if(set.side==="L"||set.side==="R") return true;
  if(exercise&&UNILATERAL_KEYWORDS.test(exercise.name)) return true;
  return false;
}
function countSets(entries,exercises){
  let total=0;
  for(const entry of entries){
    const ex=exercises?.find(e=>e.id===entry.exerciseId);
    for(const s of entry.sets){ total+=isUnilateralSet(s,ex)?0.5:1; }
  }
  return total;
}
function countSetsWorkouts(workouts,exercises){ return workouts.reduce((a,w)=>a+countSets(w.entries,exercises),0); }
function fmtSets(n){ return Number.isInteger(n)?String(n):n.toFixed(1); }

function getLoggedExercises(workouts,exercises){
  const map={};
  for(const w of workouts){
    for(const entry of w.entries){
      if(!map[entry.exerciseId]) map[entry.exerciseId]=0;
      for(const s of entry.sets){ const v=epleyKg(s.weight,s.reps,resolveUnit(s,entry,w)); if(v>map[entry.exerciseId]) map[entry.exerciseId]=v; }
    }
  }
  return Object.entries(map)
    .map(([id,best1rm])=>({exercise:exercises.find(e=>e.id===id),best1rm}))
    .filter(x=>x.exercise)
    .sort((a,b)=>b.best1rm-a.best1rm);
}

function useScrollHide(threshold=8){
  const ref=useRef(null);
  const[hidden,setHidden]=useState(false);
  const lastY=useRef(0);
  useEffect(()=>{
    const el=ref.current; if(!el) return;
    const onScroll=()=>{
      const y=el.scrollTop;
      if(Math.abs(y-lastY.current)<threshold) return;
      setHidden(y>lastY.current&&y>50);
      lastY.current=y;
    };
    el.addEventListener("scroll",onScroll,{passive:true});
    return()=>el.removeEventListener("scroll",onScroll);
  },[]);
  return {ref,hidden};
}

function useKeyboardHeight(){
  const[kbHeight,setKbHeight]=useState(0);
  useEffect(()=>{
    if(!window.visualViewport) return;
    function update(){
      const kb=Math.max(0,window.innerHeight-window.visualViewport.height-window.visualViewport.offsetTop);
      setKbHeight(kb);
    }
    window.visualViewport.addEventListener("resize",update);
    window.visualViewport.addEventListener("scroll",update);
    return()=>{
      window.visualViewport.removeEventListener("resize",update);
      window.visualViewport.removeEventListener("scroll",update);
    };
  },[]);
  return kbHeight;
}

// Replace with your own Google Cloud OAuth 2.0 client ID
// Steps: console.cloud.google.com → New project → APIs & Services → Credentials
// → Create OAuth Client ID → Web application → add your GitHub Pages URL to
// "Authorised JavaScript origins" e.g. https://yourusername.github.io
const GOOGLE_CLIENT_ID = "684797576180-01p3f5r8g4fc5g7cif553qjeav04dtbh.apps.googleusercontent.com";
const DRIVE_SCOPE = "https://www.googleapis.com/auth/drive.file";
const DRIVE_FILE_NAME = "fitness-tracker-backup.json";

let _gapiLoaded = false;
let _tokenClient = null;
let _accessToken = null;

function loadGoogleAPIs(){
  return new Promise((resolve)=>{
    if(_gapiLoaded){ resolve(); return; }
    // Load GIS (Google Identity Services)
    const gis = document.createElement('script');
    gis.src = 'https://accounts.google.com/gsi/client';
    gis.onload = () => { _gapiLoaded = true; resolve(); };
    gis.onerror = () => resolve(); // fail gracefully
    document.head.appendChild(gis);
  });
}

async function getAccessToken(){
  if(_accessToken) return _accessToken;
  await loadGoogleAPIs();
  if(!window.google?.accounts?.oauth2) throw new Error("Google Identity Services failed to load");
  return new Promise((resolve, reject)=>{
    _tokenClient = window.google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID,
      scope: DRIVE_SCOPE,
      callback: (resp)=>{
        if(resp.error){ reject(new Error(resp.error)); return; }
        _accessToken = resp.access_token;
        // Token expires in 1hr — clear it so next call re-auths
        setTimeout(()=>{ _accessToken = null; }, (resp.expires_in - 60) * 1000);
        resolve(_accessToken);
      },
    });
    _tokenClient.requestAccessToken({prompt: ''});
  });
}

async function findDriveFile(token){
  const q = encodeURIComponent(`name='${DRIVE_FILE_NAME}' and not trashed`);
  const r = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name,modifiedTime)`,{
    headers:{ Authorization:`Bearer ${token}` }
  });
  const d = await r.json();
  return d.files?.[0] || null;
}

async function uploadToDrive(data){
  const token = await getAccessToken();
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const existing = await findDriveFile(token);

  if(existing){
    // Update existing file
    const form = new FormData();
    form.append('metadata', new Blob([JSON.stringify({name: DRIVE_FILE_NAME})], {type:'application/json'}));
    form.append('file', blob);
    const r = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${existing.id}?uploadType=multipart`,{
      method:'PATCH', headers:{ Authorization:`Bearer ${token}` }, body:form
    });
    if(!r.ok) throw new Error('Drive update failed');
  } else {
    // Create new file
    const form = new FormData();
    form.append('metadata', new Blob([JSON.stringify({name: DRIVE_FILE_NAME})], {type:'application/json'}));
    form.append('file', blob);
    const r = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{
      method:'POST', headers:{ Authorization:`Bearer ${token}` }, body:form
    });
    if(!r.ok) throw new Error('Drive upload failed');
  }

  // Save last backup timestamp
  try {
    const prefs = JSON.parse(localStorage.getItem(DRIVE_PREFS_KEY)||'{}');
    prefs.lastBackup = Date.now();
    localStorage.setItem(DRIVE_PREFS_KEY, JSON.stringify(prefs));
  } catch {}
}

async function restoreFromDrive(){
  const token = await getAccessToken();
  const file = await findDriveFile(token);
  if(!file) throw new Error('No backup found on Drive');
  const r = await fetch(`https://www.googleapis.com/drive/v3/files/${file.id}?alt=media`,{
    headers:{ Authorization:`Bearer ${token}` }
  });
  if(!r.ok) throw new Error('Drive download failed');
  const text = await r.text();
  const parsed = JSON.parse(text);
  if(!parsed.workouts||!parsed.exercises) throw new Error('Invalid backup format');
  return { data: parsed, modifiedTime: file.modifiedTime };
}

}
function saveDrivePrefs(prefs){

function LineChart({points,color="#6366f1",height=120,showDots=true,yLabel="kg"}){
  const ref=useRef(null);
  const wrapRef=useRef(null);
  function draw(){
    const canvas=ref.current;
    if(!canvas||!points.length) return;
    const dpr=window.devicePixelRatio||1;
    const W=wrapRef.current?wrapRef.current.clientWidth:320;
    const H=height;
    canvas.width=W*dpr; canvas.height=H*dpr;
    canvas.style.width=W+"px"; canvas.style.height=H+"px";
    const ctx=canvas.getContext("2d");
    ctx.scale(dpr,dpr); ctx.clearRect(0,0,W,H);
    const vals=points.map(p=>p.value);
    const mn=Math.min(...vals),mx=Math.max(...vals);
    const pad={t:10,b:24,l:42,r:10};
    const iW=W-pad.l-pad.r,iH=H-pad.t-pad.b;
    const sx=i=>points.length<2?pad.l+iW/2:pad.l+iW*i/(points.length-1);
    const sy=v=>pad.t+(mx===mn?iH/2:iH*(1-(v-mn)/(mx-mn)));
    const yTicks=4;
    for(let t=0;t<=yTicks;t++){
      const v=mn+(mx-mn)*t/yTicks; const y=sy(v);
      ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y);
      ctx.strokeStyle="#1e293b"; ctx.lineWidth=1; ctx.stroke();
      ctx.fillStyle="#475569"; ctx.font="bold 9px sans-serif"; ctx.textAlign="right"; ctx.textBaseline="middle";
      ctx.fillText(Math.round(v)+yLabel,pad.l-4,y);
    }
    const fmtShort=iso=>{const d=new Date(iso);return d.toLocaleDateString("en-GB",{day:"2-digit",month:"short"});};
    ctx.fillStyle="#475569"; ctx.font="9px sans-serif"; ctx.textBaseline="top";
    if(points.length>1){
      ctx.textAlign="left"; ctx.fillText(fmtShort(points[0].date),pad.l,H-pad.b+4);
      ctx.textAlign="right"; ctx.fillText(fmtShort(points[points.length-1].date),W-pad.r,H-pad.b+4);
      if(points.length>3){const mi=Math.floor(points.length/2);ctx.textAlign="center";ctx.fillText(fmtShort(points[mi].date),sx(mi),H-pad.b+4);}
    }
    const grad=ctx.createLinearGradient(0,pad.t,0,H-pad.b);
    grad.addColorStop(0,color+"44"); grad.addColorStop(1,color+"00");
    ctx.beginPath(); ctx.moveTo(sx(0),sy(points[0].value));
    for(let i=1;i<points.length;i++) ctx.lineTo(sx(i),sy(points[i].value));
    ctx.lineTo(sx(points.length-1),H-pad.b); ctx.lineTo(sx(0),H-pad.b);
    ctx.closePath(); ctx.fillStyle=grad; ctx.fill();
    ctx.beginPath(); ctx.moveTo(sx(0),sy(points[0].value));
    for(let i=1;i<points.length;i++) ctx.lineTo(sx(i),sy(points[i].value));
    ctx.strokeStyle=color; ctx.lineWidth=2; ctx.lineJoin="round"; ctx.stroke();
    if(showDots) points.forEach((p,i)=>{
      ctx.beginPath(); ctx.arc(sx(i),sy(p.value),3.5,0,Math.PI*2);
      ctx.fillStyle=color; ctx.fill(); ctx.strokeStyle="#0a0f1e"; ctx.lineWidth=2; ctx.stroke();
    });
  }
  useEffect(()=>{
    draw();
    if(!wrapRef.current) return;
    const ro=new ResizeObserver(()=>draw());
    ro.observe(wrapRef.current);
    return()=>ro.disconnect();
  },[points,color,height,showDots]);
  if(!points.length) return <div style={{height,display:"flex",alignItems:"center",justifyContent:"center",color:"#334155",fontSize:12}}>No data yet — log more workouts</div>;
  return <div ref={wrapRef} style={{width:"100%"}}><canvas ref={ref} style={{display:"block"}}/></div>;
}

function getOverallAvg1RMHistory(workouts,exercises){
  if(!workouts.length) return [];
  const sorted=[...workouts].sort((a,b)=>a.date.localeCompare(b.date));
  return sorted.map(w=>{
    const upto=sorted.slice(0,sorted.indexOf(w)+1);
    const bests=MUSCLE_STANDARDS.map(s=>getBestByMuscles(upto,exercises,s.muscles)).filter(v=>v>0);
    if(!bests.length) return null;
    return {date:w.date,value:Math.round(bests.reduce((a,v)=>a+v,0)/bests.length)};
  }).filter(Boolean);
}

function GroupStrengthCharts({workouts,exercises,displayUnit}){
  const du=displayUnit||"kg";
  const sorted=[...workouts].sort((a,b)=>a.date.localeCompare(b.date));
  const[openGroup,setOpenGroup]=useState(null);
  const groupHistories=MUSCLE_GROUPS.map(g=>{
    const byDate={};
    for(const w of sorted){
      const exs=getBestPerExercise([w],exercises,g.muscles);
      if(!exs.length) continue;
      const best=Math.max(...exs.map(e=>e.best1rm));
      if(best>0) byDate[w.date]=Math.max(byDate[w.date]||0,best);
    }
    // points are in kg internally; convert for display
    const points=Object.entries(byDate).sort(([a],[b])=>a.localeCompare(b)).map(([date,value])=>({date,value:fromKgDisplay(value,du)}));
    return {key:g.key,label:g.label,color:g.color,points};
  }).filter(g=>g.points.length>0);
  if(!groupHistories.length) return null;
  return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      <div style={{fontSize:11,fontWeight:700,color:"#475569",textTransform:"uppercase",letterSpacing:"0.08em"}}>Strength by Muscle Group</div>
      {groupHistories.map(g=>{
        const isOpen=openGroup===g.key;
        const latest=g.points[g.points.length-1]?.value;
        const first=g.points[0]?.value;
        const delta=latest&&first?Math.round((latest-first)*10)/10:null;
        return(
          <div key={g.key} style={{background:"#0f172a",borderRadius:16,border:"1px solid #1e293b",overflow:"hidden"}}>
            <button onClick={()=>setOpenGroup(isOpen?null:g.key)} style={{width:"100%",display:"flex",alignItems:"center",gap:12,padding:"12px 14px",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",textAlign:"left"}}>
              <div style={{width:10,height:10,borderRadius:"50%",background:g.color,flexShrink:0}}/>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:700,color:"#f1f5f9"}}>{g.label}</div>
                <div style={{fontSize:11,color:"#475569",marginTop:1}}>Best 1RM: <span style={{color:g.color,fontWeight:700}}>{latest}{du}</span>{delta!==null&&delta!==0&&<span style={{color:delta>0?"#22c55e":"#ef4444",marginLeft:6}}>{delta>0?"+":""}{delta}{du} from first log</span>}</div>
              </div>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#475569" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{transform:isOpen?"rotate(180deg)":"rotate(0deg)",transition:"transform 0.2s",flexShrink:0}}><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            {isOpen&&<div style={{padding:"4px 14px 14px"}}><LineChart points={g.points} color={g.color} height={130} showDots={g.points.length<=20} yLabel={du}/></div>}
          </div>
        );
      })}
    </div>
  );
}

function StrengthTrendPanel({workouts,exercises,displayUnit}){
  const du=displayUnit||"kg";
  const[selected,setSelected]=useState(null);
  const loggedExercises=exercises.filter(ex=>getExerciseHistory(workouts,ex.id).length>=1);
  // overall points: already kg internally, convert for display
  const overallPointsRaw=getOverallAvg1RMHistory(workouts,exercises);
  const overallPoints=overallPointsRaw.map(p=>({...p,value:fromKgDisplay(p.value,du)}));
  const drillPointsRaw=selected?getExerciseHistory(workouts,selected):null;
  const drillPoints=drillPointsRaw?drillPointsRaw.map(p=>({...p,value:fromKgDisplay(p.value,du)})):null;
  const drillEx=selected?exercises.find(e=>e.id===selected):null;
  const drillColor=drillEx?.muscles?.[0]?getColorForMuscle(drillEx.muscles[0]):"#6366f1";

    <div style={{background:"#0f172a",borderRadius:16,border:"1px solid #1e293b",overflow:"hidden"}}>

      </div>

            const col=ex.muscles?.[0]?getColorForMuscle(ex.muscles[0]):"#6366f1";
            const pts=getExerciseHistory(workouts,ex.id);
            const latestKg=pts[pts.length-1]?.value;
            const latestDisplay=latestKg?fromKgDisplay(latestKg,du):null;
            const isActive=selected===ex.id;
            return(
              <button key={ex.id} onClick={()=>setSelected(isActive?null:ex.id)}
                style={{background:isActive?col:`${col}18`,border:`1px solid ${isActive?col:col+"44"}`,borderRadius:10,padding:"6px 10px",cursor:"pointer",fontFamily:"inherit",display:"flex",flexDirection:"column",alignItems:"flex-start",gap:1,transition:"all 0.15s"}}>
                <span style={{fontSize:12,fontWeight:700,color:isActive?"#fff":col}}>{ex.name}</span>
                {latestDisplay&&<span style={{fontSize:10,color:isActive?"rgba(255,255,255,0.7)":"#64748b"}}>{latestDisplay}{du}</span>}
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

  const[creating,setCreating]=useState(false);
  const[newName,setNewName]=useState("");
  const[newPrimary,setNewPrimary]=useState([]);
  const[newSecondary,setNewSecondary]=useState([]);
  const catMuscles=selCat==="All"?null:MUSCLE_CATEGORIES.find(c=>c.category===selCat)?.muscles;
  const filtered=exercises.filter(e=>{
    const nameMatch=e.name.toLowerCase().includes(q.toLowerCase());
    if(!nameMatch) return false;
    if(selMuscle) return e.muscles?.includes(selMuscle);
    if(selCat!=="All") return e.muscles?.some(m=>catMuscles?.includes(m));
    return true;
  });
  const grouped={};
  filtered.forEach(ex=>{const cat=getPrimaryCategory(ex);if(!grouped[cat])grouped[cat]=[];grouped[cat].push(ex);});
  function handleCreate(){
    if(!newName.trim()||!newPrimary.length) return;
    const muscles=[...newPrimary,...newSecondary];
    const ex={id:"c"+Date.now(),name:newName.trim(),muscles,primaryMuscles:newPrimary,secondaryMuscles:newSecondary};
    onCreateExercise?.(ex); onPick(ex);
  }
  const kbHeight=useKeyboardHeight();
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:100,display:"flex",alignItems:"flex-end"}}>
      <div style={{background:"#0f172a",borderRadius:"20px 20px 0 0",width:"100%",maxHeight:`calc(92vh - ${kbHeight}px)`,overflow:"hidden",display:"flex",flexDirection:"column",border:"1px solid #1e293b",transition:"max-height 0.15s ease"}}>
        <div style={{padding:"20px 16px 12px",borderBottom:"1px solid #1e293b",flexShrink:0}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <span style={{fontWeight:700,fontSize:17,color:"#f1f5f9"}}>{creating?"New Exercise":"Add Exercise"}</span>
            <div style={{display:"flex",gap:8}}>
              {onCreateExercise&&!creating&&(<button onClick={()=>setCreating(true)} style={{background:"linear-gradient(135deg,#6366f1,#8b5cf6)",border:"none",borderRadius:8,padding:"6px 11px",cursor:"pointer",color:"#fff",fontSize:12,fontWeight:700,fontFamily:"inherit",display:"flex",alignItems:"center",gap:5}}><Icon name="plus" size={13} color="#fff"/> New</button>)}
              <button onClick={creating?()=>{setCreating(false);setNewName("");setNewPrimary([]);setNewSecondary([]);}:onClose} style={{background:"#1e293b",border:"none",borderRadius:8,padding:6,cursor:"pointer",color:"#94a3b8"}}><Icon name={creating?"back":"close"} size={18}/></button>
            </div>
          </div>
          {!creating&&<>
            <div style={{position:"relative",marginBottom:10}}>
              <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search exercises..." style={{background:"#1e293b",border:"1px solid #334155",borderRadius:10,color:"#f1f5f9",padding:"9px 12px 9px 34px",fontSize:14,outline:"none",width:"100%",boxSizing:"border-box",fontFamily:"inherit"}}/>
              <div style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}}><Icon name="search" size={16} color="#64748b"/></div>
            </div>
            <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:6}}>
              {["All",...MUSCLE_CATEGORIES.map(c=>c.category)].map(cat=>(<button key={cat} onClick={()=>{setSelCat(cat);setSelMuscle(null);}} style={{flexShrink:0,padding:"5px 12px",borderRadius:20,fontSize:12,fontWeight:600,border:"none",cursor:"pointer",fontFamily:"inherit",background:selCat===cat?(getColorForCategory(cat)||"#6366f1"):"#1e293b",color:selCat===cat?"#fff":"#94a3b8"}}>{cat}</button>))}
            </div>
            {selCat!=="All"&&catMuscles&&(<div style={{display:"flex",gap:6,overflowX:"auto",paddingTop:6}}>
              <button onClick={()=>setSelMuscle(null)} style={{flexShrink:0,padding:"4px 10px",borderRadius:20,fontSize:11,fontWeight:600,border:"1px solid #334155",cursor:"pointer",fontFamily:"inherit",background:!selMuscle?"#334155":"transparent",color:!selMuscle?"#f1f5f9":"#64748b"}}>All muscles</button>
              {catMuscles.map(m=>(<button key={m} onClick={()=>setSelMuscle(selMuscle===m?null:m)} style={{flexShrink:0,padding:"4px 10px",borderRadius:20,fontSize:11,fontWeight:600,border:"none",cursor:"pointer",fontFamily:"inherit",background:selMuscle===m?getColorForMuscle(m):`${getColorForMuscle(m)}22`,color:selMuscle===m?"#fff":getColorForMuscle(m)}}>{m}</button>))}
            </div>)}
          </>}
        </div>
        {creating&&(
          <div style={{overflowY:"auto",flex:1,padding:"16px",display:"flex",flexDirection:"column",gap:14}}>
            <Inp label="Exercise Name" value={newName} onChange={e=>setNewName(e.target.value)} placeholder="e.g. Sissy Squat" style={{fontSize:15}}/>
            <div>
              <div style={{fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:"#94a3b8",marginBottom:8}}>Muscles <span style={{color:"#475569",fontWeight:500,textTransform:"none",fontSize:11}}>(at least one primary)</span></div>
              <MuscleSelector primary={newPrimary} secondary={newSecondary} onChange={(p,s)=>{setNewPrimary(p);setNewSecondary(s);}}/>
            </div>
            {newPrimary.length>0&&<div><div style={{fontSize:10,color:"#64748b",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4}}>Primary</div><MusclePills muscles={newPrimary}/></div>}
            {newSecondary.length>0&&<div><div style={{fontSize:10,color:"#475569",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4}}>Secondary</div><MusclePills muscles={newSecondary}/></div>}
            <Btn variant="primary" onClick={handleCreate} style={{justifyContent:"center",opacity:newName.trim()&&newPrimary.length?1:0.4}} disabled={!newName.trim()||!newPrimary.length}><Icon name="plus" size={15} color="#fff"/> Create &amp; Add to Workout</Btn>
          </div>
        )}
        {!creating&&(
          <div style={{overflowY:"auto",flex:1,paddingBottom:16}}>
            {Object.keys(grouped).length===0&&(<div style={{color:"#64748b",textAlign:"center",padding:30,fontSize:14}}>No exercises found{onCreateExercise&&<div style={{marginTop:10,fontSize:13,color:"#475569"}}>Tap <strong style={{color:"#6366f1"}}>+ New</strong> to create one</div>}</div>)}
            {Object.entries(grouped).map(([cat,exs])=>(
              <div key={cat}>
                <div style={{padding:"10px 16px 4px",display:"flex",alignItems:"center",gap:8,position:"sticky",top:0,background:"#0f172a",zIndex:1}}>
                  <div style={{width:7,height:7,borderRadius:"50%",background:getColorForCategory(cat)}}/>
                  <span style={{fontSize:11,fontWeight:700,color:getColorForCategory(cat),textTransform:"uppercase",letterSpacing:"0.08em"}}>{cat}</span>
                </div>
                {exs.map(ex=>(
                  <button key={ex.id} onClick={()=>onPick(ex)} style={{display:"flex",alignItems:"center",gap:12,width:"100%",padding:"10px 16px",background:"none",border:"none",cursor:"pointer",borderBottom:"1px solid #1e293b",textAlign:"left",fontFamily:"inherit"}}>
                    <div style={{width:36,height:36,borderRadius:10,background:`${getColorForMuscle(ex.muscles?.[0]||"")}22`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Icon name="dumbbell" size={17} color={getColorForMuscle(ex.muscles?.[0]||"")}/></div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}><span style={{fontWeight:600,fontSize:14,color:"#f1f5f9"}}>{ex.name}</span>{ex.id.startsWith("c")&&<span style={{fontSize:10,fontWeight:700,color:"#6366f1",background:"rgba(99,102,241,0.15)",padding:"1px 6px",borderRadius:6}}>custom</span>}</div>
                      <MusclePills muscles={ex.muscles||[]} max={3}/>
                    </div>
                  </button>
                ))}
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function Editor({workout,exercises,workouts,onSave,onCancel,preferredUnit}){
  const[w,setW]=useState(()=>{
    const base=workout||{id:Date.now().toString(),date:today(),name:"",entries:[],notes:"",unit:preferredUnit||"kg"};
    return {...base,unit:base.unit||preferredUnit||"kg",entries:base.entries.map((e,i)=>({_key:e._key||`${e.exerciseId}_${i}_init`,...e,unit:e.unit||base.unit||"kg"}))};
  });
  const[pick,setPick]=useState(false);
  const workoutUnit=w.unit||"kg";

  // When workout unit changes, propagate to all entries+sets that still match old unit
  function setWorkoutUnit(u){
    setW(p=>({...p,unit:u,entries:p.entries.map(e=>e.unit===workoutUnit?{...e,unit:u,sets:e.sets.map(s=>s.unit===workoutUnit?{...s,unit:u}:s)}:e)}));
  }

  const addEx=ex=>{setW(p=>({...p,entries:[...p.entries,{_key:`${ex.id}_${Date.now()}`,exerciseId:ex.id,sets:[{weight:"",reps:"",rir:"",side:"B",unit:workoutUnit}],note:"",unit:workoutUnit}]}));setPick(false);};
  const updE=(i,e)=>setW(p=>({...p,entries:p.entries.map((x,j)=>j===i?e:x)}));
  const remE=i=>setW(p=>({...p,entries:p.entries.filter((_,j)=>j!==i)}));
  const moveE=(i,dir)=>setW(p=>{const a=[...p.entries];const t=a[i];a[i]=a[i+dir];a[i+dir]=t;return {...p,entries:a};});
  const allMuscles=[...new Set(w.entries.flatMap(entry=>{const ex=exercises.find(x=>x.id===entry.exerciseId);return ex?.muscles||[]}))];
  const cats=[...new Set(allMuscles.map(m=>getCategoryForMuscle(m)))];
  const ok=w.name.trim()&&w.entries.length>0;
  const{ref:editorScrollRef,hidden:editorHeaderHidden}=useScrollHide();
  const editorHeaderRef=useRef(null);
  const[editorHeaderH,setEditorHeaderH]=useState(0);
  useEffect(()=>{
    const el=editorHeaderRef.current; if(!el) return;
    const ro=new ResizeObserver(()=>setEditorHeaderH(el.offsetHeight||0));
    ro.observe(el);
    setEditorHeaderH(el.offsetHeight||0);
    return()=>ro.disconnect();
  },[]);
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:"#0a0f1e",position:"relative"}}>
      <div ref={editorHeaderRef} style={{position:"absolute",top:0,left:0,right:0,zIndex:2,transform:editorHeaderHidden?"translateY(-100%)":"translateY(0)",transition:"transform 0.25s ease",willChange:"transform",background:"#0a0f1e"}}>
        <div style={{padding:"16px",borderBottom:"1px solid #1e293b",display:"flex",alignItems:"center",gap:10}}>
          <button onClick={onCancel} style={{background:"none",border:"none",cursor:"pointer",color:"#94a3b8",padding:4}}><Icon name="back" size={22}/></button>
          <span style={{fontWeight:800,fontSize:18,color:"#f1f5f9",flex:1}}>{workout?"Edit Workout":"New Workout"}</span>
          <UnitToggle unit={workoutUnit} onChange={setWorkoutUnit}/>
          <Btn variant={ok?"primary":"secondary"} onClick={()=>ok&&onSave(w)} style={{opacity:ok?1:0.4,padding:"8px 16px",fontSize:13}}><Icon name="check" size={15}/> Save</Btn>
        </div>
      </div>
      <div ref={editorScrollRef} style={{overflowY:"auto",flex:1,paddingTop:editorHeaderHidden?0:editorHeaderH,transition:"padding-top 0.25s ease",paddingLeft:16,paddingRight:16,paddingBottom:100,display:"flex",flexDirection:"column",gap:14}}>
        <Inp label="Workout Name" placeholder="e.g. Push Day, Leg Day..." value={w.name} onChange={e=>setW(p=>({...p,name:e.target.value}))}/>
        <DateInput value={w.date} onChange={d=>setW(p=>({...p,date:d}))} style={{background:"#1e293b",border:"1px solid #334155",borderRadius:10,color:"#f1f5f9",padding:"10px 12px",fontSize:14,outline:"none",width:"100%",fontFamily:"inherit"}}/>
        {cats.length>0&&<div><div style={{fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:"#94a3b8",marginBottom:6}}>Muscles Trained</div><MusclePills muscles={allMuscles}/></div>}
        <div>
          <div style={{fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:"#94a3b8",marginBottom:8}}>Exercises ({w.entries.length})</div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {w.entries.map((entry,i)=><WECard key={entry._key||i} entry={entry} exercises={exercises} workouts={workouts} onChange={e=>updE(i,e)} onRemove={()=>remE(i)} onMoveUp={()=>moveE(i,-1)} onMoveDown={()=>moveE(i,1)} isFirst={i===0} isLast={i===w.entries.length-1}/>)}
          </div>
          <button onClick={()=>setPick(true)} style={{marginTop:w.entries.length?10:0,width:"100%",padding:"14px",background:"#0f172a",border:"2px dashed #334155",borderRadius:16,cursor:"pointer",color:"#6366f1",fontSize:14,fontWeight:700,fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            <Icon name="plus" size={18} color="#6366f1"/> Add Exercise
          </button>
        </div>
        <TA label="Workout Notes" placeholder="General notes about this session..." value={w.notes} onChange={e=>setW(p=>({...p,notes:e.target.value}))}/>
      </div>
      {pick&&<Picker exercises={exercises} onPick={addEx} onClose={()=>setPick(false)}/>}
    </div>
  );
}

function Detail({workout,exercises,onBack,onEdit,onDelete,onSaveTemplate,existingTemplate}){
  const[tab,setTab]=useState("summary");
  const[tplName,setTplName]=useState(workout.name);
  const[saved,setSaved]=useState(false);
  const allMuscles=[...new Set(workout.entries.flatMap(entry=>{const ex=exercises.find(x=>x.id===entry.exerciseId);return ex?.muscles||[];}))];
  const handleSaveTemplate=()=>{onSaveTemplate(workout,tplName);setSaved(true);};
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:"#0a0f1e"}}>
      <div style={{padding:"16px",borderBottom:"1px solid #1e293b",display:"flex",alignItems:"center",gap:10}}>
        <button onClick={onBack} style={{background:"none",border:"none",cursor:"pointer",color:"#94a3b8"}}><Icon name="back" size={22}/></button>
        <span style={{fontWeight:800,fontSize:18,color:"#f1f5f9",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{workout.name}</span>
        <button onClick={onEdit} style={{background:"#1e293b",border:"none",borderRadius:8,padding:"7px 10px",cursor:"pointer",color:"#94a3b8"}}><Icon name="edit" size={17}/></button>
        <button onClick={onDelete} style={{background:"#450a0a",border:"none",borderRadius:8,padding:"7px 10px",cursor:"pointer",color:"#f87171"}}><Icon name="trash" size={17}/></button>
      </div>
      <div style={{display:"flex",borderBottom:"1px solid #1e293b",background:"#0a0f1e"}}>
        {[{id:"summary",label:"Summary",icon:"list"},{id:"template",label:"Save as Template",icon:"template"}].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:"11px 8px",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",borderBottom:tab===t.id?"2px solid #6366f1":"2px solid transparent",color:tab===t.id?"#6366f1":"#64748b",fontWeight:700,fontSize:13,marginBottom:"-1px"}}>
            <Icon name={t.icon} size={15} color={tab===t.id?"#6366f1":"#64748b"}/>{t.label}
          </button>
        ))}
      </div>
      {tab==="summary"&&(
        <div style={{overflowY:"auto",flex:1,padding:"16px",display:"flex",flexDirection:"column",gap:16}}>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <Icon name="calendar" size={16} color="#64748b"/>
            <span style={{color:"#94a3b8",fontSize:14}}>{fmtDate(workout.date)}</span>
            {workout.unit&&<span style={{fontSize:11,fontWeight:700,color:"#6366f1",background:"rgba(99,102,241,0.12)",padding:"2px 8px",borderRadius:6}}>{workout.unit.toUpperCase()}</span>}
          </div>
          <MusclePills muscles={allMuscles}/>
          {workout.notes&&<div style={{background:"#1e293b",borderRadius:12,padding:"12px 14px"}}><div style={{fontSize:11,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4}}>Session Notes</div><div style={{fontSize:14,color:"#94a3b8",lineHeight:1.5}}>{workout.notes}</div></div>}
          {workout.entries.map((entry,i)=>{
            const ex=exercises.find(e=>e.id===entry.exerciseId);
            const primaryColor=ex?.muscles?.[0]?getColorForMuscle(ex.muscles[0]):"#6366f1";
            return(
              <div key={i} style={{background:"#0f172a",borderRadius:16,border:"1px solid #1e293b"}}>
                <div style={{padding:"12px 14px",borderLeft:`3px solid ${primaryColor}`,borderRadius:"16px 16px 0 0"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
                    <div style={{fontWeight:700,fontSize:15,color:"#f1f5f9"}}>{ex?.name}</div>
                    {entry.unit&&<span style={{fontSize:10,fontWeight:700,color:"#64748b",background:"#1e293b",padding:"1px 6px",borderRadius:5}}>{entry.unit}</span>}
                  </div>
                  {ex&&(<div style={{display:"flex",flexWrap:"wrap",gap:3}}>
                    {(ex.primaryMuscles||[ex.muscles?.[0]].filter(Boolean)).map(m=>(<span key={m} style={{padding:"2px 7px",borderRadius:20,fontSize:11,fontWeight:700,background:`${getColorForMuscle(m)}33`,color:getColorForMuscle(m)}}>{m}</span>))}
                    {(ex.secondaryMuscles||ex.muscles?.slice(1)||[]).slice(0,2).map(m=>(<span key={m} style={{padding:"2px 7px",borderRadius:20,fontSize:11,fontWeight:600,background:"#1e293b",color:"#475569"}}>{m}</span>))}
                  </div>)}
                </div>
                {entry.note&&<div style={{margin:"0 14px 8px",background:"#1e293b",borderRadius:8,padding:"8px 12px",fontSize:13,color:"#94a3b8"}}>{entry.note}</div>}
                <div style={{padding:"0 14px 14px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4,marginTop:8}}>
                    <span style={{width:24,flexShrink:0,fontSize:10,fontWeight:700,color:"#475569",textAlign:"center"}}>#</span>
                    <span style={{flex:1,fontSize:10,fontWeight:700,color:"#475569",textAlign:"center",textTransform:"uppercase"}}>{entry.unit||"kg"}</span>
                    <span style={{flex:1,fontSize:10,fontWeight:700,color:"#475569",textAlign:"center",textTransform:"uppercase"}}>Reps</span>
                    <span style={{flex:1,fontSize:10,fontWeight:700,color:"#475569",textAlign:"center",textTransform:"uppercase"}}>RIR</span>
                    <span style={{width:36,flexShrink:0,fontSize:10,fontWeight:700,color:"#475569",textAlign:"center",textTransform:"uppercase"}}>Side</span>
                  </div>
                  {entry.sets.map((s,j)=>{
                    const sideLabel=s.side==="L"?"L":s.side==="R"?"R":"—";
                    const sideColor=s.side==="L"||s.side==="R"?"#6366f1":"#334155";
                    const rirDisplay=s.rir==="failure"?<span style={{fontSize:10,fontWeight:800,color:"#f87171"}}>FAIL</span>:s.rir!==""&&s.rir!=null?s.rir:"—";

                    const showUnitBadge=setUnit!==(entry.unit||workout.unit||"kg");
                    return(
                      <div key={j} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 0",borderBottom:j<entry.sets.length-1?"1px solid #1e293b":"none"}}>
                        <span style={{width:24,flexShrink:0,textAlign:"center",fontSize:12,color:"#475569",fontWeight:700}}>{j+1}</span>
                        <span style={{flex:1,textAlign:"center",fontSize:14,color:"#f1f5f9",fontWeight:600}}>
                          {s.weight||"—"}{showUnitBadge&&<span style={{fontSize:9,color:"#6366f1",marginLeft:2}}>{setUnit}</span>}
                        </span>
                        <span style={{flex:1,textAlign:"center",fontSize:14,color:"#f1f5f9",fontWeight:600}}>{s.reps||"—"}</span>
                        <span style={{flex:1,textAlign:"center",fontSize:13,color:"#94a3b8"}}>{rirDisplay}</span>
                        <span style={{width:36,flexShrink:0,textAlign:"center",fontSize:12,fontWeight:700,color:sideColor}}>{sideLabel}</span>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      )}
      {tab==="template"&&(
        <div style={{overflowY:"auto",flex:1,padding:"16px",display:"flex",flexDirection:"column",gap:14}}>
          <div style={{background:"#0f172a",borderRadius:14,padding:"14px",border:"1px solid #1e293b"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}><Icon name="template" size={18} color="#6366f1"/><span style={{fontWeight:700,fontSize:14,color:"#f1f5f9"}}>How templates work</span></div>
            <div style={{fontSize:13,color:"#94a3b8",lineHeight:1.7}}>Saves all exercises and weights from this workout — but clears reps and RIR so you can fill them in fresh each session.</div>
          </div>
          {!saved&&<Inp label="Template Name" value={tplName} onChange={e=>setTplName(e.target.value)} placeholder="e.g. Push Day A"/>}
          <div>
            <div style={{fontSize:11,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>{saved?"Saved Template":"Preview — weights kept, reps cleared"}</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {workout.entries.map((entry,i)=>{
                const ex=exercises.find(e=>e.id===entry.exerciseId);
                const col=ex?.muscles?.[0]?getColorForMuscle(ex.muscles[0]):"#6366f1";
                return(
                  <div key={i} style={{background:"#0f172a",borderRadius:14,overflow:"hidden",border:"1px solid #1e293b"}}>
                    <div style={{padding:"10px 14px",borderLeft:`3px solid ${col}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div><div style={{fontWeight:700,fontSize:14,color:"#f1f5f9"}}>{ex?.name}</div><div style={{fontSize:11,color:"#475569",marginTop:2}}>{entry.sets.length} set{entry.sets.length!==1?"s":""}</div></div>
