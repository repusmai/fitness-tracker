                    <div style={{padding:"6px 14px 10px"}}>
                      <div style={{display:"grid",gridTemplateColumns:"28px 1fr 1fr 1fr",gap:6,marginBottom:4}}>
                        <span style={{fontSize:10,fontWeight:700,color:"#475569",textAlign:"center"}}>#</span>
                        {["kg","Reps","RIR"].map(h=><span key={h} style={{fontSize:10,fontWeight:700,color:"#475569",textAlign:"center",textTransform:"uppercase"}}>{h}</span>)}
                      </div>
                      {entry.sets.map((s,j)=>(
                        <div key={j} style={{display:"grid",gridTemplateColumns:"28px 1fr 1fr 1fr",gap:6,padding:"4px 0"}}>
                          <span style={{textAlign:"center",fontSize:12,color:"#475569",fontWeight:700}}>{j+1}</span>
                          <span style={{textAlign:"center",fontSize:13,color:"#f1f5f9",fontWeight:600}}>{s.weight||"—"}</span>
                          <span style={{textAlign:"center",fontSize:13,color:"#334155"}}>—</span>
                          <span style={{textAlign:"center",fontSize:13,color:"#334155"}}>—</span>
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
          {saved?(<div style={{background:"#052e16",border:"1px solid #16a34a",borderRadius:14,padding:"14px",textAlign:"center"}}><div style={{color:"#22c55e",fontWeight:700,fontSize:15,marginBottom:4}}>✓ Template saved!</div><div style={{color:"#4ade80",fontSize:13}}>Find it on the Log screen to start a new session from it.</div></div>)
            :(<Btn variant="primary" onClick={handleSaveTemplate} disabled={!tplName.trim()} style={{width:"100%",justifyContent:"center",padding:"13px",fontSize:14}}><Icon name="template" size={16}/> Save Template</Btn>)}
          {existingTemplate&&!saved&&(<div style={{fontSize:12,color:"#475569",textAlign:"center"}}>A template already exists for this workout — saving will create an additional one.</div>)}
        </div>
      )}
    </div>
  );
}

function Library({exercises,setExercises}){
  const[selCat,setSelCat]=useState("All");
  const[selMuscle,setSelMuscle]=useState(null);
  const[q,setQ]=useState("");
  const[adding,setAdding]=useState(false);
  const[editMode,setEditMode]=useState(false);
  const[newName,setNewName]=useState("");
  const[newPrimary,setNewPrimary]=useState([]);
  const[newSecondary,setNewSecondary]=useState([]);
  const catMuscles=selCat==="All"?null:MUSCLE_CATEGORIES.find(c=>c.category===selCat)?.muscles;
  const filtered=exercises.filter(e=>{
    const nm=e.name.toLowerCase().includes(q.toLowerCase());
    if(!nm) return false;
    if(selMuscle) return e.muscles?.includes(selMuscle);
    if(selCat!=="All") return e.muscles?.some(m=>catMuscles?.includes(m));
    return true;
  });
  const grouped={};
  filtered.forEach(ex=>{const cat=getPrimaryCategory(ex);if(!grouped[cat])grouped[cat]=[];grouped[cat].push(ex);});
  const[confirmDel,setConfirmDel]=useState(null);
  const addCustom=()=>{
    if(!newName.trim()||!newPrimary.length) return;
    const muscles=[...newPrimary,...newSecondary];
    setExercises(p=>[...p,{id:"c"+Date.now(),name:newName.trim(),muscles,primaryMuscles:newPrimary,secondaryMuscles:newSecondary}]);
    setNewName("");setNewPrimary([]);setNewSecondary([]);setAdding(false);
  };
  const remEx=id=>{setExercises(p=>p.filter(e=>e.id!==id));setConfirmDel(null);};
  const hiddenCount=DEFAULT_EXERCISES.filter(d=>!exercises.some(e=>e.id===d.id)).length;
  const restoreDefaults=()=>setExercises(p=>{const ids=new Set(p.map(e=>e.id));return [...p,...DEFAULT_EXERCISES.filter(e=>!ids.has(e.id))];});
  const{ref:scrollRef,hidden:headerHidden}=useScrollHide();
  const headerRef=useRef(null);
  const[headerH,setHeaderH]=useState(0);
  useEffect(()=>{
    const el=headerRef.current; if(!el) return;
    const ro=new ResizeObserver(()=>setHeaderH(el.offsetHeight||0));
    ro.observe(el);
    setHeaderH(el.offsetHeight||0);
    return()=>ro.disconnect();
  },[]);
  const kbHeight=useKeyboardHeight();
  return(
    <div style={{display:"flex",flexDirection:"column",height:`calc(100% - ${kbHeight}px)`,background:"#0a0f1e",transition:"height 0.15s ease",position:"relative"}}>
      <div ref={headerRef} style={{position:"absolute",top:0,left:0,right:0,zIndex:2,transform:headerHidden?"translateY(-100%)":"translateY(0)",transition:"transform 0.25s ease",willChange:"transform",background:"#0a0f1e"}}>
        <div style={{padding:"20px 16px 12px",borderBottom:"1px solid #1e293b"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <span style={{fontWeight:800,fontSize:20,color:"#f1f5f9"}}>Exercise Library</span>
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>{setEditMode(v=>!v);setAdding(false);setConfirmDel(null);}} style={{background:editMode?"rgba(239,68,68,0.15)":"#1e293b",border:editMode?"1px solid rgba(239,68,68,0.3)":"1px solid transparent",borderRadius:10,padding:"7px 12px",cursor:"pointer",color:editMode?"#f87171":"#94a3b8",fontSize:12,fontWeight:700,fontFamily:"inherit"}}>{editMode?"Done":"Edit"}</button>
              <Btn variant="primary" onClick={()=>{setAdding(v=>!v);setEditMode(false);}} style={{padding:"7px 12px",fontSize:12}}><Icon name="plus" size={14}/> Custom</Btn>
            </div>
          </div>
          <div style={{position:"relative",marginBottom:10}}>
            <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search..." style={{background:"#1e293b",border:"1px solid #334155",borderRadius:10,color:"#f1f5f9",padding:"9px 12px 9px 34px",fontSize:14,outline:"none",width:"100%",boxSizing:"border-box",fontFamily:"inherit"}}/>
            <div style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}}><Icon name="search" size={16} color="#64748b"/></div>
          </div>
          <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:6}}>
            {["All",...MUSCLE_CATEGORIES.map(c=>c.category)].map(cat=>(<button key={cat} onClick={()=>{setSelCat(cat);setSelMuscle(null);}} style={{flexShrink:0,padding:"5px 12px",borderRadius:20,fontSize:12,fontWeight:600,border:"none",cursor:"pointer",fontFamily:"inherit",background:selCat===cat?(getColorForCategory(cat)||"#6366f1"):"#1e293b",color:selCat===cat?"#fff":"#94a3b8"}}>{cat}</button>))}
          </div>
          {selCat!=="All"&&catMuscles&&(<div style={{display:"flex",gap:6,overflowX:"auto",paddingTop:6}}>
            <button onClick={()=>setSelMuscle(null)} style={{flexShrink:0,padding:"4px 10px",borderRadius:20,fontSize:11,fontWeight:600,border:"1px solid #334155",cursor:"pointer",fontFamily:"inherit",background:!selMuscle?"#334155":"transparent",color:!selMuscle?"#f1f5f9":"#64748b"}}>All</button>
            {catMuscles.map(m=>(<button key={m} onClick={()=>setSelMuscle(selMuscle===m?null:m)} style={{flexShrink:0,padding:"4px 10px",borderRadius:20,fontSize:11,fontWeight:600,border:"none",cursor:"pointer",fontFamily:"inherit",background:selMuscle===m?getColorForMuscle(m):`${getColorForMuscle(m)}22`,color:selMuscle===m?"#fff":getColorForMuscle(m)}}>{m}</button>))}
          </div>)}
        </div>
      </div>
      <div ref={scrollRef} style={{overflowY:"auto",flex:1,paddingTop:headerHidden?0:headerH,transition:"padding-top 0.25s ease"}}>
        {editMode&&(<div style={{margin:"12px 16px 4px",background:"rgba(239,68,68,0.07)",border:"1px solid rgba(239,68,68,0.18)",borderRadius:12,padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
          <span style={{fontSize:12,color:"#fca5a5",lineHeight:1.4}}>Tap the trash icon to remove any exercise.</span>
          {hiddenCount>0&&(<button onClick={restoreDefaults} style={{flexShrink:0,background:"rgba(239,68,68,0.18)",border:"none",borderRadius:8,padding:"5px 10px",color:"#f87171",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>Restore {hiddenCount} default{hiddenCount>1?"s":""}</button>)}
        </div>)}
        {adding&&(<div style={{margin:16,background:"#0f172a",border:"1px solid #334155",borderRadius:16,padding:14,display:"flex",flexDirection:"column",gap:12}}>
          <Inp label="Exercise Name" value={newName} onChange={e=>setNewName(e.target.value)} placeholder="e.g. Sissy Squat"/>
          <div><div style={{fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:"#94a3b8",marginBottom:8}}>Muscles <span style={{color:"#475569",fontWeight:500,textTransform:"none",fontSize:11}}>(at least one primary)</span></div><MuscleSelector primary={newPrimary} secondary={newSecondary} onChange={(p,s)=>{setNewPrimary(p);setNewSecondary(s);}}/></div>
          {newPrimary.length>0&&<div><span style={{fontSize:10,color:"#64748b",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em"}}>Primary: </span><MusclePills muscles={newPrimary}/></div>}
          {newSecondary.length>0&&<div><span style={{fontSize:10,color:"#475569",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em"}}>Secondary: </span><MusclePills muscles={newSecondary}/></div>}
          <div style={{display:"flex",gap:8}}>
            <Btn variant="primary" onClick={addCustom} style={{flex:1,justifyContent:"center"}} disabled={!newName.trim()||!newPrimary.length}>Add Exercise</Btn>
            <Btn variant="secondary" onClick={()=>{setAdding(false);setNewPrimary([]);setNewSecondary([]);setNewName("");}} style={{flex:1,justifyContent:"center"}}>Cancel</Btn>
          </div>
        </div>)}
        {Object.keys(grouped).length===0&&!adding&&<div style={{color:"#64748b",textAlign:"center",padding:"40px 20px",fontSize:14}}>No exercises found</div>}
        {Object.entries(grouped).map(([cat,exs])=>(
          <div key={cat}>
            <div style={{padding:"12px 16px 4px",display:"flex",alignItems:"center",gap:8,position:"sticky",top:0,background:"#0a0f1e",zIndex:1}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:getColorForCategory(cat)}}/>
              <span style={{fontSize:12,fontWeight:700,color:getColorForCategory(cat),textTransform:"uppercase",letterSpacing:"0.08em"}}>{cat}</span>
              <span style={{fontSize:11,color:"#475569"}}>({exs.length})</span>
            </div>
            {exs.map(ex=>{
              const isCustom=ex.id.startsWith("c");
              const isPending=confirmDel===ex.id;
              return(
                <div key={ex.id} style={{borderBottom:"1px solid #0f172a"}}>
                  <div style={{padding:"10px 16px",display:"flex",alignItems:"center",gap:12}}>
                    <div style={{width:34,height:34,borderRadius:10,background:`${getColorForMuscle(ex.muscles?.[0]||"")}22`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Icon name="dumbbell" size={16} color={getColorForMuscle(ex.muscles?.[0]||"")}/></div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}><span style={{fontSize:14,fontWeight:600,color:"#e2e8f0"}}>{ex.name}</span>{isCustom&&<span style={{fontSize:10,fontWeight:700,color:"#6366f1",background:"rgba(99,102,241,0.15)",padding:"1px 6px",borderRadius:6}}>custom</span>}</div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
                        {(ex.primaryMuscles||[ex.muscles?.[0]].filter(Boolean)).map(m=>(<span key={m} style={{padding:"2px 7px",borderRadius:20,fontSize:11,fontWeight:700,background:`${getColorForMuscle(m)}33`,color:getColorForMuscle(m)}}>{m}</span>))}
                        {(ex.secondaryMuscles||ex.muscles?.slice(1)||[]).slice(0,2).map(m=>(<span key={m} style={{padding:"2px 7px",borderRadius:20,fontSize:11,fontWeight:600,background:"#1e293b",color:"#475569"}}>{m}</span>))}
                      </div>
                    </div>
                    {editMode&&(<button onClick={()=>setConfirmDel(isPending?null:ex.id)} style={{background:isPending?"rgba(239,68,68,0.12)":"none",border:"none",borderRadius:8,cursor:"pointer",color:isPending?"#ef4444":"#475569",padding:"6px 8px",flexShrink:0,transition:"all 0.15s"}}><Icon name="trash" size={15} color={isPending?"#ef4444":"#475569"}/></button>)}
                  </div>
                  {isPending&&editMode&&(<div style={{margin:"0 16px 10px",background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:10,padding:"10px 12px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
                    <span style={{fontSize:12,color:"#fca5a5"}}>Delete <strong>{ex.name}</strong>?{!isCustom&&" You can restore it later."}</span>
                    <div style={{display:"flex",gap:6,flexShrink:0}}>
                      <button onClick={()=>setConfirmDel(null)} style={{background:"#1e293b",border:"none",borderRadius:7,padding:"5px 10px",cursor:"pointer",color:"#94a3b8",fontSize:12,fontFamily:"inherit",fontWeight:600}}>Cancel</button>
                      <button onClick={()=>remEx(ex.id)} style={{background:"#ef4444",border:"none",borderRadius:7,padding:"5px 10px",cursor:"pointer",color:"#fff",fontSize:12,fontFamily:"inherit",fontWeight:700}}>Delete</button>
                    </div>
                  </div>)}
                </div>
              );
            })}
          </div>
        ))}
      </div>
    </div>
  );
}

function Log({workouts,exercises,templates,onNew,onQuickLog,onView,onNewFromTemplate,onDeleteTemplate,showInstall,onDismissInstall,isOnline,updateReady,onApplyUpdate}){
  const[section,setSection]=useState("log");
  const sorted=[...workouts].sort((a,b)=>b.date.localeCompare(a.date));
  const ts=countSetsWorkouts(workouts,exercises);
  const{ref:scrollRef,hidden:headerHidden}=useScrollHide();
  const logHeaderRef=useRef(null);
  const[logHeaderH,setLogHeaderH]=useState(0);
  useEffect(()=>{
    const el=logHeaderRef.current; if(!el) return;
    const ro=new ResizeObserver(()=>setLogHeaderH(el.offsetHeight||0));
    ro.observe(el);
    setLogHeaderH(el.offsetHeight||0);
    return()=>ro.disconnect();
  },[]);
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:"#0a0f1e",position:"relative"}}>
      <div ref={logHeaderRef} style={{position:"absolute",top:0,left:0,right:0,zIndex:2,transform:headerHidden?"translateY(-100%)":"translateY(0)",transition:"transform 0.25s ease",willChange:"transform",background:"#0a0f1e"}}>
        <div style={{padding:"24px 16px 0"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
            <div>
              <div style={{fontSize:13,fontWeight:600,color:"#6366f1",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:4}}>My Fitness</div>
              <div style={{fontSize:26,fontWeight:900,color:"#f1f5f9",letterSpacing:"-0.02em"}}>Workout Log</div>
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <Btn variant="primary" onClick={onQuickLog} style={{padding:"10px 14px",borderRadius:14,gap:6}}><Icon name="play" size={15} color="#fff"/> Start</Btn>
              <button onClick={onNew} style={{width:38,height:38,borderRadius:12,background:"#1e293b",border:"1px solid #334155",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#64748b"}}><Icon name="edit" size={16} color="#64748b"/></button>
            </div>
          </div>

          {/* Update ready banner */}
          {updateReady&&(
            <div style={{marginBottom:12,background:"linear-gradient(135deg,rgba(99,102,241,0.15),rgba(139,92,246,0.1))",border:"1px solid rgba(99,102,241,0.4)",borderRadius:14,padding:"10px 14px",display:"flex",alignItems:"center",gap:10}}>
              <Icon name="refresh" size={16} color="#818cf8"/>
              <span style={{flex:1,fontSize:13,color:"#c7d2fe",fontWeight:600}}>Update ready to install</span>
              <button onClick={onApplyUpdate} style={{background:"linear-gradient(135deg,#6366f1,#8b5cf6)",border:"none",borderRadius:8,padding:"6px 12px",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Reload</button>
            </div>
          )}

          {showInstall&&<InstallBanner onDismiss={onDismissInstall}/>}
          <div style={{display:"flex",gap:0,marginTop:14,background:"#0f172a",borderRadius:12,padding:3,border:"1px solid #1e293b"}}>
            {[{id:"log",label:"History"},{id:"templates",label:`Templates${templates.length?` (${templates.length})`:""}`}].map(s=>(
              <button key={s.id} onClick={()=>setSection(s.id)} style={{flex:1,padding:"8px",borderRadius:9,border:"none",cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:13,background:section===s.id?"#1e293b":"transparent",color:section===s.id?"#f1f5f9":"#64748b",transition:"all 0.15s"}}>{s.label}</button>
            ))}
          </div>
        </div>
      </div>
      <div ref={scrollRef} style={{flex:1,overflowY:"auto",paddingTop:headerHidden?0:logHeaderH,transition:"padding-top 0.25s ease"}}>
        {section==="log"&&(<>
          <div style={{padding:"14px 16px 0"}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
              {[{l:"Sessions",v:workouts.length,i:"fire"},{l:"Exercises",v:workouts.reduce((a,w)=>a+w.entries.length,0),i:"dumbbell"},{l:"Total Sets",v:fmtSets(ts),i:"list"}].map(s=>(
                <div key={s.l} style={{background:"#0f172a",borderRadius:14,padding:"12px 10px",border:"1px solid #1e293b",textAlign:"center"}}>
                  <div style={{color:"#6366f1",marginBottom:4}}><Icon name={s.i} size={18} color="#6366f1"/></div>
                  <div style={{fontSize:22,fontWeight:900,color:"#f1f5f9"}}>{s.v}</div>
                  <div style={{fontSize:10,color:"#64748b",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em"}}>{s.l}</div>
                </div>
              ))}
            </div>
          </div>
          <div style={{padding:"12px 16px 16px"}}>
            {sorted.length===0?(<div style={{textAlign:"center",padding:"60px 20px"}}><div style={{marginBottom:16,opacity:0.3}}><Icon name="dumbbell" size={48} color="#6366f1"/></div><div style={{fontSize:18,fontWeight:700,color:"#475569",marginBottom:8}}>No workouts yet</div><div style={{fontSize:14,color:"#334155"}}>Tap + to log your first session</div></div>):(
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {sorted.map(w=>{
                  const muscles=[...new Set(w.entries.flatMap(e=>{const ex=exercises.find(x=>x.id===e.exerciseId);return ex?.muscles||[];}))]
                  const sets=countSets(w.entries,exercises);
                  return(
                    <button key={w.id} onClick={()=>onView(w)} style={{background:"#0f172a",border:"1px solid #1e293b",borderRadius:16,padding:"14px",textAlign:"left",cursor:"pointer",fontFamily:"inherit",width:"100%"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}><div style={{fontWeight:800,fontSize:16,color:"#f1f5f9"}}>{w.name}</div><div style={{fontSize:12,color:"#64748b",flexShrink:0,marginLeft:8}}>{fmtDate(w.date)}</div></div>
                      <div style={{marginBottom:8}}><MusclePills muscles={muscles} max={5}/></div>
                      <div style={{display:"flex",gap:14}}><span style={{fontSize:12,color:"#64748b"}}><span style={{color:"#94a3b8",fontWeight:700}}>{w.entries.length}</span> exercises</span><span style={{fontSize:12,color:"#64748b"}}><span style={{color:"#94a3b8",fontWeight:700}}>{fmtSets(sets)}</span> sets</span></div>
                    </button>
                  );
                })}
              </div>
            )}
          </div>
        </>)}
        {section==="templates"&&(
          <div style={{padding:"14px 16px 16px",display:"flex",flexDirection:"column",gap:10}}>
            {templates.length===0?(<div style={{textAlign:"center",padding:"60px 20px"}}><div style={{marginBottom:16,opacity:0.3}}><Icon name="template" size={48} color="#6366f1"/></div><div style={{fontSize:18,fontWeight:700,color:"#475569",marginBottom:8}}>No templates yet</div><div style={{fontSize:14,color:"#334155",lineHeight:1.6}}>Open any workout, go to the <span style={{color:"#6366f1",fontWeight:600}}>Save as Template</span> tab, and save it.</div></div>):(
              templates.map(tpl=>{
                const muscles=[...new Set(tpl.entries.flatMap(e=>{const ex=exercises.find(x=>x.id===e.exerciseId);return ex?.muscles||[];}))]
                const totalSets=tpl.entries.reduce((a,e)=>a+e.sets.length,0);
                return(
                  <div key={tpl.id} style={{background:"#0f172a",border:"1px solid #1e293b",borderRadius:16,overflow:"hidden"}}>
                    <div style={{padding:"14px 14px 10px"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}><div style={{fontWeight:800,fontSize:16,color:"#f1f5f9",flex:1,marginRight:8}}>{tpl.name}</div><button onClick={()=>onDeleteTemplate(tpl.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#475569",padding:2,flexShrink:0}}><Icon name="trash" size={15}/></button></div>
                      <div style={{marginBottom:8}}><MusclePills muscles={muscles} max={5}/></div>
                      <div style={{display:"flex",gap:14}}><span style={{fontSize:12,color:"#64748b"}}><span style={{color:"#94a3b8",fontWeight:700}}>{tpl.entries.length}</span> exercises</span><span style={{fontSize:12,color:"#64748b"}}><span style={{color:"#94a3b8",fontWeight:700}}>{totalSets}</span> sets</span></div>
                    </div>
                    <div style={{borderTop:"1px solid #1e293b",padding:"8px 14px 6px",display:"flex",flexDirection:"column",gap:4}}>
                      {tpl.entries.map((entry,i)=>{const ex=exercises.find(e=>e.id===entry.exerciseId);const col=ex?.muscles?.[0]?getColorForMuscle(ex.muscles[0]):"#6366f1";const eu=entry.unit||tpl.unit||"kg";return(<div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"4px 0"}}><div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:6,height:6,borderRadius:"50%",background:col,flexShrink:0}}/><span style={{fontSize:13,color:"#cbd5e1",fontWeight:500}}>{ex?.name}</span></div><span style={{fontSize:12,color:"#475569"}}>{entry.sets.map(s=>s.weight||"?").join(" / ")} {eu} × {entry.sets.length}</span></div>);})}
                    </div>
                    <div style={{padding:"10px 14px 14px"}}><Btn variant="primary" onClick={()=>onNewFromTemplate(tpl)} style={{width:"100%",justifyContent:"center",padding:"11px",fontSize:14}}><Icon name="play" size={14} color="#fff"/> Start Workout</Btn></div>
                  </div>
                );
              })
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// ── Settings Tab — consolidated Data & Updates ────────────────────────────────
const SectionHeader=({label})=>(<div style={{padding:"10px 16px 8px",borderBottom:"1px solid #1e293b"}}><span style={{fontSize:11,fontWeight:700,color:"#475569",textTransform:"uppercase",letterSpacing:"0.08em"}}>{label}</span></div>);

function SettingsTab({data,onRestore,isOnline,preferredUnit,onSetPreferredUnit}){
  const[status,setStatus]=useState(null); // null | "checking" | "latest" | "updated"
  const[updating,setUpdating]=useState(false);
  const[importState,setImportState]=useState(null);
  const[importPreview,setImportPreview]=useState(null);
  const[snapshots,setSnapshots]=useState([]);
  const[showSnapshots,setShowSnapshots]=useState(false);
  const[restoreSnap,setRestoreSnap]=useState(null);

  // Drive state
  const[driveStatus,setDriveStatus]=useState(null); // null | "backing-up" | "success" | "error" | "restoring" | "restore-confirm"
  const[driveMsg,setDriveMsg]=useState("");
  const[driveRestore,setDriveRestore]=useState(null); // {data, modifiedTime}
  const[autoBackup,setAutoBackup]=useState(()=>getDrivePrefs().autoBackup||false);
  const[lastBackup,setLastBackup]=useState(()=>{const t=getDrivePrefs().lastBackup;return t?new Date(t):null;});
  const clientIdSet = GOOGLE_CLIENT_ID !== "YOUR_GOOGLE_CLIENT_ID_HERE";

  const fileRef=useRef(null);

  useEffect(()=>{
    listSnapshots().then(snaps=>setSnapshots(snaps));
  },[]);

  // Auto-backup on open if enabled and >24h since last backup
  useEffect(()=>{
    if(!autoBackup||!isOnline||!clientIdSet) return;
    const prefs=getDrivePrefs();
    const lastTs=prefs.lastBackup||0;
    const age=Date.now()-lastTs;
    if(age>24*60*60*1000){
      // Fire and forget
      uploadToDrive(data).then(()=>{
        const now=new Date();
        setLastBackup(now);
      }).catch(()=>{});
    }
  },[]);

  async function checkForUpdate(){
    setUpdating(true); setStatus("checking");
    try {
      const reg=await navigator.serviceWorker.getRegistration();
      if(reg){
        await reg.update();
        await new Promise(r=>setTimeout(r,1500));
        if(reg.waiting){reg.waiting.postMessage({type:"SKIP_WAITING"});setTimeout(()=>window.location.reload(),300);setStatus("updated");}
        else{setStatus("latest");setUpdating(false);}
      } else { window.location.reload(true); }
    } catch { window.location.reload(true); }
  }

  function handleExport(){
    const json=JSON.stringify(data,null,2);
    const blob=new Blob([json],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url; a.download=`fitness-backup-${new Date().toISOString().slice(0,10)}.json`; a.click();
    URL.revokeObjectURL(url);
  }

  function handleFileSelect(e){
    const file=e.target.files?.[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try {
        const parsed=JSON.parse(ev.target.result);
        if(!parsed.workouts||!parsed.exercises) throw new Error("Invalid format");
        setImportPreview(parsed); setImportState("confirm");
      } catch { setImportState("error"); }
    };
    reader.readAsText(file); e.target.value="";
  }

  function confirmImport(){ onRestore(importPreview); setImportState("success"); setImportPreview(null); }

  async function handleDriveBackup(){
    if(!clientIdSet){ setDriveMsg("Please set your Google Client ID first (see comments in the HTML)"); setDriveStatus("error"); return; }
    setDriveStatus("backing-up"); setDriveMsg("");
    try {
      await uploadToDrive(data);
      const now=new Date();
      setLastBackup(now);
      setDriveStatus("success"); setDriveMsg(`Backed up at ${now.toLocaleTimeString()}`);
    } catch(err) {
      setDriveStatus("error"); setDriveMsg(err.message||"Backup failed");
    }
  }

  async function handleDriveRestore(){
    if(!clientIdSet){ setDriveMsg("Please set your Google Client ID first"); setDriveStatus("error"); return; }
    setDriveStatus("restoring"); setDriveMsg("");
    try {
      const result=await restoreFromDrive();
      setDriveRestore(result);
      setDriveStatus("restore-confirm");
    } catch(err) {
      setDriveStatus("error"); setDriveMsg(err.message||"Restore failed");
    }
  }

  function confirmDriveRestore(){
    if(driveRestore?.data){ onRestore(driveRestore.data); setDriveStatus("success"); setDriveMsg("Data restored from Drive"); setDriveRestore(null); }
  }

  function toggleAutoBackup(v){
    setAutoBackup(v);
    const prefs=getDrivePrefs();
    saveDrivePrefs({...prefs, autoBackup:v});
  }

  async function restoreSnapshot(snap){
    try {
      const d=JSON.parse(snap.data);
      onRestore(d);
      setRestoreSnap(null);
      setShowSnapshots(false);
    } catch { alert("Snapshot data is corrupted"); }
  }

  // Track which sections are collapsed (all open by default)
  const[collapsed,setCollapsed]=useState({});
  const toggleSection=id=>setCollapsed(p=>({...p,[id]:!p[id]}));

  const CollapsibleCard=({id,label,children})=>{
    const isCollapsed=!!collapsed[id];
    return(
      <div style={{background:"#0f172a",borderRadius:16,border:"1px solid #1e293b"}}>
        <button onClick={()=>toggleSection(id)} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 16px 10px",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",borderBottom:isCollapsed?"none":"1px solid #1e293b"}}>
          <span style={{fontSize:11,fontWeight:700,color:"#475569",textTransform:"uppercase",letterSpacing:"0.08em"}}>{label}</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#475569" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{transform:isCollapsed?"rotate(-90deg)":"rotate(0deg)",transition:"transform 0.2s",flexShrink:0}}><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        {!isCollapsed&&children}
      </div>
    );
  };

  const Row=({icon,title,subtitle,right,onClick,danger,iconBg})=>(
    <button onClick={onClick} disabled={!onClick} style={{width:"100%",display:"flex",alignItems:"center",gap:12,padding:"14px 16px",background:"none",border:"none",cursor:onClick?"pointer":"default",fontFamily:"inherit",textAlign:"left",borderBottom:"1px solid #1e293b"}}>
      <div style={{width:36,height:36,borderRadius:10,flexShrink:0,background:iconBg||(danger?"rgba(239,68,68,0.12)":"#1e293b"),display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name={icon} size={18} color={danger?"#ef4444":"#94a3b8"}/></div>
      <div style={{flex:1,minWidth:0}}><div style={{fontSize:14,fontWeight:600,color:danger?"#ef4444":"#f1f5f9"}}>{title}</div>{subtitle&&<div style={{fontSize:12,color:"#475569",marginTop:1}}>{subtitle}</div>}</div>
      {right&&<div style={{flexShrink:0,marginLeft:4}}>{right}</div>}
    </button>
  );

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:"#0a0f1e"}}>
      <div style={{padding:"24px 16px 16px",borderBottom:"1px solid #1e293b"}}>
        <div style={{fontSize:13,fontWeight:600,color:"#6366f1",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:4}}>Preferences</div>
        <div style={{fontSize:26,fontWeight:900,color:"#f1f5f9",letterSpacing:"-0.02em"}}>Settings</div>
      </div>
      <div style={{overflowY:"auto",flex:1,padding:"16px",display:"flex",flexDirection:"column",gap:14}}>

        {/* ── Google Drive Backup ── */}
        <CollapsibleCard id="drive" label="Google Drive Backup">

          {!clientIdSet&&(
            <div style={{margin:"12px 16px",background:"rgba(234,179,8,0.08)",border:"1px solid rgba(234,179,8,0.25)",borderRadius:12,padding:"12px 14px"}}>
              <div style={{fontSize:13,fontWeight:700,color:"#fbbf24",marginBottom:6}}>⚠ Setup required</div>
              <div style={{fontSize:12,color:"#92400e",lineHeight:1.6}}>
                Replace <code style={{background:"#1e293b",padding:"1px 5px",borderRadius:4,color:"#f59e0b"}}>YOUR_GOOGLE_CLIENT_ID_HERE</code> in the HTML with your OAuth Client ID.<br/>
                Steps: <strong style={{color:"#fbbf24"}}>console.cloud.google.com</strong> → New project → APIs &amp; Services → Credentials → Create OAuth Client ID → Web application → add your GitHub Pages URL to Authorised JavaScript origins.
              </div>
            </div>
          )}

          {/* Back up now */}
          <div style={{padding:"14px 16px",borderBottom:"1px solid #1e293b"}}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:driveStatus?"10px":0}}>
              <div style={{width:36,height:36,borderRadius:10,background:"rgba(26,115,232,0.15)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Icon name="cloud" size={18} color="#4285f4"/></div>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:600,color:"#f1f5f9"}}>Back up to Drive</div>
                <div style={{fontSize:12,color:"#475569",marginTop:1}}>{lastBackup?`Last backup: ${lastBackup.toLocaleDateString()} ${lastBackup.toLocaleTimeString()}`:"No backup yet"}</div>
              </div>
              <Btn variant="drive" onClick={handleDriveBackup} style={{padding:"7px 14px",fontSize:12,flexShrink:0}} disabled={driveStatus==="backing-up"}>
                {driveStatus==="backing-up"?<><div style={{width:12,height:12,border:"2px solid rgba(255,255,255,0.3)",borderTopColor:"#fff",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/> Saving…</>:<><Icon name="upload" size={13} color="#fff"/> Backup</>}
              </Btn>
            </div>
            {driveStatus==="success"&&<div style={{fontSize:12,color:"#22c55e",marginTop:4}}>✓ {driveMsg}</div>}
            {driveStatus==="error"&&<div style={{fontSize:12,color:"#ef4444",marginTop:4}}>✗ {driveMsg}</div>}
            {driveStatus==="restore-confirm"&&driveRestore&&(
              <div style={{background:"rgba(99,102,241,0.08)",border:"1px solid rgba(99,102,241,0.25)",borderRadius:12,padding:"12px 14px",marginTop:8}}>
                <div style={{fontSize:13,fontWeight:700,color:"#f1f5f9",marginBottom:4}}>Replace current data?</div>
                <div style={{fontSize:12,color:"#94a3b8",marginBottom:10}}>Drive backup from <strong style={{color:"#f1f5f9"}}>{new Date(driveRestore.modifiedTime).toLocaleString()}</strong> — contains <strong style={{color:"#f1f5f9"}}>{driveRestore.data.workouts?.length||0} workouts</strong>.</div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>{setDriveStatus(null);setDriveRestore(null);}} style={{flex:1,background:"#1e293b",border:"none",borderRadius:10,padding:"9px",cursor:"pointer",color:"#94a3b8",fontSize:13,fontWeight:600,fontFamily:"inherit"}}>Cancel</button>
                  <button onClick={confirmDriveRestore} style={{flex:1,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",border:"none",borderRadius:10,padding:"9px",cursor:"pointer",color:"#fff",fontSize:13,fontWeight:700,fontFamily:"inherit"}}>Restore</button>
                </div>
              </div>
            )}
          </div>

          {/* Restore from Drive */}
          <div style={{padding:"14px 16px",borderBottom:"1px solid #1e293b",display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:36,height:36,borderRadius:10,background:"rgba(26,115,232,0.15)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Icon name="download" size={18} color="#4285f4"/></div>
            <div style={{flex:1}}><div style={{fontSize:14,fontWeight:600,color:"#f1f5f9"}}>Restore from Drive</div><div style={{fontSize:12,color:"#475569",marginTop:1}}>Load your latest Drive backup</div></div>
            <Btn variant="secondary" onClick={handleDriveRestore} style={{padding:"7px 14px",fontSize:12,flexShrink:0}} disabled={driveStatus==="restoring"}>
              {driveStatus==="restoring"?<><div style={{width:12,height:12,border:"2px solid rgba(255,255,255,0.3)",borderTopColor:"#94a3b8",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/> Loading…</>:"Restore"}
            </Btn>
          </div>

          {/* Auto-backup toggle */}
          <div style={{padding:"14px 16px",borderBottom:"1px solid #1e293b",display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:36,height:36,borderRadius:10,background:"rgba(26,115,232,0.15)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Icon name="refresh" size={18} color="#4285f4"/></div>
            <div style={{flex:1}}>
              <div style={{fontSize:14,fontWeight:600,color:"#f1f5f9"}}>Auto-backup daily</div>
              <div style={{fontSize:12,color:"#475569",marginTop:1}}>Silently backs up on app open if &gt;24h since last backup</div>
            </div>
            <div onClick={()=>toggleAutoBackup(!autoBackup)} style={{width:44,height:24,borderRadius:12,background:autoBackup?"#6366f1":"#334155",cursor:"pointer",position:"relative",transition:"background 0.2s",flexShrink:0}}>
              <div style={{position:"absolute",top:2,left:autoBackup?22:2,width:20,height:20,borderRadius:"50%",background:"#fff",transition:"left 0.2s"}}/>
            </div>
          </div>

          <div style={{padding:"10px 16px",display:"flex",alignItems:"flex-start",gap:8}}>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#475569" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{marginTop:1,flexShrink:0}}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span style={{fontSize:12,color:"#475569",lineHeight:1.5}}>Drive backups are stored in your own Google Drive under the filename <strong style={{color:"#64748b"}}>fitness-tracker-backup.json</strong>. Only you can access them.</span>
          </div>
        </CollapsibleCard>

        {/* ── Local Snapshots ── */}
        <CollapsibleCard id="snapshots" label="Local Snapshots">
          <div style={{borderBottom:"1px solid #1e293b",padding:"12px 16px",display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:36,height:36,borderRadius:10,background:"rgba(99,102,241,0.12)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Icon name="history" size={18} color="#818cf8"/></div>
            <div style={{flex:1}}>
              <div style={{fontSize:14,fontWeight:600,color:"#f1f5f9"}}>Local Snapshots</div>
              <div style={{fontSize:12,color:"#475569",marginTop:1}}>Auto-saved after every change · last {Math.min(snapshots.length,MAX_SNAPSHOTS)} kept</div>
            </div>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#475569" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{transform:showSnapshots?"rotate(180deg)":"rotate(0deg)",transition:"transform 0.2s",cursor:"pointer",flexShrink:0}} onClick={()=>setShowSnapshots(v=>!v)}><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          {showSnapshots&&(
            <div>
              {snapshots.length===0&&<div style={{padding:"16px",fontSize:13,color:"#475569",textAlign:"center"}}>No snapshots yet — make any change to create one.</div>}
              {snapshots.map((snap,i)=>{
                let d;
                try{d=JSON.parse(snap.data);}catch{d=null;}
                const isPending=restoreSnap===snap.id;
                return(
                  <div key={snap.id} style={{borderBottom:i<snapshots.length-1?"1px solid #1e293b":"none"}}>
                    <div style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px"}}>
                      <div style={{flex:1}}>
                        <div style={{fontSize:13,fontWeight:600,color:"#e2e8f0"}}>{new Date(snap.ts).toLocaleString()}</div>
                        {d&&<div style={{fontSize:11,color:"#475569",marginTop:2}}>{d.workouts?.length||0} workouts · {d.exercises?.length||0} exercises</div>}
                      </div>
                      <button onClick={()=>setRestoreSnap(isPending?null:snap.id)} style={{background:isPending?"rgba(99,102,241,0.15)":"#1e293b",border:"none",borderRadius:8,padding:"5px 10px",cursor:"pointer",color:isPending?"#818cf8":"#94a3b8",fontSize:12,fontWeight:600,fontFamily:"inherit"}}>
                        {i===0?"(latest) Restore":"Restore"}
                      </button>
                    </div>
                    {isPending&&(
                      <div style={{margin:"0 16px 12px",background:"rgba(99,102,241,0.08)",border:"1px solid rgba(99,102,241,0.2)",borderRadius:10,padding:"10px 12px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
                        <span style={{fontSize:12,color:"#a5b4fc"}}>Replace current data with this snapshot?</span>
                        <div style={{display:"flex",gap:6,flexShrink:0}}>
                          <button onClick={()=>setRestoreSnap(null)} style={{background:"#1e293b",border:"none",borderRadius:7,padding:"5px 10px",cursor:"pointer",color:"#94a3b8",fontSize:12,fontFamily:"inherit",fontWeight:600}}>Cancel</button>
                          <button onClick={()=>restoreSnapshot(snap)} style={{background:"#6366f1",border:"none",borderRadius:7,padding:"5px 10px",cursor:"pointer",color:"#fff",fontSize:12,fontFamily:"inherit",fontWeight:700}}>Restore</button>
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </CollapsibleCard>

        {/* ── Local export / import ── */}
        <CollapsibleCard id="localbackup" label="Local Backup">
          <Row icon="download" title="Export backup" subtitle={`Downloads a .json file — ${data?.workouts?.length||0} workouts, ${data?.exercises?.length||0} exercises`} onClick={handleExport}
            right={<div style={{background:"linear-gradient(135deg,#6366f1,#8b5cf6)",borderRadius:8,padding:"6px 12px"}}><span style={{fontSize:12,fontWeight:700,color:"#fff"}}>Export</span></div>}/>
          <div style={{borderBottom:"1px solid #1e293b"}}>
            <button onClick={()=>fileRef.current?.click()} style={{width:"100%",display:"flex",alignItems:"center",gap:12,padding:"14px 16px",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",textAlign:"left"}}>
              <div style={{width:36,height:36,borderRadius:10,background:"#1e293b",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Icon name="upload" size={18} color="#94a3b8"/></div>
              <div style={{flex:1}}><div style={{fontSize:14,fontWeight:600,color:"#f1f5f9"}}>Restore from file</div><div style={{fontSize:12,color:"#475569",marginTop:1}}>{importState==="success"?"✓ Restored successfully":importState==="error"?"⚠ Invalid file":"Load a previously exported .json file"}</div></div>
              <div style={{background:"#1e293b",borderRadius:8,padding:"6px 12px",flexShrink:0}}><span style={{fontSize:12,fontWeight:700,color:"#94a3b8"}}>Choose file</span></div>
            </button>
            <input ref={fileRef} type="file" accept=".json" onChange={handleFileSelect} style={{display:"none"}}/>
            {importState==="confirm"&&importPreview&&(
              <div style={{margin:"0 14px 14px",background:"rgba(99,102,241,0.08)",border:"1px solid rgba(99,102,241,0.25)",borderRadius:12,padding:"14px"}}>
                <div style={{fontSize:13,fontWeight:700,color:"#f1f5f9",marginBottom:4}}>Replace current data?</div>
                <div style={{fontSize:12,color:"#94a3b8",marginBottom:12,lineHeight:1.5}}>This backup contains <strong style={{color:"#f1f5f9"}}>{importPreview.workouts?.length||0} workouts</strong> and <strong style={{color:"#f1f5f9"}}>{importPreview.exercises?.length||0} exercises</strong>. Your current data will be overwritten.</div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>{setImportState(null);setImportPreview(null);}} style={{flex:1,background:"#1e293b",border:"none",borderRadius:10,padding:"9px",cursor:"pointer",color:"#94a3b8",fontSize:13,fontWeight:600,fontFamily:"inherit"}}>Cancel</button>
                  <button onClick={confirmImport} style={{flex:1,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",border:"none",borderRadius:10,padding:"9px",cursor:"pointer",color:"#fff",fontSize:13,fontWeight:700,fontFamily:"inherit"}}>Restore</button>
                </div>
              </div>
            )}
          </div>
          <div style={{padding:"12px 16px",display:"flex",alignItems:"center",gap:8}}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#475569" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span style={{fontSize:12,color:"#475569",lineHeight:1.5}}>Export regularly as an extra safety net alongside Drive backup.</span>
          </div>
        </CollapsibleCard>

        {/* ── App / Updates ── */}
        <CollapsibleCard id="app" label="App">
          <div style={{borderBottom:"1px solid #1e293b",padding:"14px 16px",display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:36,height:36,borderRadius:10,background:"rgba(99,102,241,0.12)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#818cf8" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 3v7a6 6 0 0 0 6 6 6 6 0 0 0 6-6V3"/><line x1="4" y1="21" x2="20" y2="21"/></svg>
            </div>
            <div style={{flex:1}}>
              <div style={{fontSize:14,fontWeight:600,color:"#f1f5f9"}}>Default weight unit</div>
              <div style={{fontSize:12,color:"#475569",marginTop:1}}>Used for all new workouts and exercises</div>
            </div>
            <UnitToggle unit={preferredUnit||"kg"} onChange={onSetPreferredUnit}/>
          </div>
          <Row icon="download" title="Check for updates"
            subtitle={!isOnline?"No internet connection":status==="checking"?"Checking…":status==="updated"?"Update found — reloading…":status==="latest"?"You're on the latest version ✓":"Reload the app to fetch any new features"}
            onClick={isOnline&&!updating?checkForUpdate:null}
            right={!isOnline?<div style={{background:"#1e293b",borderRadius:8,padding:"6px 12px"}}><span style={{fontSize:12,fontWeight:700,color:"#475569"}}>Offline</span></div>
              :updating?<div style={{width:28,height:28,borderRadius:"50%",border:"2px solid #6366f1",borderTopColor:"transparent",animation:"spin 0.8s linear infinite"}}/>
              :<div style={{background:"linear-gradient(135deg,#6366f1,#8b5cf6)",borderRadius:8,padding:"6px 12px"}}><span style={{fontSize:12,fontWeight:700,color:"#fff"}}>Update</span></div>}
          />
          <div style={{borderBottom:"1px solid #1e293b",padding:"10px 16px",display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:36,height:36,borderRadius:10,background:"rgba(99,102,241,0.12)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Icon name="shield" size={18} color="#818cf8"/></div>
            <div style={{flex:1}}>
              <div style={{fontSize:14,fontWeight:600,color:"#f1f5f9"}}>Smart update timing</div>
              <div style={{fontSize:12,color:"#475569",marginTop:1}}>Updates only apply when you're on the Log screen — never mid-workout</div>
            </div>
            <div style={{fontSize:10,fontWeight:700,color:"#22c55e",background:"rgba(34,197,94,0.12)",padding:"3px 8px",borderRadius:6}}>ON</div>
          </div>
        </CollapsibleCard>

        {/* ── Coming soon ── */}
        <CollapsibleCard id="comingsoon" label="Coming Soon">
          {[{icon:"user",title:"Profile & Goals",subtitle:"Set weekly targets and personal goals"},{icon:"fire",title:"Streaks & Badges",subtitle:"Track consistency and milestones"},{icon:"tag",title:"Custom Tags",subtitle:"Tag workouts by programme or focus"}].map((item,i,arr)=>(
            <div key={item.title} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",borderBottom:i<arr.length-1?"1px solid #1e293b":"none",opacity:0.45}}>
              <div style={{width:36,height:36,borderRadius:10,background:"#1e293b",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Icon name={item.icon} size={18} color="#64748b"/></div>
              <div style={{flex:1}}><div style={{fontSize:14,fontWeight:600,color:"#94a3b8"}}>{item.title}</div><div style={{fontSize:12,color:"#475569",marginTop:1}}>{item.subtitle}</div></div>
              <div style={{fontSize:10,fontWeight:700,color:"#475569",background:"#1e293b",padding:"3px 8px",borderRadius:6,flexShrink:0}}>SOON</div>
            </div>
          ))}
        </CollapsibleCard>

        <div style={{textAlign:"center",padding:"8px 0 4px"}}><span style={{fontSize:11,color:"#334155"}}>Fitness Tracker · v26</span></div>
      </div>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );
}

// ── QuickLog ──────────────────────────────────────────────────────────────────
function QuickLog({exercises,templates,workouts,onSave,onCancel,onCreateExercise,preferredUnit}){
  const pu=preferredUnit||"kg";
  const[step,setStep]=useState(()=>{const d=loadDraft();return d?.step||"pick";});
  const[workout,setWorkout]=useState(()=>{const d=loadDraft();return d?.workout||null;});
  const[pick,setPick]=useState(false);
  const[confirmDiscard,setConfirmDiscard]=useState(false);
  const{ref:sessionScrollRef,hidden:sessionHeaderHidden}=useScrollHide();

  useEffect(()=>{ if(step==="workout"&&workout) saveDraft(workout,step); },[workout,step]);

  function startBlank(){ const w={id:Date.now().toString(),date:today(),name:"Quick Workout",entries:[],notes:"",unit:pu};setWorkout(w);setStep("workout");saveDraft(w,"workout"); }
  function startFromTemplate(tpl){ const w=templateToWorkout(tpl,pu);setWorkout(w);setStep("workout");saveDraft(w,"workout"); }
  function addEx(ex){
    const wu=workout?.unit||pu;
    setWorkout(p=>({...p,entries:[...p.entries,{_key:`${ex.id}_${Date.now()}`,exerciseId:ex.id,sets:[{weight:"",reps:"",rir:"",side:"B",unit:wu}],note:"",unit:wu}]}));
    setPick(false);
  }
  function updE(i,e){ setWorkout(p=>({...p,entries:p.entries.map((x,j)=>j===i?e:x)})); }
  function remE(i){ setWorkout(p=>({...p,entries:p.entries.filter((_,j)=>j!==i)})); }
  function moveE(i,dir){ setWorkout(p=>{const a=[...p.entries];const t=a[i];a[i]=a[i+dir];a[i+dir]=t;return {...p,entries:a};}); }
  function finish(){ if(workout.entries.length===0){setConfirmDiscard(true);return;} clearDraft();onSave(workout); }
  function discard(){ clearDraft();onCancel(); }
  const workoutUnit=workout?.unit||pu;
  function setWorkoutUnit(u){ setWorkout(p=>({...p,unit:u,entries:(p.entries||[]).map(e=>e.unit===workoutUnit?{...e,unit:u,sets:e.sets.map(s=>s.unit===workoutUnit?{...s,unit:u}:s)}:e)})); }

  if(step==="pick") return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:"#0a0f1e"}}>
      <div style={{padding:"24px 16px 16px",borderBottom:"1px solid #1e293b",display:"flex",alignItems:"center",gap:10}}>
        <button onClick={onCancel} style={{background:"none",border:"none",cursor:"pointer",color:"#94a3b8",padding:4}}><Icon name="close" size={22}/></button>
        <span style={{fontWeight:800,fontSize:18,color:"#f1f5f9",flex:1}}>Start Workout</span>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"20px 16px",display:"flex",flexDirection:"column",gap:14}}>
        {workout&&workout.entries&&(
          <button onClick={()=>setStep("workout")} style={{background:"rgba(34,197,94,0.1)",border:"1px solid rgba(34,197,94,0.3)",borderRadius:16,padding:"14px 16px",cursor:"pointer",fontFamily:"inherit",textAlign:"left",width:"100%",display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:40,height:40,borderRadius:10,background:"rgba(34,197,94,0.2)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Icon name="play" size={18} color="#22c55e"/></div>
            <div style={{flex:1}}><div style={{fontSize:14,fontWeight:800,color:"#22c55e",marginBottom:2}}>Resume "{workout.name}"</div><div style={{fontSize:12,color:"#475569"}}>{workout.entries.length} exercise{workout.entries.length!==1?"s":""} in progress</div></div>
          </button>
        )}
        <button onClick={startBlank} style={{background:"linear-gradient(135deg,rgba(99,102,241,0.15),rgba(139,92,246,0.1))",border:"2px dashed rgba(99,102,241,0.4)",borderRadius:18,padding:"22px 18px",cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:14,textAlign:"left",width:"100%"}}>
          <div style={{width:44,height:44,borderRadius:12,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Icon name="plus" size={22} color="#fff"/></div>
          <div><div style={{fontSize:16,fontWeight:800,color:"#f1f5f9",marginBottom:3}}>Empty Workout</div><div style={{fontSize:13,color:"#64748b"}}>Start fresh, add exercises as you go</div></div>
        </button>
        {templates.length>0&&(<>
          <div style={{fontSize:11,fontWeight:700,color:"#475569",textTransform:"uppercase",letterSpacing:"0.08em",marginTop:4}}>From a template</div>
          {templates.map(tpl=>{
            const muscles=[...new Set(tpl.entries.flatMap(e=>{const ex=exercises.find(x=>x.id===e.exerciseId);return ex?.muscles||[];}))]
            return(
              <button key={tpl.id} onClick={()=>startFromTemplate(tpl)} style={{background:"#0f172a",border:"1px solid #1e293b",borderRadius:16,padding:"14px",cursor:"pointer",fontFamily:"inherit",textAlign:"left",width:"100%",display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:40,height:40,borderRadius:10,background:"#1e293b",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Icon name="template" size={18} color="#6366f1"/></div>
                <div style={{flex:1,minWidth:0}}><div style={{fontSize:15,fontWeight:700,color:"#f1f5f9",marginBottom:4}}>{tpl.name}</div><MusclePills muscles={muscles} max={4}/></div>
                <Icon name="chevron" size={18} color="#334155"/>
              </button>
            );
          })}
        </>)}
      </div>
    </div>
  );

  const totalSets=workout?countSets(workout.entries.map(e=>({...e,sets:e.sets.filter(s=>s.weight||s.reps)})),exercises):0;
  const qlHeaderRef=useRef(null);
  const[qlHeaderH,setQlHeaderH]=useState(0);
  useEffect(()=>{
    const el=qlHeaderRef.current; if(!el) return;
    const ro=new ResizeObserver(()=>setQlHeaderH(el.offsetHeight||0));
    ro.observe(el);
    setQlHeaderH(el.offsetHeight||0);
    return()=>ro.disconnect();
  },[]);
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:"#0a0f1e",position:"relative"}}>
      <div ref={qlHeaderRef} style={{position:"absolute",top:0,left:0,right:0,zIndex:2,transform:sessionHeaderHidden?"translateY(-100%)":"translateY(0)",transition:"transform 0.25s ease",willChange:"transform",background:"#0a0f1e"}}>
        <div style={{padding:"14px 16px",borderBottom:"1px solid #1e293b"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
            <button onClick={()=>setConfirmDiscard(true)} style={{background:"none",border:"none",cursor:"pointer",color:"#64748b",padding:4}}><Icon name="close" size={20}/></button>
            <span style={{flex:1,fontSize:12,color:"#475569",fontWeight:600}}>{workout?.entries.length||0} exercise{workout?.entries.length!==1?"s":""} · {fmtSets(totalSets)} set{totalSets!==1?"s":""} logged</span>
            <UnitToggle unit={workoutUnit} onChange={setWorkoutUnit}/>
            <Btn variant="green" onClick={finish} style={{padding:"8px 16px",fontSize:13,borderRadius:12}}><Icon name="check" size={15} color="#fff"/> Finish</Btn>
          </div>
          <div style={{display:"flex",gap:8}}>
            <input value={workout?.name||""} onChange={e=>setWorkout(p=>({...p,name:e.target.value}))} placeholder="Workout name…" style={{flex:1,background:"#0f172a",border:"1px solid #1e293b",borderRadius:10,color:"#f1f5f9",padding:"8px 12px",fontSize:14,fontWeight:700,outline:"none",fontFamily:"inherit"}}/>
            <DateInput value={workout?.date||today()} onChange={d=>setWorkout(p=>({...p,date:d}))} style={{background:"#0f172a",border:"1px solid #1e293b",borderRadius:10,color:"#94a3b8",padding:"8px 10px",fontSize:13,outline:"none",fontFamily:"inherit",width:120}}/>
          </div>
        </div>
      </div>
      <div ref={sessionScrollRef} style={{flex:1,overflowY:"auto",paddingTop:sessionHeaderHidden?0:qlHeaderH,transition:"padding-top 0.25s ease",paddingLeft:14,paddingRight:16,paddingBottom:120,display:"flex",flexDirection:"column",gap:12}}>
        {(!workout?.entries.length)&&<div style={{textAlign:"center",padding:"50px 20px",color:"#334155",fontSize:14}}>No exercises yet — tap below to add one</div>}
        {(workout?.entries||[]).map((entry,i)=>(
          <WECard key={entry._key||i} entry={entry} exercises={exercises} workouts={workouts} onChange={e=>updE(i,e)} onRemove={()=>remE(i)} onMoveUp={()=>moveE(i,-1)} onMoveDown={()=>moveE(i,1)} isFirst={i===0} isLast={i===(workout.entries.length-1)}/>
        ))}
        <button onClick={()=>setPick(true)} style={{width:"100%",padding:"14px",background:"#0f172a",border:"2px dashed #1e293b",borderRadius:16,cursor:"pointer",color:"#6366f1",fontSize:14,fontWeight:700,fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          <Icon name="plus" size={18} color="#6366f1"/> Add Exercise
        </button>
      </div>
      {confirmDiscard&&(
        <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"flex-end",zIndex:50}}>
          <div style={{background:"#0f172a",border:"1px solid #1e293b",borderRadius:"20px 20px 0 0",width:"100%",padding:"24px 20px",display:"flex",flexDirection:"column",gap:14}}>
            <div style={{fontSize:17,fontWeight:800,color:"#f1f5f9"}}>Discard workout?</div>
            <div style={{fontSize:14,color:"#64748b"}}>All sets logged in this session will be lost.</div>
            <div style={{display:"flex",gap:10}}>
              <Btn variant="secondary" onClick={()=>setConfirmDiscard(false)} style={{flex:1,justifyContent:"center"}}>Keep going</Btn>
              <button onClick={discard} style={{flex:1,background:"rgba(239,68,68,0.15)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:12,padding:"10px",cursor:"pointer",color:"#f87171",fontSize:14,fontWeight:700,fontFamily:"inherit"}}>Discard</button>
            </div>
          </div>
        </div>
      )}
      {pick&&<Picker exercises={exercises} onPick={addEx} onClose={()=>setPick(false)} onCreateExercise={onCreateExercise}/>}
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const[data,setData]=useState(()=>loadData());
  const[tab,setTab]=useState("log");
  const[screen,setScreen]=useState(null);
  const[active,setActive]=useState(null);
  const[showInstall,setShowInstall]=useState(true);
  const[isOnline,setIsOnline]=useState(()=>navigator.onLine);
  const[updateReady,setUpdateReady]=useState(()=>window._swUpdateReady||false);
  const[dataRestored,setDataRestored]=useState(false);
  const isInstalled=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone===true;
  const{workouts,exercises,bodyweight,templates}=data;

  // Listen for SW update ready signal
  useEffect(()=>{
    const handler=()=>setUpdateReady(true);
    window.addEventListener('swupdateready',handler);
    return()=>window.removeEventListener('swupdateready',handler);
  },[]);

  // Auto-restore from IndexedDB snapshot if localStorage is empty
  useEffect(()=>{
    const hasData=!!localStorage.getItem(KEY);
    if(!hasData&&!dataRestored){
      loadLatestSnapshot().then(snapshot=>{
        if(snapshot&&snapshot.workouts?.length>0){
          setData(snapshot);
          saveData(snapshot); // re-populate localStorage
          setDataRestored(true);
          console.log('[FitnessTracker] Auto-restored from IndexedDB snapshot');
        }
      });
    }
  },[]);

  useEffect(()=>{
    const on=()=>setIsOnline(true);
    const off=()=>setIsOnline(false);
    window.addEventListener("online",on);
    window.addEventListener("offline",off);
    return()=>{window.removeEventListener("online",on);window.removeEventListener("offline",off);};
  },[]);

  // Apply SW update — only when safe (on Log screen, no active workout)
  function applyUpdate(){
    const reg=window._swReg;
    if(reg?.waiting){
      reg.waiting.postMessage({type:"SKIP_WAITING"});
      // controllerchange listener in SW init will reload
    } else {
      window.location.reload();
    }
  }

  // Smart update: when tab changes TO "log" and no screen is open, apply a pending update
  useEffect(()=>{
    if(updateReady&&tab==="log"&&!screen){
      // Small delay so the screen renders first, then user can tap the banner
      // We don't auto-apply — we show the banner and let the user choose
    }
  },[updateReady,tab,screen]);

  const setW=fn=>setData(p=>{const n={...p,workouts:typeof fn==="function"?fn(p.workouts):fn};saveData(n);return n;});
  const setEx=fn=>setData(p=>{const n={...p,exercises:typeof fn==="function"?fn(p.exercises):fn};saveData(n);return n;});
  const setBW=bw=>setData(p=>{const n={...p,bodyweight:bw};saveData(n);return n;});
  const setTpl=fn=>setData(p=>{const n={...p,templates:typeof fn==="function"?fn(p.templates||[]):fn};saveData(n);return n;});
  const setPU=u=>setData(p=>{const n={...p,preferredUnit:u};saveData(n);return n;});

  const save=w=>{setW(p=>{const e=p.find(x=>x.id===w.id);return e?p.map(x=>x.id===w.id?w:x):[...p,w];});setScreen(null);setActive(null);setTab("log");};
  const del=id=>{setW(p=>p.filter(w=>w.id!==id));setScreen(null);setActive(null);};
  const saveTemplate=(workout,name)=>setTpl(p=>[...p,workoutToTemplate(workout,name)]);
  const deleteTemplate=id=>setTpl(p=>p.filter(t=>t.id!==id));
  const startFromTemplate=tpl=>{const w=templateToWorkout(tpl,data.preferredUnit||"kg");setActive(w);setScreen("new-from-template");};

  const scr=
    screen==="quicklog"
      ?<QuickLog exercises={exercises} workouts={workouts} templates={templates||[]} preferredUnit={data.preferredUnit||"kg"} onSave={w=>{setW(p=>{const e=p.find(x=>x.id===w.id);return e?p.map(x=>x.id===w.id?w:x):[...p,w];});setScreen(null);}} onCancel={()=>setScreen(null)} onCreateExercise={ex=>setEx(p=>[...p,ex])}/>
    :screen==="new"
      ?<Editor exercises={exercises} workouts={workouts} preferredUnit={data.preferredUnit||"kg"} onSave={save} onCancel={()=>setScreen(null)}/>
    :screen==="new-from-template"
      ?<Editor workout={active} exercises={exercises} workouts={workouts} preferredUnit={data.preferredUnit||"kg"} onSave={save} onCancel={()=>{setScreen(null);setActive(null);}}/>
    :screen==="edit"
      ?<Editor workout={active} exercises={exercises} workouts={workouts} preferredUnit={data.preferredUnit||"kg"} onSave={save} onCancel={()=>setScreen("detail")}/>
    :screen==="detail"
      ?<Detail workout={active} exercises={exercises} onBack={()=>{setScreen(null);setActive(null);}} onEdit={()=>setScreen("edit")} onDelete={()=>del(active.id)} onSaveTemplate={saveTemplate} existingTemplate={(templates||[]).some(t=>t.createdFrom===active.id)}/>
    :null;

  const main=scr||(
    tab==="log"
      ?<Log workouts={workouts} exercises={exercises} templates={templates||[]} onNew={()=>setScreen("new")} onQuickLog={()=>setScreen("quicklog")} onView={w=>{setActive(w);setScreen("detail");}} onNewFromTemplate={startFromTemplate} onDeleteTemplate={deleteTemplate} showInstall={showInstall&&!isInstalled} onDismissInstall={()=>setShowInstall(false)} isOnline={isOnline} updateReady={updateReady} onApplyUpdate={applyUpdate}/>
    :tab==="stats"
      ?<StatsTab workouts={workouts} exercises={exercises} bodyweight={bodyweight||80} onSetBW={setBW} preferredUnit={data.preferredUnit||"kg"} onSetPreferredUnit={setPU}/>
    :tab==="library"
      ?<Library exercises={exercises} setExercises={setEx}/>
      :<SettingsTab data={data} onRestore={d=>{setData(d);saveData(d);}} isOnline={isOnline} preferredUnit={data.preferredUnit||"kg"} onSetPreferredUnit={setPU}/>
  );

  const TABS=[{id:"log",label:"Log",icon:"calendar"},{id:"stats",label:"Stats",icon:"chart"},{id:"library",label:"Library",icon:"list"},{id:"settings",label:"Settings",icon:"settings"}];

  return(
    <div style={{fontFamily:"'DM Sans','Segoe UI',sans-serif",background:"#0a0f1e",color:"#f1f5f9",height:"100dvh",display:"flex",flexDirection:"column",maxWidth:430,margin:"0 auto",overflow:"hidden"}}>
      {!isOnline&&(
        <div style={{background:"#1c1410",borderBottom:"1px solid #92400e",padding:"8px 16px",display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="1" y1="1" x2="23" y2="23"/><path d="M16.72 11.06A10.94 10.94 0 0119 12.55M5 12.55a10.94 10.94 0 015.17-2.39M10.71 5.05A16 16 0 0122.56 9M1.42 9a15.91 15.91 0 014.7-2.88M8.53 16.11a6 6 0 016.95 0M12 20h.01"/></svg>
          <span style={{fontSize:12,fontWeight:600,color:"#f59e0b"}}>Offline — all core features available</span>
        </div>
      )}
      {dataRestored&&(
        <div style={{background:"#052e16",borderBottom:"1px solid #16a34a",padding:"8px 16px",display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
          <Icon name="shield" size={14} color="#22c55e"/>
          <span style={{fontSize:12,fontWeight:600,color:"#22c55e"}}>Data auto-restored from local backup ✓</span>
        </div>
      )}
      <div style={{flex:1,minHeight:0,display:"flex",flexDirection:"column"}}>{main}</div>
      {!screen&&(
        <div style={{display:"flex",background:"#0f172a",borderTop:"1px solid #1e293b",padding:`8px 0 max(12px, env(safe-area-inset-bottom))`}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4,padding:"6px 0",fontFamily:"inherit"}}>
              <Icon name={t.icon} size={22} color={tab===t.id?"#6366f1":"#475569"}/>
              <span style={{fontSize:10,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",color:tab===t.id?"#6366f1":"#475569"}}>{t.label}</span>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
