<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- PWA meta tags -->
  <meta name="application-name" content="Fitness Tracker" />
  <meta name="apple-mobile-web-app-capable" content="yes" />

  <!-- PWA manifest (generated at runtime to support single-file deploy) -->

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="root"></div>

  <!--
    React + ReactDOM are loaded from the js/ folder (inlined builds for offline support).
    To update React, replace these files with the latest production builds from:
    https://unpkg.com/react@19/umd/react.production.min.js
    https://unpkg.com/react-dom@19/umd/react-dom.production.min.js
  -->
  <!-- React 19 + ReactDOM combined production build (extracted from original, offline-capable) -->
  <script>const APP_VERSION = "1.14.4";</script>

  <script>
    // ── Startup integrity check ───────────────────────────────────────────────
    // Verifies critical globals are defined and not duplicated after all scripts
    // load. If anything is wrong, clears the SW cache and reloads automatically.
    window.addEventListener('load', function() {
      var issues = [];
      var required = ['KG_TO_LBS', 'LBS_TO_KG', 'countSetsWorkouts', 'useScrollHide', 'MUSCLE_GROUPS', 'loadData', 'saveData'];
      required.forEach(function(name) {
        if (typeof window[name] === 'undefined') issues.push('Missing: ' + name);
      });
      if (issues.length === 0) return;
      console.warn('[FitnessTracker] Integrity check failed:', issues);
      // Show message then clear caches and reload
      var banner = document.createElement('div');
      banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#1c1c1c;color:#f59e0b;font-family:sans-serif;font-size:13px;font-weight:600;padding:12px 16px;text-align:center;border-bottom:1px solid #92400e;';
      banner.textContent = 'Refreshing to fix a caching issue…';
      document.body.appendChild(banner);
      if ('caches' in window) {
        caches.keys().then(function(keys) {
          return Promise.all(keys.map(function(k) { return caches.delete(k); }));
        }).then(function() {
          if (navigator.serviceWorker) {
            navigator.serviceWorker.getRegistrations().then(function(regs) {
              return Promise.all(regs.map(function(r) { return r.unregister(); }));
            }).then(function() { window.location.reload(true); });
          } else {
            window.location.reload(true);
          }
        });
      } else {
        window.location.reload(true);
      }
    });
  </script>
  <script src="js/react.production.min.js"></script>
  <script src="js/react-dom.production.min.js"></script>

  <!-- App modules — load order matters -->
  <script src="js/pwa.js?v=1.14.4"></script>

</body>
