// ── Exercise Library ──────────────────────────────────────────────────────────
function Library({exercises,setExercises}){
  const [selCat,setSelCat]=useState("All");
  const [selMuscle,setSelMuscle]=useState(null);
  const [q,setQ]=useState("");
  const [adding,setAdding]=useState(false);
  const [editMode,setEditMode]=useState(false);
  const [newName,setNewName]=useState("");
  const [newPrimary,setNewPrimary]=useState([]);
  const [newSecondary,setNewSecondary]=useState([]);

  const catMuscles = selCat==="All" ? null : MUSCLE_CATEGORIES.find(c=>c.category===selCat)?.muscles;

  const filtered=exercises.filter(e=>{
    const nm=e.name.toLowerCase().includes(q.toLowerCase());
    if(!nm) return false;
    if(selMuscle) return e.muscles?.includes(selMuscle);
    if(selCat!=="All") return e.muscles?.some(m=>catMuscles?.includes(m));
    return true;
  });

  // Group by primary category
  const grouped={};
  filtered.forEach(ex=>{const cat=getPrimaryCategory(ex);if(!grouped[cat])grouped[cat]=[];grouped[cat].push(ex);});

  const [confirmDel,setConfirmDel]=useState(null);

  const addCustom=()=>{
    if(!newName.trim()||!newPrimary.length) return;
    const muscles=[...newPrimary,...newSecondary];
    setExercises(p=>[...p,{id:"c"+Date.now(),name:newName.trim(),muscles,primaryMuscles:newPrimary,secondaryMuscles:newSecondary}]);
    setNewName("");setNewPrimary([]);setNewSecondary([]);setAdding(false);
  };
  const remEx=id=>{setExercises(p=>p.filter(e=>e.id!==id));setConfirmDel(null);};

  const hiddenCount=DEFAULT_EXERCISES.filter(d=>!exercises.some(e=>e.id===d.id)).length;
  const restoreDefaults=()=>setExercises(p=>{
    const ids=new Set(p.map(e=>e.id));
    return [...p,...DEFAULT_EXERCISES.filter(e=>!ids.has(e.id))];
  });

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:"#0a0f1e"}}>
      <div style={{padding:"20px 16px 12px",borderBottom:"1px solid #1e293b"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <span style={{fontWeight:800,fontSize:20,color:"#f1f5f9"}}>Exercise Library</span>
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>{setEditMode(v=>!v);setAdding(false);setConfirmDel(null);}} style={{background:editMode?"rgba(239,68,68,0.15)":"#1e293b",border:editMode?"1px solid rgba(239,68,68,0.3)":"1px solid transparent",borderRadius:10,padding:"7px 12px",cursor:"pointer",color:editMode?"#f87171":"#94a3b8",fontSize:12,fontWeight:700,fontFamily:"inherit"}}>
              {editMode?"Done":"Edit"}
            </button>
            <Btn variant="primary" onClick={()=>{setAdding(v=>!v);setEditMode(false);}} style={{padding:"7px 12px",fontSize:12}}><Icon name="plus" size={14}/> Custom</Btn>
          </div>
        </div>
        <div style={{position:"relative",marginBottom:10}}>
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search..." style={{background:"#1e293b",border:"1px solid #334155",borderRadius:10,color:"#f1f5f9",padding:"9px 12px 9px 34px",fontSize:14,outline:"none",width:"100%",boxSizing:"border-box",fontFamily:"inherit"}}/>
          <div style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}}><Icon name="search" size={16} color="#64748b"/></div>
        </div>
        {/* Category tabs */}
        <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:6}}>
          {["All",...MUSCLE_CATEGORIES.map(c=>c.category)].map(cat=>(
            <button key={cat} onClick={()=>{setSelCat(cat);setSelMuscle(null);}} style={{flexShrink:0,padding:"5px 12px",borderRadius:20,fontSize:12,fontWeight:600,border:"none",cursor:"pointer",fontFamily:"inherit",background:selCat===cat?(getColorForCategory(cat)||"#6366f1"):"#1e293b",color:selCat===cat?"#fff":"#94a3b8"}}>{cat}</button>
          ))}
        </div>
        {/* Muscle sub-filter */}
        {selCat!=="All" && catMuscles && (
          <div style={{display:"flex",gap:6,overflowX:"auto",paddingTop:6}}>
            <button onClick={()=>setSelMuscle(null)} style={{flexShrink:0,padding:"4px 10px",borderRadius:20,fontSize:11,fontWeight:600,border:"1px solid #334155",cursor:"pointer",fontFamily:"inherit",background:!selMuscle?"#334155":"transparent",color:!selMuscle?"#f1f5f9":"#64748b"}}>All</button>
            {catMuscles.map(m=>(
              <button key={m} onClick={()=>setSelMuscle(selMuscle===m?null:m)} style={{flexShrink:0,padding:"4px 10px",borderRadius:20,fontSize:11,fontWeight:600,border:"none",cursor:"pointer",fontFamily:"inherit",background:selMuscle===m?getColorForMuscle(m):`${getColorForMuscle(m)}22`,color:selMuscle===m?"#fff":getColorForMuscle(m)}}>{m}</button>
            ))}
          </div>
        )}
      </div>

      <div style={{overflowY:"auto",flex:1}}>
        {/* Edit mode banner with restore */}
        {editMode&&(
          <div style={{margin:"12px 16px 4px",background:"rgba(239,68,68,0.07)",border:"1px solid rgba(239,68,68,0.18)",borderRadius:12,padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
            <span style={{fontSize:12,color:"#fca5a5",lineHeight:1.4}}>Tap the trash icon to remove any exercise.</span>
            {hiddenCount>0&&(
              <button onClick={restoreDefaults} style={{flexShrink:0,background:"rgba(239,68,68,0.18)",border:"none",borderRadius:8,padding:"5px 10px",color:"#f87171",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>
                Restore {hiddenCount} default{hiddenCount>1?"s":""}
              </button>
            )}
          </div>
        )}

        {/* Add custom exercise form */}
        {adding&&(
          <div style={{margin:16,background:"#0f172a",border:"1px solid #334155",borderRadius:16,padding:14,display:"flex",flexDirection:"column",gap:12}}>
            <Inp label="Exercise Name" value={newName} onChange={e=>setNewName(e.target.value)} placeholder="e.g. Sissy Squat"/>
            <div>
              <div style={{fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:"#94a3b8",marginBottom:8}}>Muscles <span style={{color:"#475569",fontWeight:500,textTransform:"none",fontSize:11}}>(at least one primary)</span></div>
              <MuscleSelector primary={newPrimary} secondary={newSecondary} onChange={(p,s)=>{setNewPrimary(p);setNewSecondary(s);}}/>
            </div>
            {newPrimary.length>0&&<div><span style={{fontSize:10,color:"#64748b",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em"}}>Primary: </span><MusclePills muscles={newPrimary}/></div>}
            {newSecondary.length>0&&<div><span style={{fontSize:10,color:"#475569",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em"}}>Secondary: </span><MusclePills muscles={newSecondary}/></div>}
            <div style={{display:"flex",gap:8}}>
              <Btn variant="primary" onClick={addCustom} style={{flex:1,justifyContent:"center"}} disabled={!newName.trim()||!newPrimary.length}>Add Exercise</Btn>
              <Btn variant="secondary" onClick={()=>{setAdding(false);setNewPrimary([]);setNewSecondary([]);setNewName("");}} style={{flex:1,justifyContent:"center"}}>Cancel</Btn>
            </div>
          </div>
        )}

        {Object.keys(grouped).length===0&&!adding&&<div style={{color:"#64748b",textAlign:"center",padding:"40px 20px",fontSize:14}}>No exercises found</div>}

        {Object.entries(grouped).map(([cat,exs])=>(
          <div key={cat}>
            <div style={{padding:"12px 16px 4px",display:"flex",alignItems:"center",gap:8,position:"sticky",top:0,background:"#0a0f1e",zIndex:1}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:getColorForCategory(cat)}}/>
              <span style={{fontSize:12,fontWeight:700,color:getColorForCategory(cat),textTransform:"uppercase",letterSpacing:"0.08em"}}>{cat}</span>
              <span style={{fontSize:11,color:"#475569"}}>({exs.length})</span>
            </div>
            {exs.map(ex=>{
              const isCustom=ex.id.startsWith("c");
              const isPending=confirmDel===ex.id;
              return(
                <div key={ex.id} style={{borderBottom:"1px solid #0f172a"}}>
                  <div style={{padding:"10px 16px",display:"flex",alignItems:"center",gap:12}}>
                    <div style={{width:34,height:34,borderRadius:10,background:`${getColorForMuscle(ex.muscles?.[0]||"")}22`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                      <Icon name="dumbbell" size={16} color={getColorForMuscle(ex.muscles?.[0]||"")}/>
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                        <span style={{fontSize:14,fontWeight:600,color:"#e2e8f0"}}>{ex.name}</span>
                        {isCustom&&<span style={{fontSize:10,fontWeight:700,color:"#6366f1",background:"rgba(99,102,241,0.15)",padding:"1px 6px",borderRadius:6}}>custom</span>}
                      </div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
                        {(ex.primaryMuscles||[ex.muscles?.[0]].filter(Boolean)).map(m=>(
                          <span key={m} style={{padding:"2px 7px",borderRadius:20,fontSize:11,fontWeight:700,background:`${getColorForMuscle(m)}33`,color:getColorForMuscle(m)}}>{m}</span>
                        ))}
                        {(ex.secondaryMuscles||ex.muscles?.slice(1)||[]).slice(0,2).map(m=>(
                          <span key={m} style={{padding:"2px 7px",borderRadius:20,fontSize:11,fontWeight:600,background:"#1e293b",color:"#475569"}}>{m}</span>
                        ))}
                      </div>
                    </div>
                    {editMode&&(
                      <button
                        onClick={()=>setConfirmDel(isPending?null:ex.id)}
                        style={{background:isPending?"rgba(239,68,68,0.12)":"none",border:"none",borderRadius:8,cursor:"pointer",color:isPending?"#ef4444":"#475569",padding:"6px 8px",flexShrink:0,transition:"all 0.15s"}}
                      >
                        <Icon name="trash" size={15} color={isPending?"#ef4444":"#475569"}/>
                      </button>
                    )}
                  </div>
                  {isPending&&editMode&&(
                    <div style={{margin:"0 16px 10px",background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:10,padding:"10px 12px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
                      <span style={{fontSize:12,color:"#fca5a5"}}>Delete <strong>{ex.name}</strong>?{!isCustom&&" You can restore it later."}</span>
                      <div style={{display:"flex",gap:6,flexShrink:0}}>
                        <button onClick={()=>setConfirmDel(null)} style={{background:"#1e293b",border:"none",borderRadius:7,padding:"5px 10px",cursor:"pointer",color:"#94a3b8",fontSize:12,fontFamily:"inherit",fontWeight:600}}>Cancel</button>
                        <button onClick={()=>remEx(ex.id)} style={{background:"#ef4444",border:"none",borderRadius:7,padding:"5px 10px",cursor:"pointer",color:"#fff",fontSize:12,fontFamily:"inherit",fontWeight:700}}>Delete</button>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Fitness Assistant ─────────────────────────────────────────────────────────
function FitnessAssistant({exercises}){
  const [open,setOpen]=useState(false);
  const [query,setQuery]=useState("");
  const [messages,setMessages]=useState([]); // [{role,content}]
  const [loading,setLoading]=useState(false);
  const inputRef=useRef(null);
  const bottomRef=useRef(null);

  useEffect(()=>{
    if(open) setTimeout(()=>inputRef.current?.focus(),100);
  },[open]);
  useEffect(()=>{
    bottomRef.current?.scrollIntoView({behavior:"smooth"});
  },[messages,loading]);

  const exList=exercises.map(e=>`${e.name} (${e.muscles?.join(", ")||""})`).join("; ");

  async function send(){
    const q=query.trim();
    if(!q||loading) return;
    setQuery("");
    const userMsg={role:"user",content:q};
    const history=[...messages,userMsg];
    setMessages(history);
    setLoading(true);
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:1000,
          system:`You are a concise, knowledgeable fitness coach inside a workout tracking app. 
Answer questions about exercise technique, muscle groups, programming, and training advice.
The user's exercise library includes: ${exList}
Keep answers short and practical — use bullet points for lists. No markdown headers. Plain text only.`,
          messages:history.map(m=>({role:m.role,content:m.content}))
        })
      });
      const data=await res.json();
      const reply=data.content?.find(b=>b.type==="text")?.text||"Sorry, I couldn't get a response.";
      setMessages([...history,{role:"assistant",content:reply}]);
    }catch{
      setMessages([...history,{role:"assistant",content:"Something went wrong. Check your connection and try again."}]);
    }
    setLoading(false);
  }

  const SUGGESTIONS=["Exercises for chest","How to deadlift safely","Best leg day exercises","How to improve grip strength","Exercises for core stability","What muscles do pull-ups work?"];

  return(
    <>
      {/* Floating trigger button */}
      {!open&&(
        <button onClick={()=>setOpen(true)} style={{position:"absolute",bottom:16,right:16,width:52,height:52,borderRadius:"50%",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 20px rgba(99,102,241,0.5)",zIndex:10}}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
          </svg>
        </button>
      )}

      {/* Chat drawer */}
      {open&&(
        <div style={{position:"absolute",inset:0,background:"#0a0f1e",display:"flex",flexDirection:"column",zIndex:20}}>
          {/* Header */}
          <div style={{padding:"16px 16px 12px",borderBottom:"1px solid #1e293b",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
            <div style={{width:34,height:34,borderRadius:10,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
              </svg>
            </div>
            <div style={{flex:1}}>
              <div style={{fontSize:15,fontWeight:800,color:"#f1f5f9"}}>Fitness Assistant</div>
              <div style={{fontSize:11,color:"#475569"}}>Ask about exercises, technique & more</div>
            </div>
            <button onClick={()=>setOpen(false)} style={{background:"#1e293b",border:"none",borderRadius:8,padding:6,cursor:"pointer",color:"#94a3b8"}}><Icon name="close" size={18}/></button>
          </div>

          {/* Messages */}
          <div style={{flex:1,overflowY:"auto",padding:"14px 16px",display:"flex",flexDirection:"column",gap:12}}>
            {messages.length===0&&(
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                <div style={{fontSize:13,color:"#475569",marginBottom:4}}>Try asking:</div>
                {SUGGESTIONS.map(s=>(
                  <button key={s} onClick={()=>{setQuery(s);setTimeout(()=>inputRef.current?.focus(),50);}}
                    style={{background:"#0f172a",border:"1px solid #1e293b",borderRadius:10,padding:"9px 12px",cursor:"pointer",color:"#94a3b8",fontSize:13,fontFamily:"inherit",textAlign:"left",transition:"border-color 0.15s"}}
                    onMouseEnter={e=>e.currentTarget.style.borderColor="#6366f1"}
                    onMouseLeave={e=>e.currentTarget.style.borderColor="#1e293b"}
                  >
                    {s}
                  </button>
                ))}
              </div>
            )}
            {messages.map((m,i)=>(
              <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
                <div style={{
                  maxWidth:"85%",padding:"10px 13px",borderRadius:m.role==="user"?"16px 16px 4px 16px":"16px 16px 16px 4px",
                  background:m.role==="user"?"linear-gradient(135deg,#6366f1,#8b5cf6)":"#0f172a",
                  border:m.role==="assistant"?"1px solid #1e293b":"none",
                  fontSize:13,lineHeight:1.6,color:"#f1f5f9",whiteSpace:"pre-wrap"
                }}>
                  {m.content}
                </div>
              </div>
            ))}
            {loading&&(
              <div style={{display:"flex",justifyContent:"flex-start"}}>
                <div style={{background:"#0f172a",border:"1px solid #1e293b",borderRadius:"16px 16px 16px 4px",padding:"10px 14px",display:"flex",gap:5,alignItems:"center"}}>
                  {[0,1,2].map(i=>(
                    <div key={i} style={{width:6,height:6,borderRadius:"50%",background:"#6366f1",animation:`bounce 1s ease-in-out ${i*0.15}s infinite`}}/>
                  ))}
                </div>
              </div>
            )}
            <div ref={bottomRef}/>
          </div>

          {/* Input */}
          <div style={{padding:"10px 12px",borderTop:"1px solid #1e293b",display:"flex",gap:8,flexShrink:0,background:"#0a0f1e"}}>
            <input
              ref={inputRef}
              value={query}
              onChange={e=>setQuery(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&send()}
              placeholder="Ask anything about training…"
              style={{flex:1,background:"#0f172a",border:"1px solid #334155",borderRadius:12,color:"#f1f5f9",padding:"10px 14px",fontSize:14,outline:"none",fontFamily:"inherit"}}
            />
            <button onClick={send} disabled={!query.trim()||loading}
              style={{width:42,height:42,borderRadius:12,background:query.trim()&&!loading?"linear-gradient(135deg,#6366f1,#8b5cf6)":"#1e293b",border:"none",cursor:query.trim()&&!loading?"pointer":"default",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"background 0.15s"}}>
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke={query.trim()&&!loading?"#fff":"#475569"} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>
          </div>
        </div>
      )}
      <style>{`@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}`}</style>
    </>
  );
}

// ── Workout Log ───────────────────────────────────────────────────────────────
function Log({workouts,exercises,templates,onNew,onQuickLog,onView,onNewFromTemplate,onDeleteTemplate,showInstall,onDismissInstall}){
  const [section,setSection]=useState("log"); // "log" | "templates"
  const sorted=[...workouts].sort((a,b)=>b.date.localeCompare(a.date));
  const ts=workouts.reduce((a,w)=>a+w.entries.reduce((b,e)=>b+e.sets.length,0),0);

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:"#0a0f1e",position:"relative"}}>
      {/* Header */}
      <div style={{padding:"24px 16px 0"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
          <div>
            <div style={{fontSize:13,fontWeight:600,color:"#6366f1",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:4}}>My Fitness</div>
            <div style={{fontSize:26,fontWeight:900,color:"#f1f5f9",letterSpacing:"-0.02em"}}>Workout Log</div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <Btn variant="primary" onClick={onQuickLog} style={{padding:"10px 14px",borderRadius:14,gap:6}}>
              <Icon name="play" size={15} color="#fff"/> Start
            </Btn>
            <button onClick={onNew} style={{width:38,height:38,borderRadius:12,background:"#1e293b",border:"1px solid #334155",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#64748b"}}>
              <Icon name="edit" size={16} color="#64748b"/>
            </button>
          </div>
        </div>
        {showInstall&&<InstallBanner onDismiss={onDismissInstall}/>}

        {/* Section toggle */}
        <div style={{display:"flex",gap:0,marginTop:14,background:"#0f172a",borderRadius:12,padding:3,border:"1px solid #1e293b"}}>
          {[{id:"log",label:"History"},{id:"templates",label:`Templates${templates.length?` (${templates.length})`:""}`}].map(s=>(
            <button key={s.id} onClick={()=>setSection(s.id)} style={{flex:1,padding:"8px",borderRadius:9,border:"none",cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:13,background:section===s.id?"#1e293b":"transparent",color:section===s.id?"#f1f5f9":"#64748b",transition:"all 0.15s"}}>
              {s.label}
            </button>
          ))}
        </div>
      </div>

      {/* History section */}
      {section==="log"&&(
        <>
          <div style={{padding:"14px 16px 0"}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
              {[{l:"Sessions",v:workouts.length,i:"fire"},{l:"Exercises",v:workouts.reduce((a,w)=>a+w.entries.length,0),i:"dumbbell"},{l:"Total Sets",v:ts,i:"list"}].map(s=>(
                <div key={s.l} style={{background:"#0f172a",borderRadius:14,padding:"12px 10px",border:"1px solid #1e293b",textAlign:"center"}}>
                  <div style={{color:"#6366f1",marginBottom:4}}><Icon name={s.i} size={18} color="#6366f1"/></div>
                  <div style={{fontSize:22,fontWeight:900,color:"#f1f5f9"}}>{s.v}</div>
                  <div style={{fontSize:10,color:"#64748b",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em"}}>{s.l}</div>
                </div>
              ))}
            </div>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"12px 16px 16px"}}>
            {sorted.length===0?(
              <div style={{textAlign:"center",padding:"60px 20px"}}>
                <div style={{marginBottom:16,opacity:0.3}}><Icon name="dumbbell" size={48} color="#6366f1"/></div>
                <div style={{fontSize:18,fontWeight:700,color:"#475569",marginBottom:8}}>No workouts yet</div>
                <div style={{fontSize:14,color:"#334155"}}>Tap + to log your first session</div>
              </div>
            ):(
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {sorted.map(w=>{
                  const muscles=[...new Set(w.entries.flatMap(e=>{const ex=exercises.find(x=>x.id===e.exerciseId);return ex?.muscles||[];}))]
                  const sets=w.entries.reduce((a,e)=>a+e.sets.length,0);
                  return(
                    <button key={w.id} onClick={()=>onView(w)} style={{background:"#0f172a",border:"1px solid #1e293b",borderRadius:16,padding:"14px",textAlign:"left",cursor:"pointer",fontFamily:"inherit",width:"100%"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                        <div style={{fontWeight:800,fontSize:16,color:"#f1f5f9"}}>{w.name}</div>
                        <div style={{fontSize:12,color:"#64748b",flexShrink:0,marginLeft:8}}>{fmtDate(w.date)}</div>
                      </div>
                      <div style={{marginBottom:8}}><MusclePills muscles={muscles} max={5}/></div>
                      <div style={{display:"flex",gap:14}}>
                        <span style={{fontSize:12,color:"#64748b"}}><span style={{color:"#94a3b8",fontWeight:700}}>{w.entries.length}</span> exercises</span>
                        <span style={{fontSize:12,color:"#64748b"}}><span style={{color:"#94a3b8",fontWeight:700}}>{sets}</span> sets</span>
                      </div>
                    </button>
                  );
                })}
              </div>
            )}
          </div>
        </>
      )}

      {/* Templates section */}
      {section==="templates"&&(
        <div style={{flex:1,overflowY:"auto",padding:"14px 16px 16px",display:"flex",flexDirection:"column",gap:10}}>
          {templates.length===0?(
            <div style={{textAlign:"center",padding:"60px 20px"}}>
              <div style={{marginBottom:16,opacity:0.3}}><Icon name="template" size={48} color="#6366f1"/></div>
              <div style={{fontSize:18,fontWeight:700,color:"#475569",marginBottom:8}}>No templates yet</div>
              <div style={{fontSize:14,color:"#334155",lineHeight:1.6}}>Open any workout, go to the{" "}<span style={{color:"#6366f1",fontWeight:600}}>Save as Template</span>{" "}tab, and save it.</div>
            </div>
          ):(
            templates.map(tpl=>{
              const muscles=[...new Set(tpl.entries.flatMap(e=>{const ex=exercises.find(x=>x.id===e.exerciseId);return ex?.muscles||[];}))]
              const totalSets=tpl.entries.reduce((a,e)=>a+e.sets.length,0);
              return(
                <div key={tpl.id} style={{background:"#0f172a",border:"1px solid #1e293b",borderRadius:16,overflow:"hidden"}}>
                  {/* Template card header */}
                  <div style={{padding:"14px 14px 10px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                      <div style={{fontWeight:800,fontSize:16,color:"#f1f5f9",flex:1,marginRight:8}}>{tpl.name}</div>
                      <button onClick={()=>onDeleteTemplate(tpl.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#475569",padding:2,flexShrink:0}}><Icon name="trash" size={15}/></button>
                    </div>
                    <div style={{marginBottom:8}}><MusclePills muscles={muscles} max={5}/></div>
                    <div style={{display:"flex",gap:14}}>
                      <span style={{fontSize:12,color:"#64748b"}}><span style={{color:"#94a3b8",fontWeight:700}}>{tpl.entries.length}</span> exercises</span>
                      <span style={{fontSize:12,color:"#64748b"}}><span style={{color:"#94a3b8",fontWeight:700}}>{totalSets}</span> sets</span>
                    </div>
                  </div>
                  {/* Exercises preview */}
                  <div style={{borderTop:"1px solid #1e293b",padding:"8px 14px 6px",display:"flex",flexDirection:"column",gap:4}}>
                    {tpl.entries.map((entry,i)=>{
                      const ex=exercises.find(e=>e.id===entry.exerciseId);
                      const col=ex?.muscles?.[0]?getColorForMuscle(ex.muscles[0]):"#6366f1";
                      return(
                        <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"4px 0"}}>
                          <div style={{display:"flex",alignItems:"center",gap:6}}>
                            <div style={{width:6,height:6,borderRadius:"50%",background:col,flexShrink:0}}/>
                            <span style={{fontSize:13,color:"#cbd5e1",fontWeight:500}}>{ex?.name}</span>
                          </div>
                          <span style={{fontSize:12,color:"#475569"}}>
                            {entry.sets.map(s=>s.weight||"?").join(" / ")} kg × {entry.sets.length}
                          </span>
                        </div>
                      );
                    })}
                  </div>
                  {/* Start button */}
                  <div style={{padding:"10px 14px 14px"}}>
                    <Btn variant="primary" onClick={()=>onNewFromTemplate(tpl)} style={{width:"100%",justifyContent:"center",padding:"11px",fontSize:14}}>
                      <Icon name="play" size={14} color="#fff"/> Start Workout
                    </Btn>
                  </div>
                </div>
              );
            })
          )}
        </div>
      )}
      <FitnessAssistant exercises={exercises}/>
    </div>
  );
}

// ── Settings Tab ──────────────────────────────────────────────────────────────
function SettingsTab({data, onRestore}){
  const [updating, setUpdating] = useState(false);
  const [status, setStatus] = useState(null);
  const [importState, setImportState] = useState(null); // null | "confirm" | "success" | "error"
  const [importPreview, setImportPreview] = useState(null);
  const fileRef = useRef(null);

  async function checkForUpdate(){
    setUpdating(true);
    setStatus("checking");
    try {
      const reg = await navigator.serviceWorker.getRegistration();
      if(reg){
        await reg.update();
        await new Promise(r=>setTimeout(r,1500));
        if(reg.waiting){
          reg.waiting.postMessage({type:"SKIP_WAITING"});
          setTimeout(()=>window.location.reload(),300);
          setStatus("updated");
        } else {
          setStatus("latest");
          setUpdating(false);
        }
      } else {
        window.location.reload(true);
      }
    } catch {
      window.location.reload(true);
    }
  }

  function handleExport(){
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const date = new Date().toISOString().slice(0,10);
    a.href = url;
    a.download = `fitness-backup-${date}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function handleFileSelect(e){
    const file = e.target.files?.[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if(!parsed.workouts || !parsed.exercises) throw new Error("Invalid format");
        setImportPreview(parsed);
        setImportState("confirm");
      } catch {
        setImportState("error");
      }
    };
    reader.readAsText(file);
    e.target.value = ""; // reset so same file can be re-selected
  }

  function confirmImport(){
    onRestore(importPreview);
    setImportState("success");
    setImportPreview(null);
  }

  const Row=({icon,title,subtitle,right,onClick,danger})=>(
    <button onClick={onClick} disabled={!onClick} style={{width:"100%",display:"flex",alignItems:"center",gap:12,padding:"14px 16px",background:"none",border:"none",cursor:onClick?"pointer":"default",fontFamily:"inherit",textAlign:"left",borderBottom:"1px solid #1e293b"}}>
      <div style={{width:36,height:36,borderRadius:10,background:danger?"rgba(239,68,68,0.12)":"#1e293b",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
        <Icon name={icon} size={18} color={danger?"#ef4444":"#94a3b8"}/>
      </div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:14,fontWeight:600,color:danger?"#ef4444":"#f1f5f9"}}>{title}</div>
        {subtitle&&<div style={{fontSize:12,color:"#475569",marginTop:1}}>{subtitle}</div>}
      </div>
      {right&&<div style={{flexShrink:0}}>{right}</div>}
    </button>
  );

  const workoutCount = data?.workouts?.length || 0;
  const exerciseCount = data?.exercises?.length || 0;

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:"#0a0f1e"}}>
      <div style={{padding:"24px 16px 16px",borderBottom:"1px solid #1e293b"}}>
        <div style={{fontSize:13,fontWeight:600,color:"#6366f1",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:4}}>Preferences</div>
        <div style={{fontSize:26,fontWeight:900,color:"#f1f5f9",letterSpacing:"-0.02em"}}>Settings</div>
      </div>
      <div style={{overflowY:"auto",flex:1,padding:"16px",display:"flex",flexDirection:"column",gap:14}}>

        {/* Data section */}
        <div style={{background:"#0f172a",borderRadius:16,border:"1px solid #1e293b",overflow:"hidden"}}>
          <div style={{padding:"10px 16px 8px",borderBottom:"1px solid #1e293b"}}>
            <span style={{fontSize:11,fontWeight:700,color:"#475569",textTransform:"uppercase",letterSpacing:"0.08em"}}>Data</span>
          </div>

          {/* Export */}
          <Row
            icon="download"
            title="Export backup"
            subtitle={`Downloads a .json file — ${workoutCount} workout${workoutCount!==1?"s":""}, ${exerciseCount} exercises`}
            onClick={handleExport}
            right={
              <div style={{background:"linear-gradient(135deg,#6366f1,#8b5cf6)",borderRadius:8,padding:"6px 12px"}}>
                <span style={{fontSize:12,fontWeight:700,color:"#fff"}}>Export</span>
              </div>
            }
          />

          {/* Import */}
          <div style={{borderBottom:"1px solid #1e293b"}}>
            <button onClick={()=>fileRef.current?.click()} style={{width:"100%",display:"flex",alignItems:"center",gap:12,padding:"14px 16px",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",textAlign:"left"}}>
              <div style={{width:36,height:36,borderRadius:10,background:"#1e293b",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:600,color:"#f1f5f9"}}>Restore from backup</div>
                <div style={{fontSize:12,color:"#475569",marginTop:1}}>
                  {importState==="success" ? "✓ Data restored successfully" :
                   importState==="error"   ? "⚠ Invalid file — try a different backup" :
                   "Load a previously exported .json file"}
                </div>
              </div>
              <div style={{background:"#1e293b",borderRadius:8,padding:"6px 12px",flexShrink:0}}>
                <span style={{fontSize:12,fontWeight:700,color:"#94a3b8"}}>Choose file</span>
              </div>
            </button>
            <input ref={fileRef} type="file" accept=".json" onChange={handleFileSelect} style={{display:"none"}}/>

            {/* Confirm import overlay */}
            {importState==="confirm" && importPreview && (
              <div style={{margin:"0 14px 14px",background:"rgba(99,102,241,0.08)",border:"1px solid rgba(99,102,241,0.25)",borderRadius:12,padding:"14px"}}>
                <div style={{fontSize:13,fontWeight:700,color:"#f1f5f9",marginBottom:4}}>Replace current data?</div>
                <div style={{fontSize:12,color:"#94a3b8",marginBottom:12,lineHeight:1.5}}>
                  This backup contains <strong style={{color:"#f1f5f9"}}>{importPreview.workouts?.length||0} workouts</strong> and <strong style={{color:"#f1f5f9"}}>{importPreview.exercises?.length||0} exercises</strong>. Your current data will be overwritten.
                </div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>{setImportState(null);setImportPreview(null);}} style={{flex:1,background:"#1e293b",border:"none",borderRadius:10,padding:"9px",cursor:"pointer",color:"#94a3b8",fontSize:13,fontWeight:600,fontFamily:"inherit"}}>Cancel</button>
                  <button onClick={confirmImport} style={{flex:1,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",border:"none",borderRadius:10,padding:"9px",cursor:"pointer",color:"#fff",fontSize:13,fontWeight:700,fontFamily:"inherit"}}>Restore</button>
                </div>
              </div>
            )}
          </div>

          {/* Last row — no border */}
          <div style={{padding:"12px 16px",display:"flex",alignItems:"center",gap:8}}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#475569" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span style={{fontSize:12,color:"#475569",lineHeight:1.5}}>Backups include all workouts, exercises, templates and body weight. Export regularly to avoid data loss.</span>
          </div>
        </div>

        {/* App section */}
        <div style={{background:"#0f172a",borderRadius:16,border:"1px solid #1e293b",overflow:"hidden"}}>
          <div style={{padding:"10px 16px 8px",borderBottom:"1px solid #1e293b"}}>
            <span style={{fontSize:11,fontWeight:700,color:"#475569",textTransform:"uppercase",letterSpacing:"0.08em"}}>App</span>
          </div>
          <Row
            icon="download"
            title="Check for updates"
            subtitle={
              status==="checking" ? "Checking…" :
              status==="updated"  ? "Update found — reloading…" :
              status==="latest"   ? "You're on the latest version ✓" :
              "Reload the app to fetch any new features"
            }
            onClick={!updating ? checkForUpdate : null}
            right={
              updating
                ? <div style={{width:28,height:28,borderRadius:"50%",border:"2px solid #6366f1",borderTopColor:"transparent",animation:"spin 0.8s linear infinite"}}/>
                : <div style={{background:"linear-gradient(135deg,#6366f1,#8b5cf6)",borderRadius:8,padding:"6px 12px"}}>
                    <span style={{fontSize:12,fontWeight:700,color:"#fff"}}>Update</span>
                  </div>
            }
          />
        </div>

        {/* Coming soon section */}
        <div style={{background:"#0f172a",borderRadius:16,border:"1px solid #1e293b",overflow:"hidden"}}>
          <div style={{padding:"10px 16px 8px",borderBottom:"1px solid #1e293b"}}>
            <span style={{fontSize:11,fontWeight:700,color:"#475569",textTransform:"uppercase",letterSpacing:"0.08em"}}>Coming soon</span>
          </div>
          {[
            {icon:"user", title:"Profile & Goals",  subtitle:"Set weekly targets and personal goals"},
            {icon:"fire", title:"Streaks & Badges",  subtitle:"Track consistency and milestones"},
            {icon:"tag",  title:"Custom Tags",        subtitle:"Tag workouts by programme or focus"},
          ].map((item,i,arr)=>(
            <div key={item.title} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",borderBottom:i<arr.length-1?"1px solid #1e293b":"none",opacity:0.45}}>
              <div style={{width:36,height:36,borderRadius:10,background:"#1e293b",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <Icon name={item.icon} size={18} color="#64748b"/>
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:600,color:"#94a3b8"}}>{item.title}</div>
                <div style={{fontSize:12,color:"#475569",marginTop:1}}>{item.subtitle}</div>
              </div>
              <div style={{fontSize:10,fontWeight:700,color:"#475569",background:"#1e293b",padding:"3px 8px",borderRadius:6,flexShrink:0}}>SOON</div>
            </div>
          ))}
        </div>

        <div style={{textAlign:"center",padding:"8px 0 4px"}}>
          <span style={{fontSize:11,color:"#334155"}}>Fitness Tracker · v6</span>
        </div>

      </div>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );
}

// ── Quick Log (focused workout mode) ─────────────────────────────────────────
// Stripped-down in-session logger: just exercise cards + sets, add exercise, finish & save.
function QuickLog({exercises, templates, onSave, onCancel, onCreateExercise}){
  const [step, setStep] = useState("pick"); // "pick" | "workout"
  const [workout, setWorkout] = useState(null);
  const [pick, setPick] = useState(false);
  const [confirmDiscard, setConfirmDiscard] = useState(false);

  function startBlank(){
    setWorkout({id:Date.now().toString(), date:today(), name:"Quick Workout", entries:[], notes:""});
    setStep("workout");
  }
  function startFromTemplate(tpl){
    setWorkout(templateToWorkout(tpl));
    setStep("workout");
  }
  function addEx(ex){
    setWorkout(p=>({...p, entries:[...p.entries, {exerciseId:ex.id, sets:[{weight:"",reps:"",rir:""}], note:""}]}));
    setPick(false);
  }
  function updE(i,e){ setWorkout(p=>({...p, entries:p.entries.map((x,j)=>j===i?e:x)})); }
  function remE(i){ setWorkout(p=>({...p, entries:p.entries.filter((_,j)=>j!==i)})); }
  function finish(){
    if(workout.entries.length===0){setConfirmDiscard(true);return;}
    onSave(workout);
  }

  // ── Step 1: pick template or start blank ──
  if(step==="pick") return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:"#0a0f1e"}}>
      <div style={{padding:"24px 16px 16px",borderBottom:"1px solid #1e293b",display:"flex",alignItems:"center",gap:10}}>
        <button onClick={onCancel} style={{background:"none",border:"none",cursor:"pointer",color:"#94a3b8",padding:4}}><Icon name="close" size={22}/></button>
        <span style={{fontWeight:800,fontSize:18,color:"#f1f5f9",flex:1}}>Start Workout</span>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"20px 16px",display:"flex",flexDirection:"column",gap:14}}>
        {/* Blank start */}
        <button onClick={startBlank} style={{background:"linear-gradient(135deg,rgba(99,102,241,0.15),rgba(139,92,246,0.1))",border:"2px dashed rgba(99,102,241,0.4)",borderRadius:18,padding:"22px 18px",cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:14,textAlign:"left",width:"100%"}}>
          <div style={{width:44,height:44,borderRadius:12,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <Icon name="plus" size={22} color="#fff"/>
          </div>
          <div>
            <div style={{fontSize:16,fontWeight:800,color:"#f1f5f9",marginBottom:3}}>Empty Workout</div>
            <div style={{fontSize:13,color:"#64748b"}}>Start fresh, add exercises as you go</div>
          </div>
        </button>

        {/* Templates */}
        {templates.length>0&&(
          <>
            <div style={{fontSize:11,fontWeight:700,color:"#475569",textTransform:"uppercase",letterSpacing:"0.08em",marginTop:4}}>From a template</div>
            {templates.map(tpl=>{
              const muscles=[...new Set(tpl.entries.flatMap(e=>{const ex=exercises.find(x=>x.id===e.exerciseId);return ex?.muscles||[];}))]
              return(
                <button key={tpl.id} onClick={()=>startFromTemplate(tpl)}
                  style={{background:"#0f172a",border:"1px solid #1e293b",borderRadius:16,padding:"14px",cursor:"pointer",fontFamily:"inherit",textAlign:"left",width:"100%",display:"flex",alignItems:"center",gap:12}}>
                  <div style={{width:40,height:40,borderRadius:10,background:"#1e293b",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    <Icon name="template" size={18} color="#6366f1"/>
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:15,fontWeight:700,color:"#f1f5f9",marginBottom:4}}>{tpl.name}</div>
                    <MusclePills muscles={muscles} max={4}/>
                  </div>
                  <Icon name="chevron" size={18} color="#334155"/>
                </button>
              );
            })}
          </>
        )}
      </div>
    </div>
  );

  // ── Step 2: focused workout session ──
  const totalSets = workout.entries.reduce((a,e)=>a+e.sets.filter(s=>s.weight||s.reps).length, 0);

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:"#0a0f1e"}}>
      {/* Header */}
      <div style={{padding:"14px 16px",borderBottom:"1px solid #1e293b",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
          <button onClick={()=>setConfirmDiscard(true)} style={{background:"none",border:"none",cursor:"pointer",color:"#64748b",padding:4}}><Icon name="close" size={20}/></button>
          <span style={{flex:1,fontSize:12,color:"#475569",fontWeight:600}}>
            {workout.entries.length} exercise{workout.entries.length!==1?"s":""} · {totalSets} set{totalSets!==1?"s":""} logged
          </span>
          <Btn variant="green" onClick={finish} style={{padding:"8px 16px",fontSize:13,borderRadius:12}}>
            <Icon name="check" size={15} color="#fff"/> Finish
          </Btn>
        </div>
        <div style={{display:"flex",gap:8}}>
          <input
            value={workout.name}
            onChange={e=>setWorkout(p=>({...p,name:e.target.value}))}
            placeholder="Workout name…"
            style={{flex:1,background:"#0f172a",border:"1px solid #1e293b",borderRadius:10,color:"#f1f5f9",padding:"8px 12px",fontSize:14,fontWeight:700,outline:"none",fontFamily:"inherit"}}
          />
          <DateInput
            value={workout.date}
            onChange={d=>setWorkout(p=>({...p,date:d}))}
            style={{background:"#0f172a",border:"1px solid #1e293b",borderRadius:10,color:"#94a3b8",padding:"8px 10px",fontSize:13,outline:"none",fontFamily:"inherit",width:120}}
          />
        </div>
      </div>

      {/* Exercise cards */}
      <div style={{flex:1,overflowY:"auto",padding:"14px 16px",display:"flex",flexDirection:"column",gap:12}}>
        {workout.entries.length===0&&(
          <div style={{textAlign:"center",padding:"50px 20px",color:"#334155",fontSize:14}}>
            No exercises yet — tap below to add one
          </div>
        )}
        {workout.entries.map((entry,i)=>(
          <WECard key={i} entry={entry} exercises={exercises} onChange={e=>updE(i,e)} onRemove={()=>remE(i)}/>
        ))}
        {/* Add exercise button */}
        <button onClick={()=>setPick(true)} style={{width:"100%",padding:"14px",background:"#0f172a",border:"2px dashed #1e293b",borderRadius:16,cursor:"pointer",color:"#6366f1",fontSize:14,fontWeight:700,fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          <Icon name="plus" size={18} color="#6366f1"/> Add Exercise
        </button>
      </div>

      {/* Discard confirm overlay */}
      {confirmDiscard&&(
        <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"flex-end",zIndex:50}}>
          <div style={{background:"#0f172a",border:"1px solid #1e293b",borderRadius:"20px 20px 0 0",width:"100%",padding:"24px 20px",display:"flex",flexDirection:"column",gap:14}}>
            <div style={{fontSize:17,fontWeight:800,color:"#f1f5f9"}}>Discard workout?</div>
            <div style={{fontSize:14,color:"#64748b"}}>All sets logged in this session will be lost.</div>
            <div style={{display:"flex",gap:10}}>
              <Btn variant="secondary" onClick={()=>setConfirmDiscard(false)} style={{flex:1,justifyContent:"center"}}>Keep going</Btn>
              <button onClick={onCancel} style={{flex:1,background:"rgba(239,68,68,0.15)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:12,padding:"10px",cursor:"pointer",color:"#f87171",fontSize:14,fontWeight:700,fontFamily:"inherit"}}>Discard</button>
            </div>
          </div>
        </div>
      )}

      {pick&&<Picker exercises={exercises} onPick={addEx} onClose={()=>setPick(false)} onCreateExercise={onCreateExercise}/>}
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const [data,setData]=useState(()=>loadData());
  const [tab,setTab]=useState("log");
  const [screen,setScreen]=useState(null);
  const [active,setActive]=useState(null);
  const [showInstall,setShowInstall]=useState(true);
  const isInstalled=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone===true;
  const {workouts,exercises,bodyweight,templates}=data;

  const setW=fn=>setData(p=>{const n={...p,workouts:typeof fn==="function"?fn(p.workouts):fn};saveData(n);return n;});
  const setEx=fn=>setData(p=>{const n={...p,exercises:typeof fn==="function"?fn(p.exercises):fn};saveData(n);return n;});
  const setBW=bw=>setData(p=>{const n={...p,bodyweight:bw};saveData(n);return n;});
  const setTpl=fn=>setData(p=>{const n={...p,templates:typeof fn==="function"?fn(p.templates||[]):fn};saveData(n);return n;});

  const save=w=>{setW(p=>{const e=p.find(x=>x.id===w.id);return e?p.map(x=>x.id===w.id?w:x):[...p,w];});setScreen(null);setActive(null);setTab("log");};
  const del=id=>{setW(p=>p.filter(w=>w.id!==id));setScreen(null);setActive(null);};

  const saveTemplate=(workout,name)=>{
    const tpl=workoutToTemplate(workout,name);
    setTpl(p=>[...p,tpl]);
  };
  const deleteTemplate=id=>setTpl(p=>p.filter(t=>t.id!==id));

  const startFromTemplate=tpl=>{
    const w=templateToWorkout(tpl);
    setActive(w);
    setScreen("new-from-template");
  };

  const scr=
    screen==="quicklog"
      ?<QuickLog
          exercises={exercises}
          templates={templates||[]}
          onSave={w=>{setW(p=>{const e=p.find(x=>x.id===w.id);return e?p.map(x=>x.id===w.id?w:x):[...p,w];});setScreen(null);}}
          onCancel={()=>setScreen(null)}
          onCreateExercise={ex=>setEx(p=>[...p,ex])}
        />
    :screen==="new"
      ?<Editor exercises={exercises} onSave={save} onCancel={()=>setScreen(null)}/>
    :screen==="new-from-template"
      ?<Editor workout={active} exercises={exercises} onSave={save} onCancel={()=>{setScreen(null);setActive(null);}}/>
    :screen==="edit"
      ?<Editor workout={active} exercises={exercises} onSave={save} onCancel={()=>setScreen("detail")}/>
    :screen==="detail"
      ?<Detail
          workout={active}
          exercises={exercises}
          onBack={()=>{setScreen(null);setActive(null);}}
          onEdit={()=>setScreen("edit")}
          onDelete={()=>del(active.id)}
          onSaveTemplate={saveTemplate}
          existingTemplate={(templates||[]).some(t=>t.createdFrom===active.id)}
        />
    :null;

  const main=scr||(
    tab==="log"
      ?<Log
          workouts={workouts}
          exercises={exercises}
          templates={templates||[]}
          onNew={()=>setScreen("new")}
          onQuickLog={()=>setScreen("quicklog")}
          onView={w=>{setActive(w);setScreen("detail");}}
          onNewFromTemplate={startFromTemplate}
          onDeleteTemplate={deleteTemplate}
          showInstall={showInstall&&!isInstalled}
          onDismissInstall={()=>setShowInstall(false)}
        />
      :tab==="stats"
        ?<StatsTab workouts={workouts} exercises={exercises} bodyweight={bodyweight||80} onSetBW={setBW}/>
        :tab==="library"
          ?<Library exercises={exercises} setExercises={setEx}/>
          :<SettingsTab data={data} onRestore={d=>{setData(d);saveData(d);}}/>
  );

  const TABS=[
    {id:"log",    label:"Log",      icon:"calendar"},
    {id:"stats",  label:"Stats",    icon:"chart"},
    {id:"library",label:"Library",  icon:"list"},
    {id:"settings",label:"Settings",icon:"settings"},
  ];
  return(
    <div style={{fontFamily:"'DM Sans','Segoe UI',sans-serif",background:"#0a0f1e",color:"#f1f5f9",height:"100dvh",display:"flex",flexDirection:"column",maxWidth:430,margin:"0 auto",overflow:"hidden"}}>
      <div style={{flex:1,minHeight:0,display:"flex",flexDirection:"column"}}>{main}</div>
      {!screen&&(
        <div style={{display:"flex",background:"#0f172a",borderTop:"1px solid #1e293b",padding:`8px 0 max(12px, env(safe-area-inset-bottom))`}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4,padding:"6px 0",fontFamily:"inherit"}}>
              <Icon name={t.icon} size={22} color={tab===t.id?"#6366f1":"#475569"}/>
              <span style={{fontSize:10,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",color:tab===t.id?"#6366f1":"#475569"}}>{t.label}</span>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
