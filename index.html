<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Fitness Tracker</title>

  <!-- PWA meta tags -->
  <meta name="application-name" content="Fitness Tracker" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Fitness" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0a0f1e" />
  <meta name="description" content="Track your workouts, sets, reps and more." />

  <!-- PWA manifest (generated at runtime to support single-file deploy) -->
  <link rel="manifest" id="manifest-placeholder" />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="root"></div>

  <!--
    React + ReactDOM are loaded from the js/ folder (inlined builds for offline support).
    To update React, replace these files with the latest production builds from:
    https://unpkg.com/react@19/umd/react.production.min.js
    https://unpkg.com/react-dom@19/umd/react-dom.production.min.js
  -->
  <!-- React 19 + ReactDOM combined production build (extracted from original, offline-capable) -->
  <script>const APP_VERSION = "1.16.6";</script>

  <script>
    // ── Startup integrity check ───────────────────────────────────────────────
    // Checks for signs of a stale cache (duplicate declarations cause JS errors,
    // or the root element stays empty after load). Only triggers once per session
    // to prevent reload loops.
    window.addEventListener('load', function() {
      if (sessionStorage.getItem('_integrityChecked')) return;
      sessionStorage.setItem('_integrityChecked', '1');
      setTimeout(function() {
        var root = document.getElementById('root');
        var hasContent = root && root.children.length > 0;
        if (hasContent) return;
        console.warn('[FitnessTracker] Root is empty after load — possible stale cache. Clearing and reloading.');
        var banner = document.createElement('div');
        banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#1c1c1c;color:#f59e0b;font-family:sans-serif;font-size:13px;font-weight:600;padding:12px 16px;text-align:center;border-bottom:1px solid #92400e;';
        banner.textContent = 'Refreshing to fix a caching issue…';
        document.body.appendChild(banner);
        if ('caches' in window) {
          caches.keys().then(function(keys) {
            return Promise.all(keys.map(function(k) { return caches.delete(k); }));
          }).then(function() {
            if (navigator.serviceWorker) {
              navigator.serviceWorker.getRegistrations().then(function(regs) {
                return Promise.all(regs.map(function(r) { return r.unregister(); }));
              }).then(function() { window.location.reload(true); });
            } else {
              window.location.reload(true);
            }
          });
        } else {
          window.location.reload(true);
        }
      }, 3000);
    });
  </script>
  <script src="js/react.production.min.js"></script>
  <script src="js/react-dom.production.min.js"></script>

  <!-- App modules — load order matters -->
  <script src="js/pwa.js?v=1.16.6"></script>

  <script src="js/components/muscle-selector.js?v=1.16.6"></script>
  <script src="js/components/exercise-picker.js?v=1.16.6"></script>

  <script src="js/app.js?v=1.16.6"></script>
</body>
