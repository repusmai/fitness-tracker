if('serviceWorker' in navigator){
  // Network-first for HTML (so updates load automatically on next open),
  // cache-first for everything else (scripts, CDN assets stay fast offline).
  const sw=`
const C='fitness-v6';
self.addEventListener('install',e=>{self.skipWaiting();});
self.addEventListener('activate',e=>{
  e.waitUntil(
    caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k))))
    .then(()=>clients.claim())
  );
});
self.addEventListener('fetch',e=>{
  const url=new URL(e.request.url);
  const isHTML=e.request.mode==='navigate'||url.pathname.endsWith('.html')||url.pathname==='/';
  if(isHTML){
    // Network-first: try to fetch fresh copy; fall back to cache if offline
    e.respondWith(
      fetch(e.request).then(res=>{
        const c=res.clone();
        caches.open(C).then(ca=>ca.put(e.request,c));
        return res;
      }).catch(()=>caches.match(e.request))
    );
  } else {
    // Cache-first: serve cached assets instantly, update cache in background
    e.respondWith(
      caches.match(e.request).then(cached=>{
        const fetched=fetch(e.request).then(res=>{
          const c=res.clone();
          caches.open(C).then(ca=>ca.put(e.request,c));
          return res;
        }).catch(()=>cached);
        return cached||fetched;
      })
    );
  }
});`;
  navigator.serviceWorker.register(
    URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))
  ).then(reg=>{
    // When a new SW takes over, reload the page to pick up the latest HTML
    navigator.serviceWorker.addEventListener('controllerchange',()=>{
      window.location.reload();
    });
    // Periodically check for updates (every 60 minutes while app is open)
    setInterval(()=>reg.update(),60*60*1000);
  }).catch(()=>{});
}

// Get primary category for display purposes (first muscle's category)
function getPrimaryCategory(exercise) {
  if (!exercise.muscles?.length) return "Full Body";
  return getCategoryForMuscle(exercise.muscles[0]);
}

// ── Muscle-group radar: population baseline best-1RM scores (kg, for an 80kg lifter)
// Baselines = advanced lifter (~3-5 years consistent training)
const MUSCLE_STANDARDS = [
  { key:"chest",     label:"Chest",     color:"#ef4444", muscles:["Pectoralis Major","Pectoralis Minor","Serratus Anterior"], standard:140 },
  { key:"back",      label:"Back",      color:"#3b82f6", muscles:["Lats","Upper Traps","Mid Traps","Lower Traps","Rhomboids","Erector Spinae","Multifidus"], standard:175 },
  { key:"shoulders", label:"Shoulders", color:"#a855f7", muscles:["Front Delt","Side Delt","Rear Delt","Rotator Cuff"], standard:85  },

  { key:"legs",      label:"Legs",      color:"#22c55e", muscles:["Quads","Hamstrings","Glutes","Adductors","Abductors","Calves","Tibialis Anterior","Hip Flexors"], standard:210 },

];

// Get best estimated 1RM across exercises where the muscle is the PRIMARY (first) muscle
function getBestByMuscles(workouts, exercises, muscleNames) {
  let best = 0;
  for (const w of workouts) {
    for (const entry of w.entries) {
      const ex = exercises.find(e => e.id === entry.exerciseId);
      if (!ex) continue;
      // Only count if one of the primary muscles matches
      const primary = ex.primaryMuscles?.length ? ex.primaryMuscles : [ex.muscles?.[0]].filter(Boolean);
      const matches = primary.some(m => muscleNames.includes(m));
      if (!matches) continue;
      for (const s of entry.sets) {
        const v = epley(s.weight, s.reps);
        if (v > best) best = v;
      }
    }
  }
  return best;
}

// Get per-workout best 1RM for a specific exercise (for the strength trend graph)
function getExerciseHistory(workouts, exerciseId) {
  const points = [];
  for (const w of workouts) {
    const entry = w.entries.find(e => e.exerciseId === exerciseId);
    if (!entry) continue;
    let best = 0;
    for (const s of entry.sets) { const v = epley(s.weight, s.reps); if (v > best) best = v; }
    if (best > 0) points.push({ date: w.date, value: best });
  }
  return points.sort((a, b) => a.date.localeCompare(b.date));
}



function migrateExercise(e){
  if(!e.primaryMuscles){
    e.primaryMuscles = e.muscles?.length ? [e.muscles[0]] : [];
    e.secondaryMuscles = e.muscles?.slice(1) || [];
  }
  return e;
}
const KEY = "fitnessTracker_v2";
function loadData(){try{const r=localStorage.getItem(KEY);if(r){const d=JSON.parse(r);if(d.exercises){d.exercises=d.exercises.map(e=>{if(!e.muscles){e.muscles=[e.group||"Full Body"];}return migrateExercise(e);});}if(!d.templates)d.templates=[];return d;}}catch{}return{workouts:[],exercises:DEFAULT_EXERCISES,bodyweight:80,templates:[]};}
function saveData(d){try{localStorage.setItem(KEY,JSON.stringify(d));}catch{}}

// Build a template from a finished workout: keep weights, clear reps+rir+notes
function workoutToTemplate(workout, templateName) {
  return {
    id: "t" + Date.now(),
    name: templateName || workout.name,
    createdFrom: workout.id,
    createdAt: new Date().toISOString(),
    entries: workout.entries.map(entry => ({
      exerciseId: entry.exerciseId,
      note: "",
      sets: entry.sets.map(s => ({ weight: s.weight, reps: "", rir: "" }))
    }))
  };
}

// Build a new workout pre-filled from a template
function templateToWorkout(template) {
  return {
    id: Date.now().toString(),
    date: today(),
    name: template.name,
    notes: "",
    entries: template.entries.map(entry => ({
      exerciseId: entry.exerciseId,
      note: "",
      sets: entry.sets.map(s => ({ weight: s.weight, reps: "", rir: "" }))
    }))
  };
}
function today(){return new Date().toISOString().slice(0,10);}
function fmtDate(iso){
  if(!iso) return "";
  const [y,m,d]=iso.split("-");
  return `${d}/${m}/${y}`;
}
// DateInput: displays dd/mm/yyyy, stores iso yyyy-mm-dd via onChange(isoString)
function DateInput({value, onChange, style}){
  // value is ISO yyyy-mm-dd
  const toDisplay=iso=>{if(!iso)return "";const[y,m,d]=iso.split("-");return `${d}/${m}/${y}`;};
  const [raw,setRaw]=useState(toDisplay(value));
  // sync if parent value changes
  useEffect(()=>setRaw(toDisplay(value)),[value]);
  function handleChange(e){
    let v=e.target.value.replace(/[^0-9/]/g,"");
    // auto-insert slashes
    if(v.length===2&&raw.length===1) v=v+"/";
    if(v.length===5&&raw.length===4) v=v+"/";
    if(v.length>10) v=v.slice(0,10);
    setRaw(v);
    // parse to ISO when complete
    const parts=v.split("/");
    if(parts.length===3&&parts[0].length===2&&parts[1].length===2&&parts[2].length===4){
      const iso=`${parts[2]}-${parts[1]}-${parts[0]}`;
      if(!isNaN(new Date(iso))) onChange(iso);
    }
  }
  return(
    <input
      value={raw}
      onChange={handleChange}
      placeholder="dd/mm/yyyy"
      maxLength={10}
      inputMode="numeric"
      style={style}
    />
  );
}
function epley(weight,reps){const w=parseFloat(weight),r=parseInt(reps);if(!w||!r||r<=0)return 0;return r===1?w:Math.round(w*(1+r/30));}

// Get all exercises that have been logged at least once, with their latest best 1RM
function getLoggedExercises(workouts, exercises) {
  const map = {};
  for (const w of workouts) {
    for (const entry of w.entries) {
      if (!map[entry.exerciseId]) map[entry.exerciseId] = 0;
      for (const s of entry.sets) {
        const v = epley(s.weight, s.reps);
        if (v > map[entry.exerciseId]) map[entry.exerciseId] = v;
      }
    }
  }
  return Object.entries(map)
    .map(([id, best1rm]) => ({ exercise: exercises.find(e => e.id === id), best1rm }))
    .filter(x => x.exercise)
    .sort((a, b) => b.best1rm - a.best1rm);
}

const Inp=({label,...p})=>(

// ── Muscle Selector (primary + secondary) ────────────────────────────────────
// primary: string[] of primary muscles, secondary: string[] of secondary
// onChange(primary, secondary)
function MuscleSelector({ primary=[], secondary=[], onChange }) {
  const [openCat, setOpenCat] = useState(null);
  const allSelected = [...new Set([...primary, ...secondary])];

  function toggleMuscle(muscle) {
    if (primary.includes(muscle)) {
      // primary → secondary
      onChange(primary.filter(m=>m!==muscle), [...secondary, muscle]);
    } else if (secondary.includes(muscle)) {
      // secondary → deselect
      onChange(primary, secondary.filter(m=>m!==muscle));
    } else {
      // unselected → primary
      onChange([...primary, muscle], secondary);
    }
  }

  function getState(muscle) {
    if (primary.includes(muscle)) return "primary";
    if (secondary.includes(muscle)) return "secondary";
    return "none";
  }

  return (
    <div style={{display:"flex",flexDirection:"column",gap:6}}>
      <div style={{fontSize:11,color:"#475569",display:"flex",gap:12,marginBottom:2}}>
        <span>Tap once = <strong style={{color:"#f1f5f9"}}>Primary</strong></span>

        <span>Third tap = remove</span>
      </div>
      {MUSCLE_CATEGORIES.map(cat => {
        const catPrimary = primary.filter(m=>cat.muscles.includes(m)).length;
        const catSecondary = secondary.filter(m=>cat.muscles.includes(m)).length;
        return (
          <div key={cat.category} style={{background:"#0f172a",borderRadius:12,overflow:"hidden",border:"1px solid #1e293b"}}>
            <button onClick={()=>setOpenCat(openCat===cat.category?null:cat.category)} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 12px",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:cat.color,flexShrink:0}}/>
                <span style={{fontSize:13,fontWeight:700,color:"#e2e8f0"}}>{cat.category}</span>
                {catPrimary>0 && <span style={{fontSize:10,fontWeight:700,color:"#fff",background:cat.color,padding:"1px 7px",borderRadius:20}}>{catPrimary}P</span>}
                {catSecondary>0 && <span style={{fontSize:10,fontWeight:700,color:cat.color,background:`${cat.color}33`,padding:"1px 7px",borderRadius:20}}>{catSecondary}S</span>}
              </div>
              <div style={{transform:openCat===cat.category?"rotate(90deg)":"rotate(0deg)",transition:"transform 0.2s",color:"#475569"}}>
                <Icon name="chevron" size={16}/>
              </div>
            </button>
            {openCat===cat.category && (
              <div style={{padding:"4px 12px 12px",display:"flex",flexWrap:"wrap",gap:6}}>
                {cat.muscles.map(muscle => {
                  const state = getState(muscle);
                  return (
                    <button key={muscle} onClick={()=>toggleMuscle(muscle)}
                      style={{padding:"5px 12px",borderRadius:20,fontSize:12,fontWeight:600,border:state==="secondary"?`1.5px solid ${cat.color}`:"none",cursor:"pointer",fontFamily:"inherit",
                        background:state==="primary"?cat.color:state==="secondary"?`${cat.color}22`:"#1e293b",
                        color:state==="primary"?"#fff":state==="secondary"?cat.color:"#475569",
                        transition:"all 0.15s"}}>
                      {muscle}{state==="primary"?" ●":state==="secondary"?" ○":""}
                    </button>
                  );

  );
}

// ── Radar ─────────────────────────────────────────────────────────────────────
// data: [{label, color, ratio, hasData}]  ratio=1 means at population baseline
function Radar({data}){
  const ref=useRef(null);
  const size=Math.min(typeof window!=="undefined"?window.innerWidth-48:300,300);
  const N=data.length,cx=size/2,cy=size/2,R=size*0.33;
  useEffect(()=>{
    const canvas=ref.current;if(!canvas)return;
    const ctx=canvas.getContext("2d");const dpr=window.devicePixelRatio||1;
    canvas.width=size*dpr;canvas.height=size*dpr;canvas.style.width=size+"px";canvas.style.height=size+"px";
    ctx.scale(dpr,dpr);ctx.clearRect(0,0,size,size);
    const ang=i=>(Math.PI*2*i/N)-Math.PI/2;
    const pt=(i,r)=>[cx+r*Math.cos(ang(i)),cy+r*Math.sin(ang(i))];
    // Grid rings
    for(let lv=1;lv<=5;lv++){const r=R*(lv/5);ctx.beginPath();for(let i=0;i<N;i++){const[x,y]=pt(i,r);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}ctx.closePath();ctx.strokeStyle=lv===5?"#334155":"#1a2540";ctx.lineWidth=lv===5?1.5:1;ctx.stroke();}
    // Spokes
    for(let i=0;i<N;i++){const[x,y]=pt(i,R);ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(x,y);ctx.strokeStyle="#1a2540";ctx.lineWidth=1;ctx.stroke();}
    // Baseline ring (the "average lifter" = R = ratio 1.0) - filled dashed
    ctx.beginPath();for(let i=0;i<N;i++){const[x,y]=pt(i,R);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}ctx.closePath();ctx.fillStyle="rgba(99,102,241,0.06)";ctx.fill();ctx.strokeStyle="rgba(99,102,241,0.35)";ctx.lineWidth=1.5;ctx.setLineDash([4,4]);ctx.stroke();ctx.setLineDash([]);
    // User polygon — each axis colored by muscle group
    const clampRatio=r=>Math.min(r,1.45);
    // filled user polygon (neutral color fill)
    ctx.beginPath();for(let i=0;i<N;i++){const ratio=data[i].hasData?clampRatio(data[i].ratio):0;const[x,y]=pt(i,R*ratio);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}ctx.closePath();
    const g=ctx.createRadialGradient(cx,cy,0,cx,cy,R);g.addColorStop(0,"rgba(99,102,241,0.45)");g.addColorStop(1,"rgba(139,92,246,0.08)");ctx.fillStyle=g;ctx.fill();
    // colored stroke per segment
    for(let i=0;i<N;i++){
      const ni=(i+1)%N;
      const r0=data[i].hasData?clampRatio(data[i].ratio):0;
      const r1=data[ni].hasData?clampRatio(data[ni].ratio):0;
      const[x0,y0]=pt(i,R*r0);const[x1,y1]=pt(ni,R*r1);
      ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);
      ctx.strokeStyle=data[i].color;ctx.lineWidth=2;ctx.stroke();
    }
    // Dots + labels
    for(let i=0;i<N;i++){
      const ratio=data[i].hasData?clampRatio(data[i].ratio):0;
      const[x,y]=pt(i,R*ratio);
      if(data[i].hasData){ctx.beginPath();ctx.arc(x,y,4.5,0,Math.PI*2);ctx.fillStyle=data[i].ratio>=1?"#22c55e":data[i].ratio>=0.7?"#eab308":"#ef4444";ctx.fill();ctx.strokeStyle="#0a0f1e";ctx.lineWidth=2;ctx.stroke();}
      const[lx,ly]=pt(i,R+28);const pct=data[i].hasData?Math.round(data[i].ratio*100):null;
      const lc=data[i].ratio>=1?"#22c55e":data[i].ratio>=0.7?"#eab308":"#ef4444";
      ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillStyle=data[i].color;ctx.font=`bold 11px sans-serif`;ctx.fillText(data[i].label,lx,ly);
      ctx.fillStyle=pct!==null?lc:"#475569";ctx.font=`bold 10px sans-serif`;ctx.fillText(pct!==null?pct+"%":"—",lx,ly+13);
    }
  },[data,size]);
  return <canvas ref={ref} style={{display:"block",margin:"0 auto"}}/>;
}

// ── Inline line chart (date vs kg) ────────────────────────────────────────────
function LineChart({points, color="#6366f1", height=120, showDots=true, yLabel="kg"}){
  const ref=useRef(null);
  const wrapRef=useRef(null);

  function draw(){
    const canvas=ref.current;
    if(!canvas||!points.length)return;
    const dpr=window.devicePixelRatio||1;
    const W=wrapRef.current?wrapRef.current.clientWidth:320;
    const H=height;
    canvas.width=W*dpr;canvas.height=H*dpr;
    canvas.style.width=W+"px";canvas.style.height=H+"px";
    const ctx=canvas.getContext("2d");
    ctx.scale(dpr,dpr);ctx.clearRect(0,0,W,H);
    const vals=points.map(p=>p.value);
    const mn=Math.min(...vals),mx=Math.max(...vals);
    const pad={t:10,b:24,l:42,r:10};
    const iW=W-pad.l-pad.r, iH=H-pad.t-pad.b;
    const sx=i=>points.length<2?pad.l+iW/2:pad.l+iW*i/(points.length-1);
    const sy=v=>pad.t+(mx===mn?iH/2:iH*(1-(v-mn)/(mx-mn)));
    // Grid lines + Y labels
    const yTicks=4;
    for(let t=0;t<=yTicks;t++){
      const v=mn+(mx-mn)*t/yTicks;
      const y=sy(v);
      ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);
      ctx.strokeStyle="#1e293b";ctx.lineWidth=1;ctx.stroke();
      ctx.fillStyle="#475569";ctx.font="bold 9px sans-serif";ctx.textAlign="right";ctx.textBaseline="middle";
      ctx.fillText(Math.round(v)+yLabel,pad.l-4,y);
    }
    // X labels (first, mid, last)
    const fmtShort=iso=>{const d=new Date(iso);return d.toLocaleDateString("en-GB",{day:"2-digit",month:"short"});};
    ctx.fillStyle="#475569";ctx.font="9px sans-serif";ctx.textBaseline="top";
    if(points.length>1){
      ctx.textAlign="left"; ctx.fillText(fmtShort(points[0].date),pad.l,H-pad.b+4);
      ctx.textAlign="right";ctx.fillText(fmtShort(points[points.length-1].date),W-pad.r,H-pad.b+4);
      if(points.length>3){const mi=Math.floor(points.length/2);ctx.textAlign="center";ctx.fillText(fmtShort(points[mi].date),sx(mi),H-pad.b+4);}
    }
    // Gradient fill under line
    const grad=ctx.createLinearGradient(0,pad.t,0,H-pad.b);
    grad.addColorStop(0,color+"44");grad.addColorStop(1,color+"00");
    ctx.beginPath();ctx.moveTo(sx(0),sy(points[0].value));
    for(let i=1;i<points.length;i++)ctx.lineTo(sx(i),sy(points[i].value));
    ctx.lineTo(sx(points.length-1),H-pad.b);ctx.lineTo(sx(0),H-pad.b);
    ctx.closePath();ctx.fillStyle=grad;ctx.fill();
    // Line
    ctx.beginPath();ctx.moveTo(sx(0),sy(points[0].value));
    for(let i=1;i<points.length;i++)ctx.lineTo(sx(i),sy(points[i].value));
    ctx.strokeStyle=color;ctx.lineWidth=2;ctx.lineJoin="round";ctx.stroke();
    // Dots
    if(showDots)points.forEach((p,i)=>{
      ctx.beginPath();ctx.arc(sx(i),sy(p.value),3.5,0,Math.PI*2);
      ctx.fillStyle=color;ctx.fill();ctx.strokeStyle="#0a0f1e";ctx.lineWidth=2;ctx.stroke();
    });
  }

  useEffect(()=>{
    draw();
    // Redraw when the container resizes (e.g. tab becomes visible)
    if(!wrapRef.current)return;
    const ro=new ResizeObserver(()=>draw());
    ro.observe(wrapRef.current);
    return()=>ro.disconnect();
  },[points,color,height,showDots]);

  if(!points.length)return(
    <div style={{height,display:"flex",alignItems:"center",justifyContent:"center",color:"#334155",fontSize:12}}>
      No data yet — log more workouts
    </div>
  );
  return(
    <div ref={wrapRef} style={{width:"100%"}}>
      <canvas ref={ref} style={{display:"block"}}/>
    </div>
  );
}

// Overall avg 1RM history: average of best kg 1RM across all muscle groups per workout
function getOverallAvg1RMHistory(workouts, exercises) {
  if(!workouts.length) return [];
  const sorted=[...workouts].sort((a,b)=>a.date.localeCompare(b.date));
  return sorted.map(w=>{
    // best 1RM per muscle group up to and including this workout
    const upto=sorted.slice(0,sorted.indexOf(w)+1);
    const bests=MUSCLE_STANDARDS.map(s=>getBestByMuscles(upto,exercises,s.muscles)).filter(v=>v>0);
    if(!bests.length)return null;
    return{date:w.date,value:Math.round(bests.reduce((a,v)=>a+v,0)/bests.length)};
  }).filter(Boolean);
}

              {editBW
                ?<div style={{display:"flex",gap:6,alignItems:"center",marginTop:4}}>
                  <input value={bwIn} onChange={e=>setBwIn(e.target.value)} type="number" style={{background:"#1e293b",border:"1px solid #6366f1",borderRadius:8,color:"#f1f5f9",padding:"4px 8px",fontSize:14,width:70,outline:"none"}}/>
                  <span style={{color:"#94a3b8",fontSize:13}}>kg</span>
                  <button onClick={()=>{onSetBW(parseFloat(bwIn)||80);setEditBW(false);}} style={{background:"#6366f1",border:"none",borderRadius:8,padding:"4px 10px",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>OK</button>
                </div>
                :<div style={{fontSize:18,fontWeight:800,color:"#f1f5f9",marginTop:2}}>{bodyweight} <span style={{fontSize:13,color:"#64748b",fontWeight:500}}>kg</span></div>
              }
            </div>
          </div>
          {!editBW&&<button onClick={()=>{setBwIn(String(bodyweight));setEditBW(true);}} style={{background:"#1e293b",border:"none",borderRadius:8,padding:"6px 10px",cursor:"pointer",color:"#94a3b8"}}><Icon name="edit" size={15}/></button>}
        </div>

        {/* Score card */}
        {score>0&&(
          <div style={{background:"#0f172a",borderRadius:16,padding:"18px",border:"1px solid #1e293b",textAlign:"center"}}>
            <div style={{fontSize:11,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>Overall vs Advanced Lifter</div>
            <div style={{fontSize:56,fontWeight:900,color:scoreColor,lineHeight:1,letterSpacing:"-0.03em"}}>{score}%</div>
            <div style={{display:"inline-block",marginTop:8,padding:"3px 14px",borderRadius:20,background:`${scoreColor}22`,color:scoreColor,fontSize:12,fontWeight:800,letterSpacing:"0.1em",textTransform:"uppercase"}}>{scoreLabel}</div>
            <div style={{fontSize:12,color:"#475569",marginTop:8}}>Across {withData.length} of {MUSCLE_STANDARDS.length} muscle groups</div>
          </div>
        )}

        {/* Strength Radar */}
        <div style={{background:"#0f172a",borderRadius:16,padding:"18px 10px 14px",border:"1px solid #1e293b"}}>
          <div style={{paddingLeft:8,marginBottom:3}}><span style={{fontSize:13,fontWeight:700,color:"#e2e8f0"}}>Muscle Group Radar</span></div>
          <div style={{paddingLeft:8,marginBottom:14,fontSize:12,color:"#475569"}}>
            Your best est. 1RM per group vs advanced lifter baseline <span style={{color:"#6366f1",fontWeight:600}}>(dashed = 100%)</span>
          </div>
          {workouts.length===0
            ? <div style={{textAlign:"center",padding:"40px 0",color:"#475569",fontSize:14}}>Log workouts to see your radar</div>
            : <Radar data={radar}/>
          }
          <div style={{display:"flex",justifyContent:"center",gap:14,marginTop:16,flexWrap:"wrap"}}>
            {[["#22c55e","≥ 100%"],["#eab308","70–99%"],["#ef4444","< 70%"]].map(([c,l])=>(
              <div key={l} style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:8,height:8,borderRadius:"50%",background:c}}/><span style={{fontSize:11,color:"#64748b"}}>{l}</span></div>
            ))}
          </div>
        </div>

        {/* Muscle group breakdown bars */}
        <div style={{background:"#0f172a",borderRadius:16,border:"1px solid #1e293b",overflow:"hidden"}}>
          <div style={{padding:"12px 14px 10px",borderBottom:"1px solid #1e293b"}}><span style={{fontSize:12,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.08em"}}>Group Breakdown</span></div>
          {radar.map((d,i)=>{
            const pct=d.hasData?Math.min(Math.round(d.ratio*100),150):0;
            const bc=d.ratio>=1?"#22c55e":d.ratio>=0.7?"#eab308":"#ef4444";
            return(
              <div key={i} style={{padding:"11px 14px",borderBottom:i<radar.length-1?"1px solid #1e293b":"none"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                  <span style={{fontSize:13,fontWeight:700,color:d.color}}>{d.label}</span>
                  <div>{d.hasData?<><span style={{fontSize:13,fontWeight:800,color:bc}}>{d.best}kg</span><span style={{fontSize:11,color:"#475569",marginLeft:4}}>/ {d.std}kg avg</span></>:<span style={{fontSize:12,color:"#334155"}}>No data</span>}</div>
                </div>
                <div style={{height:5,background:"#1e293b",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.min(pct,100)}%`,background:`linear-gradient(90deg,${d.color}88,${d.color})`,borderRadius:3,transition:"width 0.6s ease"}}/></div>
                {d.hasData&&<div style={{fontSize:10,color:"#475569",marginTop:3,textAlign:"right"}}>{pct}% of advanced lifter</div>}
              </div>
            );
          })}
        </div>

        {/* Strength trend + exercise drilldown */}
        <StrengthTrendPanel workouts={workouts} exercises={exercises}/>

        {/* Summary stats */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {[{label:"Workouts",value:workouts.length,sub:"total"},{label:"Total Sets",value:totalSets,sub:"all time"},{label:"Avg Sets",value:workouts.length?Math.round(totalSets/workouts.length):0,sub:"per session"},{label:"Exercises",value:workouts.reduce((a,w)=>a+w.entries.length,0),sub:"logged"}].map(s=>(
            <div key={s.label} style={{background:"#0f172a",borderRadius:14,padding:"14px",border:"1px solid #1e293b"}}>
              <div style={{fontSize:24,fontWeight:900,color:"#f1f5f9"}}>{s.value}</div>
              <div style={{fontSize:12,fontWeight:700,color:"#64748b",marginTop:2}}>{s.label}</div>
              <div style={{fontSize:10,color:"#334155",marginTop:1}}>{s.sub}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── Set Row ───────────────────────────────────────────────────────────────────
function SetRow({set,index,onChange,onRemove}){
  const isFailure = set.rir==="failure";
  return(
    <div style={{display:"grid",gridTemplateColumns:"24px 1fr 1fr auto 24px",gap:6,alignItems:"center"}}>
      <span style={{color:"#64748b",fontSize:12,fontWeight:700,textAlign:"center"}}>{index+1}</span>
      <Inp placeholder="kg" type="number" value={set.weight} onChange={e=>onChange({...set,weight:e.target.value})} style={{padding:"8px 10px",fontSize:13}}/>
      <Inp placeholder="reps" type="number" value={set.reps} onChange={e=>onChange({...set,reps:e.target.value})} style={{padding:"8px 10px",fontSize:13}}/>
      <div style={{display:"flex",alignItems:"center",gap:4}}>
        {!isFailure
          ? <Inp placeholder="RIR" type="number" value={set.rir} onChange={e=>onChange({...set,rir:e.target.value})} style={{padding:"8px 8px",fontSize:13,textAlign:"center",width:56}}/>
          : <div style={{padding:"8px 10px",background:"rgba(239,68,68,0.15)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:10,fontSize:11,fontWeight:800,color:"#f87171",whiteSpace:"nowrap"}}>FAIL</div>
        }
        <button
          onClick={()=>onChange({...set,rir:isFailure?"":"failure"})}
          title={isFailure?"Clear failure":"Mark as failure"}
          style={{background:isFailure?"rgba(239,68,68,0.2)":"#1e293b",border:"none",borderRadius:8,padding:"6px 7px",cursor:"pointer",color:isFailure?"#f87171":"#475569",flexShrink:0,lineHeight:0}}
        >
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
          </svg>
        </button>
      </div>
      <button onClick={onRemove} style={{background:"none",border:"none",cursor:"pointer",color:"#64748b",padding:2,display:"flex",alignItems:"center"}}><Icon name="close" size={14}/></button>
    </div>
  );
}

// ── Workout Exercise Card ─────────────────────────────────────────────────────
function WECard({entry,exercises,onChange,onRemove}){
  const [showNote,setShowNote]=useState(!!entry.note);
  const ex=exercises.find(e=>e.id===entry.exerciseId);
  const primaryColor = ex?.muscles?.[0] ? getColorForMuscle(ex.muscles[0]) : "#6366f1";
  const addS=()=>onChange({...entry,sets:[...entry.sets,{weight:"",reps:"",rir:""}]});
  const updS=(i,s)=>onChange({...entry,sets:entry.sets.map((x,j)=>j===i?s:x)});
  const remS=i=>onChange({...entry,sets:entry.sets.filter((_,j)=>j!==i)});
  return(
    <div style={{background:"#0f172a",borderRadius:16,overflow:"hidden",border:"1px solid #1e293b"}}>
      <div style={{padding:"12px 14px",borderLeft:`3px solid ${primaryColor}`,display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:700,fontSize:15,color:"#f1f5f9",marginBottom:4}}>{ex?.name||"Unknown"}</div>
          {ex && (
            <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
              {(ex.primaryMuscles||[ex.muscles?.[0]].filter(Boolean)).map(m=>(
                <span key={m} style={{padding:"2px 8px",borderRadius:20,fontSize:11,fontWeight:700,background:`${getColorForMuscle(m)}33`,color:getColorForMuscle(m)}}>{m}</span>
              ))}
              {(ex.secondaryMuscles||ex.muscles?.slice(1)||[]).slice(0,2).map(m=>(
                <span key={m} style={{padding:"2px 8px",borderRadius:20,fontSize:11,fontWeight:600,background:"#1e293b",color:"#475569"}}>{m}</span>
              ))}
            </div>
          )}
        </div>
        <div style={{display:"flex",gap:6,marginLeft:8,flexShrink:0}}>
          <button onClick={()=>setShowNote(!showNote)} style={{background:showNote?"#1e3a5f":"transparent",border:"none",borderRadius:8,padding:"6px 8px",cursor:"pointer",color:showNote?"#60a5fa":"#64748b"}}><Icon name="note" size={16}/></button>
          <button onClick={onRemove} style={{background:"transparent",border:"none",borderRadius:8,padding:"6px 8px",cursor:"pointer",color:"#64748b"}}><Icon name="trash" size={16}/></button>
        </div>
      </div>
      <div style={{padding:"0 14px 14px"}}>
        {showNote&&<div style={{margin:"10px 0"}}><TA placeholder="Notes..." value={entry.note} onChange={e=>onChange({...entry,note:e.target.value})} style={{minHeight:54}}/></div>}
        <div style={{display:"grid",gridTemplateColumns:"24px 1fr 1fr auto 24px",gap:6,marginBottom:6,marginTop:8,alignItems:"center"}}>
          <span/>
          <span style={{fontSize:10,fontWeight:700,color:"#64748b",textAlign:"center",textTransform:"uppercase",letterSpacing:"0.06em"}}>kg</span>
          <span style={{fontSize:10,fontWeight:700,color:"#64748b",textAlign:"center",textTransform:"uppercase",letterSpacing:"0.06em"}}>Reps</span>
          <span style={{fontSize:10,fontWeight:700,color:"#64748b",textAlign:"center",textTransform:"uppercase",letterSpacing:"0.06em",paddingLeft:4}}>RIR</span>
          <span/>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {entry.sets.map((s,i)=><SetRow key={i} set={s} index={i} onChange={s=>updS(i,s)} onRemove={()=>remS(i)}/>)}
        </div>
        <button onClick={addS} style={{marginTop:10,background:"#1e293b",border:"1px dashed #334155",borderRadius:10,padding:"7px 12px",cursor:"pointer",color:"#64748b",fontSize:13,width:"100%",fontFamily:"inherit"}}>+ Add Set</button>
      </div>
    </div>
  );
}

// ── Exercise Picker ───────────────────────────────────────────────────────────
// onCreateExercise(ex) is optional — if provided, a "New exercise" form is shown
function Picker({exercises, onPick, onClose, onCreateExercise}){
  const [q,setQ]=useState("");
  const [selCat,setSelCat]=useState("All");
  const [selMuscle,setSelMuscle]=useState(null);
  const [creating,setCreating]=useState(false);
  const [newName,setNewName]=useState("");
  const [newPrimary,setNewPrimary]=useState([]);
  const [newSecondary,setNewSecondary]=useState([]);

  const catMuscles = selCat==="All" ? null : MUSCLE_CATEGORIES.find(c=>c.category===selCat)?.muscles;

  const filtered=exercises.filter(e=>{
    const nameMatch=e.name.toLowerCase().includes(q.toLowerCase());
    if(!nameMatch) return false;
    if(selMuscle) return e.muscles?.includes(selMuscle);
    if(selCat!=="All") return e.muscles?.some(m=>catMuscles?.includes(m));
    return true;
  });

  const grouped = {};
  filtered.forEach(ex => {
    const cat = getPrimaryCategory(ex);
    if(!grouped[cat]) grouped[cat]=[];
    grouped[cat].push(ex);
  });

  function handleCreate(){
    if(!newName.trim()||!newPrimary.length) return;
    const muscles=[...newPrimary,...newSecondary];
    const ex={id:"c"+Date.now(), name:newName.trim(), muscles, primaryMuscles:newPrimary, secondaryMuscles:newSecondary};
    onCreateExercise?.(ex);
    onPick(ex);
  }

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:100,display:"flex",alignItems:"flex-end"}}>
      <div style={{background:"#0f172a",borderRadius:"20px 20px 0 0",width:"100%",maxHeight:"92vh",overflow:"hidden",display:"flex",flexDirection:"column",border:"1px solid #1e293b"}}>

        {/* Header */}
        <div style={{padding:"20px 16px 12px",borderBottom:"1px solid #1e293b",flexShrink:0}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <span style={{fontWeight:700,fontSize:17,color:"#f1f5f9"}}>
              {creating ? "New Exercise" : "Add Exercise"}
            </span>
            <div style={{display:"flex",gap:8}}>
              {onCreateExercise && !creating && (
                <button onClick={()=>setCreating(true)} style={{background:"linear-gradient(135deg,#6366f1,#8b5cf6)",border:"none",borderRadius:8,padding:"6px 11px",cursor:"pointer",color:"#fff",fontSize:12,fontWeight:700,fontFamily:"inherit",display:"flex",alignItems:"center",gap:5}}>
                  <Icon name="plus" size={13} color="#fff"/> New
                </button>
              )}
              <button onClick={creating?()=>{setCreating(false);setNewName("");setNewPrimary([]);setNewSecondary([]);}:onClose}
                style={{background:"#1e293b",border:"none",borderRadius:8,padding:6,cursor:"pointer",color:"#94a3b8"}}>
                <Icon name={creating?"back":"close"} size={18}/>
              </button>
            </div>
          </div>

          {!creating && <>
            <div style={{position:"relative",marginBottom:10}}>
              <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search exercises..." style={{background:"#1e293b",border:"1px solid #334155",borderRadius:10,color:"#f1f5f9",padding:"9px 12px 9px 34px",fontSize:14,outline:"none",width:"100%",boxSizing:"border-box",fontFamily:"inherit"}}/>
              <div style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}}><Icon name="search" size={16} color="#64748b"/></div>
            </div>
            <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:6}}>
              {["All",...MUSCLE_CATEGORIES.map(c=>c.category)].map(cat=>(
                <button key={cat} onClick={()=>{setSelCat(cat);setSelMuscle(null);}} style={{flexShrink:0,padding:"5px 12px",borderRadius:20,fontSize:12,fontWeight:600,border:"none",cursor:"pointer",fontFamily:"inherit",background:selCat===cat?(getColorForCategory(cat)||"#6366f1"):"#1e293b",color:selCat===cat?"#fff":"#94a3b8"}}>{cat}</button>
              ))}
            </div>
            {selCat!=="All" && catMuscles && (
              <div style={{display:"flex",gap:6,overflowX:"auto",paddingTop:6}}>
                <button onClick={()=>setSelMuscle(null)} style={{flexShrink:0,padding:"4px 10px",borderRadius:20,fontSize:11,fontWeight:600,border:"1px solid #334155",cursor:"pointer",fontFamily:"inherit",background:!selMuscle?"#334155":"transparent",color:!selMuscle?"#f1f5f9":"#64748b"}}>All muscles</button>
                {catMuscles.map(m=>(
                  <button key={m} onClick={()=>setSelMuscle(selMuscle===m?null:m)} style={{flexShrink:0,padding:"4px 10px",borderRadius:20,fontSize:11,fontWeight:600,border:"none",cursor:"pointer",fontFamily:"inherit",background:selMuscle===m?getColorForMuscle(m):`${getColorForMuscle(m)}22`,color:selMuscle===m?"#fff":getColorForMuscle(m)}}>{m}</button>
                ))}
              </div>
            )}
          </>}
        </div>

        {/* Create form */}
        {creating && (
          <div style={{overflowY:"auto",flex:1,padding:"16px",display:"flex",flexDirection:"column",gap:14}}>
            <Inp label="Exercise Name" value={newName} onChange={e=>setNewName(e.target.value)} placeholder="e.g. Sissy Squat" style={{fontSize:15}}/>
            <div>
              <div style={{fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:"#94a3b8",marginBottom:8}}>
                Muscles <span style={{color:"#475569",fontWeight:500,textTransform:"none",fontSize:11}}>(at least one primary)</span>
              </div>
              <MuscleSelector primary={newPrimary} secondary={newSecondary} onChange={(p,s)=>{setNewPrimary(p);setNewSecondary(s);}}/>
            </div>
            {newPrimary.length>0 && (
              <div>
                <div style={{fontSize:10,color:"#64748b",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4}}>Primary</div>
                <MusclePills muscles={newPrimary}/>
              </div>
            )}
            {newSecondary.length>0 && (
              <div>
                <div style={{fontSize:10,color:"#475569",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4}}>Secondary</div>
                <MusclePills muscles={newSecondary}/>
              </div>
            )}
            <Btn variant="primary" onClick={handleCreate} style={{justifyContent:"center",opacity:newName.trim()&&newPrimary.length?1:0.4}} disabled={!newName.trim()||!newPrimary.length}>
              <Icon name="plus" size={15} color="#fff"/> Create &amp; Add to Workout
            </Btn>
          </div>
        )}

        {/* Exercise list */}
        {!creating && (
          <div style={{overflowY:"auto",flex:1,paddingBottom:"env(keyboard-inset-height, 300px)"}}>
            {Object.keys(grouped).length===0 && (
              <div style={{color:"#64748b",textAlign:"center",padding:30,fontSize:14}}>
                No exercises found
                {onCreateExercise && <div style={{marginTop:10,fontSize:13,color:"#475569"}}>Tap <strong style={{color:"#6366f1"}}>+ New</strong> to create one</div>}
              </div>
            )}
            {Object.entries(grouped).map(([cat, exs])=>(
              <div key={cat}>
                <div style={{padding:"10px 16px 4px",display:"flex",alignItems:"center",gap:8,position:"sticky",top:0,background:"#0f172a",zIndex:1}}>
                  <div style={{width:7,height:7,borderRadius:"50%",background:getColorForCategory(cat)}}/>
                  <span style={{fontSize:11,fontWeight:700,color:getColorForCategory(cat),textTransform:"uppercase",letterSpacing:"0.08em"}}>{cat}</span>
                </div>
                {exs.map(ex=>(
                  <button key={ex.id} onClick={()=>onPick(ex)} style={{display:"flex",alignItems:"center",gap:12,width:"100%",padding:"10px 16px",background:"none",border:"none",cursor:"pointer",borderBottom:"1px solid #1e293b",textAlign:"left",fontFamily:"inherit"}}>
                    <div style={{width:36,height:36,borderRadius:10,background:`${getColorForMuscle(ex.muscles?.[0]||"")}22`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Icon name="dumbbell" size={17} color={getColorForMuscle(ex.muscles?.[0]||"")}/></div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
                        <span style={{fontWeight:600,fontSize:14,color:"#f1f5f9"}}>{ex.name}</span>
                        {ex.id.startsWith("c")&&<span style={{fontSize:10,fontWeight:700,color:"#6366f1",background:"rgba(99,102,241,0.15)",padding:"1px 6px",borderRadius:6}}>custom</span>}
                      </div>
                      <MusclePills muscles={ex.muscles||[]} max={3}/>
                    </div>
                  </button>
                ))}
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ── Workout Editor ────────────────────────────────────────────────────────────
function Editor({workout,exercises,onSave,onCancel}){
  const [w,setW]=useState(workout||{id:Date.now().toString(),date:today(),name:"",entries:[],notes:""});
  const [pick,setPick]=useState(false);
  const addEx=ex=>{setW(p=>({...p,entries:[...p.entries,{exerciseId:ex.id,sets:[{weight:"",reps:"",rir:""}],note:""}]}));setPick(false);};
  const updE=(i,e)=>setW(p=>({...p,entries:p.entries.map((x,j)=>j===i?e:x)}));
  const remE=i=>setW(p=>({...p,entries:p.entries.filter((_,j)=>j!==i)}));

  // Collect all unique muscles across all entries
  const allMuscles = [...new Set(w.entries.flatMap(entry=>{
    const ex=exercises.find(x=>x.id===entry.exerciseId);
    return ex?.muscles||[];
  }))];
  const cats = [...new Set(allMuscles.map(m=>getCategoryForMuscle(m)))];

  const ok=w.name.trim()&&w.entries.length>0;
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:"#0a0f1e"}}>
      <div style={{padding:"16px",borderBottom:"1px solid #1e293b",display:"flex",alignItems:"center",gap:10}}>
        <button onClick={onCancel} style={{background:"none",border:"none",cursor:"pointer",color:"#94a3b8",padding:4}}><Icon name="back" size={22}/></button>
        <span style={{fontWeight:800,fontSize:18,color:"#f1f5f9",flex:1}}>{workout?"Edit Workout":"New Workout"}</span>
        <Btn variant={ok?"primary":"secondary"} onClick={()=>ok&&onSave(w)} style={{opacity:ok?1:0.4,padding:"8px 16px",fontSize:13}}><Icon name="check" size={15}/> Save</Btn>
      </div>
      <div style={{overflowY:"auto",flex:1,padding:"16px",display:"flex",flexDirection:"column",gap:14}}>
        <Inp label="Workout Name" placeholder="e.g. Push Day, Leg Day..." value={w.name} onChange={e=>setW(p=>({...p,name:e.target.value}))}/>
        <DateInput value={w.date} onChange={d=>setW(p=>({...p,date:d}))} style={{background:"#1e293b",border:"1px solid #334155",borderRadius:10,color:"#f1f5f9",padding:"10px 12px",fontSize:14,outline:"none",width:"100%",fontFamily:"inherit"}}/>
        {cats.length>0&&(
          <div>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:"#94a3b8",marginBottom:6}}>Muscles Trained</div>
            <MusclePills muscles={allMuscles}/>
          </div>
        )}
        <div>
          <div style={{fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:"#94a3b8",marginBottom:8}}>Exercises ({w.entries.length})</div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {w.entries.map((entry,i)=><WECard key={i} entry={entry} exercises={exercises} onChange={e=>updE(i,e)} onRemove={()=>remE(i)}/>)}
          </div>
          <button onClick={()=>setPick(true)} style={{marginTop:w.entries.length?10:0,width:"100%",padding:"14px",background:"#0f172a",border:"2px dashed #334155",borderRadius:16,cursor:"pointer",color:"#6366f1",fontSize:14,fontWeight:700,fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            <Icon name="plus" size={18} color="#6366f1"/> Add Exercise
          </button>
        </div>
        <TA label="Workout Notes" placeholder="General notes about this session..." value={w.notes} onChange={e=>setW(p=>({...p,notes:e.target.value}))}/>
      </div>
      {pick&&<Picker exercises={exercises} onPick={addEx} onClose={()=>setPick(false)}/>}
    </div>
  );
}

// ── Workout Detail (tabbed: Summary | Template) ───────────────────────────────
function Detail({workout,exercises,onBack,onEdit,onDelete,onSaveTemplate,existingTemplate}){
  const [tab,setTab]=useState("summary");
  const [tplName,setTplName]=useState(workout.name);
  const [saved,setSaved]=useState(false);

  const allMuscles=[...new Set(workout.entries.flatMap(entry=>{
    const ex=exercises.find(x=>x.id===entry.exerciseId);return ex?.muscles||[];
  }))];

  const handleSaveTemplate=()=>{
    onSaveTemplate(workout, tplName);
    setSaved(true);
  };

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:"#0a0f1e"}}>
      {/* Header */}
      <div style={{padding:"16px",borderBottom:"1px solid #1e293b",display:"flex",alignItems:"center",gap:10}}>

      </div>

      {/* Tab switcher */}
      <div style={{display:"flex",borderBottom:"1px solid #1e293b",background:"#0a0f1e"}}>
        {[{id:"summary",label:"Summary",icon:"list"},{id:"template",label:"Save as Template",icon:"template"}].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:"11px 8px",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",borderBottom:tab===t.id?"2px solid #6366f1":"2px solid transparent",color:tab===t.id?"#6366f1":"#64748b",fontWeight:700,fontSize:13,marginBottom:"-1px"}}>
            <Icon name={t.icon} size={15} color={tab===t.id?"#6366f1":"#64748b"}/>{t.label}

      {/* Summary tab */}
      {tab==="summary"&&(
        <div style={{overflowY:"auto",flex:1,padding:"16px",display:"flex",flexDirection:"column",gap:16}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}><Icon name="calendar" size={16} color="#64748b"/><span style={{color:"#94a3b8",fontSize:14}}>{fmtDate(workout.date)}</span></div>
          <MusclePills muscles={allMuscles}/>
          {workout.notes&&<div style={{background:"#1e293b",borderRadius:12,padding:"12px 14px"}}><div style={{fontSize:11,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4}}>Session Notes</div><div style={{fontSize:14,color:"#94a3b8",lineHeight:1.5}}>{workout.notes}</div></div>}
          {workout.entries.map((entry,i)=>{
            const ex=exercises.find(e=>e.id===entry.exerciseId);
            const primaryColor=ex?.muscles?.[0]?getColorForMuscle(ex.muscles[0]):"#6366f1";
            return(
              <div key={i} style={{background:"#0f172a",borderRadius:16,overflow:"hidden",border:"1px solid #1e293b"}}>
                <div style={{padding:"12px 14px",borderLeft:`3px solid ${primaryColor}`}}>
                  <div style={{fontWeight:700,fontSize:15,color:"#f1f5f9",marginBottom:4}}>{ex?.name}</div>
                  {ex?.muscles&&<MusclePills muscles={ex.muscles} max={4}/>}
                </div>
                {entry.note&&<div style={{margin:"0 14px 8px",background:"#1e293b",borderRadius:8,padding:"8px 12px",fontSize:13,color:"#94a3b8"}}>{entry.note}</div>}
                <div style={{padding:"0 14px 14px"}}>
                  <div style={{display:"grid",gridTemplateColumns:"28px 1fr 1fr 1fr",gap:6,marginBottom:6}}>
                    <span style={{fontSize:10,fontWeight:700,color:"#475569",textAlign:"center"}}>#</span>

          <div>
            <div style={{fontSize:11,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>
              {saved?"Saved Template":"Preview — weights kept, reps cleared"}
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>

                      </div>

                          <span style={{textAlign:"center",fontSize:13,color:"#f1f5f9",fontWeight:600}}>{s.weight||"—"}</span>
